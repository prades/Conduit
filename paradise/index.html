<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paradise — Dragonlord</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px; pointer-events: none; z-index: 10;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
    }
    #hud .title { color: #ffe066; font-size: 22px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 12px #ffaa00; }
    #hud .credits { color: #adf; font-size: 13px; opacity: 0.8; }

    #controls {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(200,230,255,0.55); font-size: 12px; pointer-events: none; z-index: 10;
      text-align: center; letter-spacing: 1px;
    }

    #home-link {
      position: fixed; top: 16px; right: 24px; z-index: 20;
      color: #ffe066; font-size: 13px; text-decoration: none;
      border: 1px solid #ffe06655; border-radius: 4px; padding: 4px 12px;
      background: rgba(0,0,0,0.5); pointer-events: all;
      transition: background 0.2s;
    }
    #home-link:hover { background: rgba(255,220,80,0.15); }

    #loading {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; transition: opacity 1s;
    }
    #loading h1 { color: #ffe066; font-size: 3em; letter-spacing: 6px; margin-bottom: 12px; text-shadow: 0 0 30px #ffaa00; }
    #loading p  { color: #adf; font-size: 14px; letter-spacing: 2px; }
    #loading.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

<div id="loading">
  <h1>PARADISE</h1>
  <p>Loading world...</p>
</div>

<div id="hud">
  <div class="title">PARADISE</div>
  <div class="credits">by Dragonlord</div>
</div>

<a id="home-link" href="../home.html">← Home</a>

<div id="controls">WASD / Arrow Keys — Move &nbsp;|&nbsp; Mouse — Look &nbsp;|&nbsp; Click to lock cursor</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ─── Setup ───────────────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x87ceeb, 0.012);

const camera = new THREE.PerspectiveCamera(70, W / H, 0.1, 500);
camera.position.set(0, 2.5, 8);

// ─── Sky & Lighting ──────────────────────────────────────────────────────────
scene.background = new THREE.Color(0x87ceeb);

const sun = new THREE.DirectionalLight(0xfff4d0, 2.2);
sun.position.set(60, 80, 40);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 250;
sun.shadow.camera.left = sun.shadow.camera.bottom = -80;
sun.shadow.camera.right = sun.shadow.camera.top = 80;
scene.add(sun);
scene.add(new THREE.AmbientLight(0xb0d8ff, 0.7));
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x5a9a30, 0.5));

// ─── Terrain ─────────────────────────────────────────────────────────────────
const TILE = 120;
const terrainGeo = new THREE.PlaneGeometry(TILE, TILE, 60, 60);
terrainGeo.rotateX(-Math.PI / 2);

// Bump the terrain up with a simple noise function
const pos = terrainGeo.attributes.position;
for (let i = 0; i < pos.count; i++) {
  const x = pos.getX(i), z = pos.getZ(i);
  const r = Math.sqrt(x * x + z * z) / 40;
  const h = Math.max(0,
    Math.sin(x * 0.15) * Math.cos(z * 0.15) * 2.2 +
    Math.sin(x * 0.05 + 1) * Math.cos(z * 0.07) * 3.5 -
    r * 1.2
  );
  pos.setY(i, h);
}
pos.needsUpdate = true;
terrainGeo.computeVertexNormals();

const terrainMat = new THREE.MeshLambertMaterial({ color: 0x4caf50 });
const terrain = new THREE.Mesh(terrainGeo, terrainMat);
terrain.receiveShadow = true;
scene.add(terrain);

// ─── Water ───────────────────────────────────────────────────────────────────
const waterGeo = new THREE.PlaneGeometry(TILE * 2, TILE * 2);
waterGeo.rotateX(-Math.PI / 2);
const waterMat = new THREE.MeshPhongMaterial({
  color: 0x006994, transparent: true, opacity: 0.82,
  shininess: 120, specular: 0x88ddff
});
const water = new THREE.Mesh(waterGeo, waterMat);
water.position.y = 0.05;
scene.add(water);

// ─── Trees ───────────────────────────────────────────────────────────────────
function makeTree(x, z) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.15, 0.22, 1.4, 7),
    new THREE.MeshLambertMaterial({ color: 0x5c3d1e })
  );
  trunk.position.y = 0.7;
  trunk.castShadow = true;
  g.add(trunk);

  const layers = [
    { r: 1.3, h: 1.5, y: 1.5 },
    { r: 1.0, h: 1.3, y: 2.4 },
    { r: 0.65, h: 1.1, y: 3.1 },
  ];
  const leafColors = [0x2e7d32, 0x388e3c, 0x43a047, 0x1b5e20];
  layers.forEach((l, i) => {
    const leaf = new THREE.Mesh(
      new THREE.ConeGeometry(l.r, l.h, 8),
      new THREE.MeshLambertMaterial({ color: leafColors[i % leafColors.length] })
    );
    leaf.position.y = l.y;
    leaf.castShadow = true;
    g.add(leaf);
  });

  g.position.set(x, 0, z);
  // Snap to terrain height
  const sy = sampleTerrain(x, z);
  g.position.y = Math.max(0, sy);
  scene.add(g);
}

function sampleTerrain(x, z) {
  const r = Math.sqrt(x * x + z * z) / 40;
  return Math.max(0,
    Math.sin(x * 0.15) * Math.cos(z * 0.15) * 2.2 +
    Math.sin(x * 0.05 + 1) * Math.cos(z * 0.07) * 3.5 -
    r * 1.2
  );
}

const treePositions = [
  [-8,  -6], [ 6, -10], [-12,  4], [ 9,  5], [-4, 12], [14, -3],
  [ 3, -15], [-15, -1], [ 11, 13], [-7, -14], [16, 8], [-10, 10],
  [ 5,  18], [-18,  6], [13, -12], [-3, -18], [ 8, 16], [-14, -8],
  [20, -5], [-20, 2],  [0, -20], [18, 12], [-16, 14], [22, 0],
];
treePositions.forEach(([x, z]) => makeTree(x, z));

// ─── Rocks ───────────────────────────────────────────────────────────────────
const rockMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
for (let i = 0; i < 18; i++) {
  const a = (i / 18) * Math.PI * 2;
  const d = 5 + Math.random() * 14;
  const x = Math.cos(a) * d, z = Math.sin(a) * d;
  const s = 0.25 + Math.random() * 0.6;
  const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(s, 0), rockMat);
  rock.position.set(x, sampleTerrain(x, z) + s * 0.4, z);
  rock.rotation.y = Math.random() * Math.PI;
  rock.castShadow = true;
  scene.add(rock);
}

// ─── Flowers ─────────────────────────────────────────────────────────────────
const flowerColors = [0xff4081, 0xffeb3b, 0xff6d00, 0xe040fb, 0x00e5ff];
for (let i = 0; i < 40; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = 2 + Math.random() * 20;
  const x = Math.cos(angle) * dist, z = Math.sin(angle) * dist;
  const y = sampleTerrain(x, z);
  if (y < 0.2) continue;
  const stem = new THREE.Mesh(
    new THREE.CylinderGeometry(0.03, 0.03, 0.4, 4),
    new THREE.MeshLambertMaterial({ color: 0x558b2f })
  );
  stem.position.set(x, y + 0.2, z);
  scene.add(stem);
  const petal = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 6, 4),
    new THREE.MeshLambertMaterial({ color: flowerColors[i % flowerColors.length] })
  );
  petal.position.set(x, y + 0.45, z);
  scene.add(petal);
}

// ─── Sun Sphere ──────────────────────────────────────────────────────────────
const sunSphere = new THREE.Mesh(
  new THREE.SphereGeometry(3, 16, 16),
  new THREE.MeshBasicMaterial({ color: 0xfffde7 })
);
sunSphere.position.set(120, 150, -80);
scene.add(sunSphere);

// ─── Clouds ──────────────────────────────────────────────────────────────────
const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.88 });
const clouds = [];
for (let i = 0; i < 14; i++) {
  const g = new THREE.Group();
  for (let j = 0; j < 5 + Math.floor(Math.random() * 4); j++) {
    const puff = new THREE.Mesh(new THREE.SphereGeometry(1.5 + Math.random(), 7, 5), cloudMat);
    puff.position.set((Math.random() - 0.5) * 6, (Math.random() - 0.5) * 1.5, (Math.random() - 0.5) * 3);
    g.add(puff);
  }
  g.position.set((Math.random() - 0.5) * 160, 18 + Math.random() * 12, (Math.random() - 0.5) * 160);
  g.userData.speed = 0.5 + Math.random() * 1.0;
  scene.add(g);
  clouds.push(g);
}

// ─── Player / Camera Controls ────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => keys[e.code] = true);
document.addEventListener('keyup',   e => keys[e.code] = false);

let yaw = 0, pitch = 0, locked = false;
document.addEventListener('click', () => { if (!locked) renderer.domElement.requestPointerLock(); });
document.addEventListener('pointerlockchange', () => { locked = document.pointerLockElement === renderer.domElement; });
document.addEventListener('mousemove', e => {
  if (!locked) return;
  yaw   -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch  = Math.max(-1.2, Math.min(0.6, pitch));
});

const playerPos = new THREE.Vector3(0, 2.5, 8);
const moveDir = new THREE.Vector3();

// ─── Animation Loop ──────────────────────────────────────────────────────────
const clock = new THREE.Clock();

// Hide loading screen after init
setTimeout(() => {
  const l = document.getElementById('loading');
  l.classList.add('hidden');
  setTimeout(() => l.remove(), 1100);
}, 600);

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t  = clock.elapsedTime;

  // Water animation
  waterMat.color.setHSL(0.55 + Math.sin(t * 0.3) * 0.02, 0.7, 0.33);

  // Cloud drift
  clouds.forEach(c => {
    c.position.x += c.userData.speed * dt;
    if (c.position.x > 90) c.position.x = -90;
  });

  // Player movement
  const speed = keys['ShiftLeft'] ? 9 : 5;
  moveDir.set(0, 0, 0);
  if (keys['KeyW'] || keys['ArrowUp'])    moveDir.z -= 1;
  if (keys['KeyS'] || keys['ArrowDown'])  moveDir.z += 1;
  if (keys['KeyA'] || keys['ArrowLeft'])  moveDir.x -= 1;
  if (keys['KeyD'] || keys['ArrowRight']) moveDir.x += 1;

  if (moveDir.length() > 0) {
    moveDir.normalize().multiplyScalar(speed * dt);
    moveDir.applyEuler(new THREE.Euler(0, yaw, 0));
    playerPos.add(moveDir);
    // Clamp to world
    playerPos.x = Math.max(-55, Math.min(55, playerPos.x));
    playerPos.z = Math.max(-55, Math.min(55, playerPos.z));
  }

  // Stick player to terrain
  const gh = sampleTerrain(playerPos.x, playerPos.z);
  playerPos.y += ((Math.max(gh, 0) + 1.6) - playerPos.y) * 0.15;

  camera.position.copy(playerPos);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
