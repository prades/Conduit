<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRAGONLORD POKÉDEX</title>
  <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"}}</script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:    #04020d;
      --bg2:   #080618;
      --bg3:   #0e0a22;
      --cyan:  #00f5ff;
      --gold:  #ffd700;
      --dim:   #4a5070;
      --text:  #c8d8f0;
      --green: #00ff88;
    }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; display: flex; flex-direction: column; }

    /* ── Header ── */
    .app-header {
      display: flex; align-items: center; gap: 16px;
      padding: 0 20px; height: 52px; flex-shrink: 0;
      border-bottom: 1px solid rgba(0,245,255,0.12);
      background: rgba(4,2,13,0.9);
    }
    .back-link { font-size: 0.7rem; letter-spacing: 0.1em; color: var(--dim); text-decoration: none; transition: color 0.2s; }
    .back-link:hover { color: var(--cyan); }
    .header-title { font-size: 0.78rem; letter-spacing: 0.18em; color: var(--cyan); flex: 1; text-align: center; }
    .header-nav { display: flex; align-items: center; gap: 10px; }
    .nav-btn { background: none; border: 1px solid rgba(0,245,255,0.2); color: var(--dim); font-family: inherit; font-size: 0.7rem; padding: 4px 10px; cursor: pointer; clip-path: polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%); transition: all 0.18s; }
    .nav-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    #headerPokeName { font-size: 0.72rem; letter-spacing: 0.1em; color: var(--text); min-width: 140px; text-align: center; }

    /* ── Main Grid ── */
    .main-grid { display: grid; grid-template-columns: 200px 1fr; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar { border-right: 1px solid rgba(0,245,255,0.1); display: flex; flex-direction: column; overflow: hidden; background: var(--bg2); }
    .sidebar-controls { padding: 10px; display: flex; flex-direction: column; gap: 6px; border-bottom: 1px solid rgba(0,245,255,0.08); flex-shrink: 0; }
    .search-input { width: 100%; background: rgba(0,245,255,0.04); border: 1px solid rgba(0,245,255,0.15); color: var(--text); font-family: inherit; font-size: 0.65rem; letter-spacing: 0.1em; padding: 5px 10px; outline: none; clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%); }
    .search-input:focus { border-color: var(--cyan); }
    .filter-row { display: flex; gap: 4px; }
    .filter-sel { flex: 1; background: rgba(0,245,255,0.04); border: 1px solid rgba(0,245,255,0.1); color: var(--dim); font-family: inherit; font-size: 0.58rem; letter-spacing: 0.06em; padding: 3px 6px; outline: none; cursor: pointer; }
    .filter-sel:focus { border-color: var(--cyan); color: var(--text); }
    .filter-sel option { background: #0a0818; }
    .poke-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--dim) transparent; }
    .poke-list-item { display: flex; align-items: center; gap: 8px; padding: 5px 10px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); transition: background 0.15s; }
    .poke-list-item:hover { background: rgba(0,245,255,0.05); }
    .poke-list-item.active { background: rgba(0,245,255,0.1); border-left: 2px solid var(--cyan); }
    .list-sprite { width: 32px; height: 32px; image-rendering: pixelated; }
    .list-meta { display: flex; flex-direction: column; }
    .list-num { font-size: 0.55rem; color: var(--dim); letter-spacing: 0.08em; }
    .list-name { font-size: 0.65rem; letter-spacing: 0.06em; text-transform: capitalize; }

    /* ── Right panel ── */
    .right-panel { display: grid; grid-template-columns: 340px 1fr; overflow: hidden; }

    /* ── Scene ── */
    .scene-panel { display: flex; flex-direction: column; border-right: 1px solid rgba(0,245,255,0.1); }
    .scene-wrap { flex: 1; position: relative; overflow: hidden; min-height: 0; }
    #threeCanvas { display: block; width: 100%; height: 100%; }
    .scene-footer { padding: 8px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; border-top: 1px solid rgba(0,245,255,0.08); flex-shrink: 0; }
    .type-badges { display: flex; gap: 6px; flex: 1; }
    .type-badge { font-size: 0.6rem; letter-spacing: 0.12em; padding: 3px 10px; text-transform: uppercase; font-weight: 700; }
    .shiny-btn { background: none; border: 1px solid rgba(255,215,0,0.25); color: var(--dim); font-family: inherit; font-size: 0.6rem; letter-spacing: 0.1em; padding: 4px 10px; cursor: pointer; clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%); transition: all 0.2s; }
    .shiny-btn.active, .shiny-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Info panel ── */
    .info-panel { display: flex; flex-direction: column; overflow: hidden; }
    .poke-header { padding: 14px 18px 10px; border-bottom: 1px solid rgba(0,245,255,0.08); flex-shrink: 0; }
    .poke-name { font-size: 1.3rem; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text); }
    .poke-meta { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.1em; margin-top: 3px; }

    /* ── Stats ── */
    .stats-section { padding: 12px 18px; border-bottom: 1px solid rgba(0,245,255,0.08); flex-shrink: 0; }
    .section-label { font-size: 0.6rem; letter-spacing: 0.18em; color: var(--dim); margin-bottom: 8px; }
    .stat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .stat-name { font-size: 0.58rem; letter-spacing: 0.08em; color: var(--dim); width: 36px; text-align: right; text-transform: uppercase; }
    .stat-bar-bg { flex: 1; height: 5px; background: rgba(255,255,255,0.06); overflow: hidden; }
    .stat-bar-fill { height: 100%; width: 0%; transition: width 0.6s cubic-bezier(0.25,1,0.5,1); }
    .stat-val { font-size: 0.62rem; letter-spacing: 0.06em; width: 32px; text-align: right; }
    .bst-row { font-size: 0.58rem; letter-spacing: 0.12em; color: var(--dim); text-align: right; margin-top: 4px; }
    .bst-val { color: var(--gold); }

    /* ── Abilities ── */
    .abilities-section { padding: 8px 18px; border-bottom: 1px solid rgba(0,245,255,0.08); flex-shrink: 0; }
    .ability-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .ability-chip { font-size: 0.6rem; letter-spacing: 0.08em; padding: 3px 10px; border: 1px solid rgba(0,245,255,0.2); color: var(--dim); clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%); text-transform: capitalize; }
    .ability-chip.hidden { border-color: rgba(255,215,0,0.25); color: rgba(255,215,0,0.6); }

    /* ── Tabs ── */
    .info-tabs { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    .tab-bar { display: flex; border-bottom: 1px solid rgba(0,245,255,0.1); flex-shrink: 0; }
    .tab-btn { flex: 1; background: none; border: none; border-bottom: 2px solid transparent; color: var(--dim); font-family: inherit; font-size: 0.6rem; letter-spacing: 0.12em; padding: 8px 4px; cursor: pointer; transition: all 0.18s; text-transform: uppercase; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .tab-panel { display: none; flex: 1; overflow-y: auto; padding: 12px 18px; scrollbar-width: thin; scrollbar-color: var(--dim) transparent; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 8px; }

    /* ── Move table ── */
    .method-chips { display: flex; gap: 5px; flex-shrink: 0; }
    .method-chip { background: none; border: 1px solid rgba(255,255,255,0.1); color: var(--dim); font-family: inherit; font-size: 0.58rem; letter-spacing: 0.1em; padding: 3px 10px; cursor: pointer; clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%); transition: all 0.15s; }
    .method-chip:hover { border-color: var(--cyan); color: var(--cyan); }
    .method-chip.active { background: rgba(0,245,255,0.1); border-color: var(--cyan); color: var(--cyan); }
    .move-table-wrap { overflow-x: auto; flex: 1; }
    .move-table { width: 100%; border-collapse: collapse; font-size: 0.6rem; }
    .move-table th { text-align: left; color: var(--dim); letter-spacing: 0.1em; padding: 4px 6px; border-bottom: 1px solid rgba(0,245,255,0.1); white-space: nowrap; }
    .move-table td { padding: 4px 6px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; letter-spacing: 0.06em; white-space: nowrap; text-transform: capitalize; }
    .move-table tr:hover td { background: rgba(0,245,255,0.04); }
    .move-lv { color: var(--gold); }
    .cat-physical { color: #f87171; }
    .cat-special { color: #60a5fa; }
    .cat-status { color: var(--dim); }
    .empty-msg { color: var(--dim); font-size: 0.65rem; letter-spacing: 0.1em; padding: 20px 0; }

    /* ── Defense grid ── */
    .defense-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
    .def-cell { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 5px 2px; border: 1px solid rgba(255,255,255,0.05); }
    .def-type { font-size: 0.5rem; letter-spacing: 0.05em; text-align: center; line-height: 1.2; }
    .def-mult { font-size: 0.62rem; font-weight: 700; }
    .mult-immune { color: #6b7280; }
    .mult-quarter { color: #34d399; }
    .mult-half { color: #86efac; }
    .mult-neutral { color: #374151; font-size: 0.48rem; }
    .mult-double { color: #fbbf24; }
    .mult-quad { color: #ef4444; font-weight: 900; }

    /* ── Dex entry ── */
    .dex-entry { font-size: 0.68rem; line-height: 1.8; color: var(--dim); letter-spacing: 0.06em; }

    /* ── Type colors ── */
    .t-normal   { background: rgba(168,168,120,0.15); color: #a8a878; border: 1px solid rgba(168,168,120,0.3); }
    .t-fire     { background: rgba(240,128,48,0.15);  color: #f08030; border: 1px solid rgba(240,128,48,0.3); }
    .t-water    { background: rgba(104,144,240,0.15); color: #6890f0; border: 1px solid rgba(104,144,240,0.3); }
    .t-electric { background: rgba(248,208,48,0.15);  color: #f8d030; border: 1px solid rgba(248,208,48,0.3); }
    .t-grass    { background: rgba(120,200,80,0.15);  color: #78c850; border: 1px solid rgba(120,200,80,0.3); }
    .t-ice      { background: rgba(152,216,216,0.15); color: #98d8d8; border: 1px solid rgba(152,216,216,0.3); }
    .t-fighting { background: rgba(192,48,40,0.15);   color: #c03028; border: 1px solid rgba(192,48,40,0.3); }
    .t-poison   { background: rgba(160,64,160,0.15);  color: #a040a0; border: 1px solid rgba(160,64,160,0.3); }
    .t-ground   { background: rgba(224,192,104,0.15); color: #e0c068; border: 1px solid rgba(224,192,104,0.3); }
    .t-flying   { background: rgba(168,144,240,0.15); color: #a890f0; border: 1px solid rgba(168,144,240,0.3); }
    .t-psychic  { background: rgba(248,88,136,0.15);  color: #f85888; border: 1px solid rgba(248,88,136,0.3); }
    .t-bug      { background: rgba(168,184,32,0.15);  color: #a8b820; border: 1px solid rgba(168,184,32,0.3); }
    .t-rock     { background: rgba(184,160,56,0.15);  color: #b8a038; border: 1px solid rgba(184,160,56,0.3); }
    .t-ghost    { background: rgba(112,88,152,0.15);  color: #705898; border: 1px solid rgba(112,88,152,0.3); }
    .t-dragon   { background: rgba(112,56,248,0.15);  color: #7038f8; border: 1px solid rgba(112,56,248,0.3); }
    .t-dark     { background: rgba(112,88,72,0.15);   color: #705848; border: 1px solid rgba(112,88,72,0.3); }
    .t-steel    { background: rgba(184,184,208,0.15); color: #b8b8d0; border: 1px solid rgba(184,184,208,0.3); }
    .t-fairy    { background: rgba(238,153,172,0.15); color: #ee99ac; border: 1px solid rgba(238,153,172,0.3); }

    /* ── Responsive ── */
    @media (max-width: 1000px) {
      .right-panel { grid-template-columns: 1fr; }
      .scene-panel { border-right: none; border-bottom: 1px solid rgba(0,245,255,0.1); max-height: 320px; }
    }
    @media (max-width: 640px) {
      .main-grid { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      html, body { overflow: auto; height: auto; }
    }

    /* ── Loading ── */
    .loading-msg { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--dim); font-size: 0.7rem; letter-spacing: 0.15em; }
  </style>
</head>
<body>
  <header class="app-header">
    <a href="../" class="back-link">← HOME</a>
    <div class="header-title">// DRAGONLORD POKÉDEX //</div>

    <!-- Right -->

      <!-- Info -->
      <section class="info-panel">
        <div class="poke-header">
          <div class="poke-name" id="pokeName">DRAGONLORD POKÉDEX</div>
          <div class="poke-meta" id="pokeMeta">Select a Pokémon from the list</div>
        </div>

          <div class="section-label">BASE STATS</div>

<script type="module">
import * as THREE from 'three';

/* ── Type theme colours ── */
const TYPE_COLOR = {
  normal:'#a8a878',fire:'#f08030',water:'#6890f0',electric:'#f8d030',
  grass:'#78c850',ice:'#98d8d8',fighting:'#c03028',poison:'#a040a0',
  ground:'#e0c068',flying:'#a890f0',psychic:'#f85888',bug:'#a8b820',
  rock:'#b8a038',ghost:'#705898',dragon:'#7038f8',dark:'#705848',
  steel:'#b8b8d0',fairy:'#ee99ac'
};
const TYPE_FOG = {
  normal:0x111010,fire:0x1a0800,water:0x001530,electric:0x1a1400,
  grass:0x001500,ice:0x001530,fighting:0x1a0500,poison:0x0f001a,
  ground:0x1a0e00,flying:0x001533,psychic:0x1a0030,bug:0x0a1400,
  rock:0x0f0c00,ghost:0x0a0015,dragon:0x000e33,dark:0x050010,
  steel:0x080810,fairy:0x1a0015
};

/* ── Type chart (attacking → defending → multiplier) ── */
const TC = {
  normal:   {rock:.5,steel:.5,ghost:0},
  fire:     {fire:.5,water:.5,rock:.5,dragon:.5,grass:2,ice:2,bug:2,steel:2},
  water:    {water:.5,grass:.5,dragon:.5,fire:2,ground:2,rock:2},
  electric: {electric:.5,grass:.5,dragon:.5,ground:0,water:2,flying:2},
  grass:    {fire:.5,grass:.5,poison:.5,flying:.5,bug:.5,dragon:.5,steel:.5,water:2,ground:2,rock:2},
  ice:      {fire:.5,water:.5,ice:.5,steel:.5,grass:2,ground:2,flying:2,dragon:2},
  fighting: {poison:.5,flying:.5,psychic:.5,bug:.5,fairy:.5,ghost:0,normal:2,ice:2,rock:2,dark:2,steel:2},
  poison:   {poison:.5,ground:.5,rock:.5,ghost:.5,steel:0,grass:2,fairy:2},
  ground:   {grass:.5,bug:.5,flying:0,fire:2,electric:2,poison:2,rock:2,steel:2},
  flying:   {electric:.5,rock:.5,steel:.5,grass:2,fighting:2,bug:2},
  psychic:  {psychic:.5,steel:.5,dark:0,fighting:2,poison:2},
  bug:      {fire:.5,fighting:.5,flying:.5,ghost:.5,steel:.5,fairy:.5,grass:2,psychic:2,dark:2},
  rock:     {fighting:.5,ground:.5,steel:.5,fire:2,ice:2,flying:2,bug:2},
  ghost:    {normal:0,dark:.5,ghost:2,psychic:2},
  dragon:   {steel:.5,fairy:0,dragon:2},
  dark:     {fighting:.5,dark:.5,fairy:.5,ghost:2,psychic:2},
  steel:    {fire:.5,water:.5,electric:.5,steel:.5,ice:2,rock:2,fairy:2},
  fairy:    {fire:.5,poison:.5,steel:.5,fighting:2,dragon:2,dark:2}
};
const ALL_TYPES = Object.keys(TC);

function computeDefense(types) {
  return ALL_TYPES.map(atk => {
    let m = 1;
    types.forEach(def => { m *= TC[atk]?.[def] ?? 1; });
    return { type: atk, mult: m };
  });
}

/* ── Gen ranges ── */
const GEN_RANGES = [[1,151],[152,251],[252,386],[387,493],[494,649],[650,721],[722,809],[810,905],[906,1025]];

/* ── API helpers ── */
const POKEMON_CACHE = new Map();
const SPECIES_CACHE = new Map();
const MOVE_CACHE    = new Map();

async function apiFetch(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}
async function fetchPokemon(id) {
  if (POKEMON_CACHE.has(id)) return POKEMON_CACHE.get(id);
  const d = await apiFetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
  POKEMON_CACHE.set(id, d); POKEMON_CACHE.set(d.name, d);
  return d;
}
async function fetchSpecies(id) {
  if (SPECIES_CACHE.has(id)) return SPECIES_CACHE.get(id);
  const d = await apiFetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`);
  SPECIES_CACHE.set(id, d);
  return d;
}
async function fetchMove(name) {
  if (MOVE_CACHE.has(name)) return MOVE_CACHE.get(name);
  try {
    const d = await apiFetch(`https://pokeapi.co/api/v2/move/${name}`);
    MOVE_CACHE.set(name, d);
    return d;
  } catch { return null; }
}

/* ── Move helpers ── */
const VG = 'scarlet-violet';
function getMovesList(pokemonData, method) {
  return pokemonData.moves
    .filter(m => m.version_group_details.some(d => d.version_group.name === VG && d.move_learn_method.name === method))
    .map(m => ({
      name: m.move.name,
      level: m.version_group_details.find(d => d.version_group.name === VG && d.move_learn_method.name === method)?.level_learned_at ?? 0
    }))
    .sort((a, b) => a.level - b.level);
}

/* ═══════════ THREE.JS SCENE ═══════════ */
const canvas = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x04020d, 0.09);

const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 80);
camera.position.set(0, 1.8, 5.5);
camera.lookAt(0, 0.8, 0);

// Lights
const ambLight  = new THREE.AmbientLight(0x1a1a2e, 4);
const dirLight  = new THREE.DirectionalLight(0xffffff, 2.5);
dirLight.position.set(2, 5, 3);
const typeLight = new THREE.PointLight(0x00f5ff, 8, 12);
typeLight.position.set(-2, 3, 2);
scene.add(ambLight, dirLight, typeLight);

// Pedestal
const pedGeo = new THREE.CylinderGeometry(1.1, 1.3, 0.22, 64);
const pedMat = new THREE.MeshStandardMaterial({ color: 0x111128, metalness: 0.85, roughness: 0.15 });
const pedestal = new THREE.Mesh(pedGeo, pedMat);
pedestal.position.y = -0.6;
scene.add(pedestal);

// Glowing ring on pedestal
const ringGeo = new THREE.RingGeometry(1.0, 1.15, 64);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x00f5ff, side: THREE.DoubleSide, transparent: true, opacity: 0.55 });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.y = -0.48;
scene.add(ring);

// Particles
let particlesMesh = null;
function buildParticles(hexColor) {
  if (particlesMesh) scene.remove(particlesMesh);
  const N = 120;
  const positions = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const r = 1.5 + Math.random() * 2.5;
    const a = Math.random() * Math.PI * 2;
    positions[i*3]   = Math.cos(a) * r;
    positions[i*3+1] = Math.random() * 4 - 0.5;
    positions[i*3+2] = Math.sin(a) * r;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ color: hexColor, size: 0.045, transparent: true, opacity: 0.7 });
  particlesMesh = new THREE.Points(geo, mat);
  scene.add(particlesMesh);
}

// Sprite plane
let spriteMesh = null;
const texLoader = new THREE.TextureLoader();
function loadSprite(id, shiny = false) {
  const homeUrl = shiny
    ? `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/home/shiny/${id}.png`
    : `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/home/${id}.png`;
  const artUrl  = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${shiny ? 'shiny/' : ''}${id}.png`;

  function applyTexture(tex) {
    tex.colorSpace = THREE.SRGBColorSpace;
    if (spriteMesh) scene.remove(spriteMesh);
    const geo = new THREE.PlaneGeometry(2.4, 2.4);
    const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, alphaTest: 0.04, side: THREE.DoubleSide });
    spriteMesh = new THREE.Mesh(geo, mat);
    spriteMesh.position.y = 0.9;
    scene.add(spriteMesh);
  }

  texLoader.load(homeUrl, applyTexture, undefined, () => {
    texLoader.load(artUrl, applyTexture);
  });
}

function setTypeTheme(primaryType) {
  const hexStr = TYPE_COLOR[primaryType] || '#00f5ff';
  const hex    = parseInt(hexStr.replace('#',''), 16);
  const fogHex = TYPE_FOG[primaryType] || 0x04020d;
  typeLight.color.setHex(hex);
  ringMat.color.setHex(hex);
  scene.fog.color.setHex(fogHex);
  buildParticles(hex);
}

// Resize
function resizeRenderer() {
  const wrap = canvas.parentElement;
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(resizeRenderer).observe(canvas.parentElement);
resizeRenderer();

// Animate
const clock = new THREE.Clock();
(function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  if (spriteMesh) spriteMesh.position.y = 0.9 + Math.sin(t * 0.8) * 0.07;
  if (particlesMesh) particlesMesh.rotation.y = t * 0.08;
  ring.material.opacity = 0.4 + Math.sin(t * 2.2) * 0.18;
  renderer.render(scene, camera);
})();

/* ═══════════ UI STATE ═══════════ */
let currentPokemonId = null;
let currentData      = null;
let isShiny          = false;
let activeMethod     = 'level-up';
let allPokemon       = []; // [{id, name}]
let filteredPokemon  = [];

/* ═══════════ SELECT POKÉMON ═══════════ */
async function selectPokemon(id) {
  currentPokemonId = id;
  document.getElementById('pokeName').textContent = '…';
  document.getElementById('pokeMeta').textContent = '';

  try {
    const [data, species] = await Promise.all([fetchPokemon(id), fetchSpecies(id)]);
    currentData = data;

    // Header
    const paddedId = String(data.id).padStart(4, '0');
    document.getElementById('headerPokeName').textContent = `#${paddedId} ${data.name.toUpperCase()}`;
    document.getElementById('pokeName').textContent = data.name.toUpperCase();

    // Species / genus
    const genus = species.genera?.find(g => g.language.name === 'en')?.genus || '';
    document.getElementById('pokeMeta').textContent = `#${paddedId}  ·  ${genus}`;

    // Type badges
    const typeBadges = document.getElementById('typeBadges');
    typeBadges.innerHTML = data.types.map(t =>
      `<span class="type-badge t-${t.type.name}">${t.type.name.toUpperCase()}</span>`
    ).join('');

    // 3D scene
    const primaryType = data.types[0].type.name;
    setTypeTheme(primaryType);
    loadSprite(data.id, isShiny);

    // Stats
    renderStats(data.stats);

    // Abilities
    renderAbilities(data.abilities);

    // Moves (default method)
    await renderMoves(data, activeMethod);

    // Defense (pre-render for tab)
    renderDefense(data.types.map(t => t.type.name));

    // Dex entry
    const entry = species.flavor_text_entries?.find(e => e.language.name === 'en')?.flavor_text
      || 'No Pokédex entry available.';
    document.getElementById('dexEntry').textContent = entry.replace(/\f/g, ' ');

    // Sidebar highlight
    document.querySelectorAll('.poke-list-item').forEach(el => {
      el.classList.toggle('active', Number(el.dataset.id) === data.id);
    });

  } catch(e) {
    document.getElementById('pokeName').textContent = 'NOT FOUND';
    console.error(e);
  }
}

/* ── Render: Stats ── */
const STAT_NAMES = { hp:'HP', attack:'ATK', defense:'DEF', 'special-attack':'SpA', 'special-defense':'SpD', speed:'SPE' };
const STAT_COLORS = { hp:'#f87171', attack:'#fb923c', defense:'#facc15', 'special-attack':'#60a5fa', 'special-defense':'#34d399', speed:'#c084fc' };
function renderStats(stats) {
  const el = document.getElementById('statsBars');
  let bst = 0;
  el.innerHTML = stats.map(s => {
    bst += s.base_stat;
    const pct = Math.min(100, (s.base_stat / 255) * 100);
    const col = STAT_COLORS[s.stat.name] || '#00f5ff';
    return `<div class="stat-row">
      <span class="stat-name">${STAT_NAMES[s.stat.name] || s.stat.name}</span>
      <div class="stat-bar-bg"><div class="stat-bar-fill" style="background:${col};width:${pct}%"></div></div>
      <span class="stat-val" style="color:${col}">${s.base_stat}</span>
    </div>`;
  }).join('');
  document.getElementById('bstRow').innerHTML = `BST <span class="bst-val">${bst}</span>`;
  // Trigger animation
  requestAnimationFrame(() => {
    el.querySelectorAll('.stat-bar-fill').forEach((bar, i) => {
      const pct = Math.min(100, (stats[i].base_stat / 255) * 100);
      bar.style.width = pct + '%';
    });
  });
}

/* ── Render: Abilities ── */
function renderAbilities(abilities) {
  document.getElementById('abilitiesEl').innerHTML = abilities.map(a =>
    `<span class="ability-chip${a.is_hidden ? ' hidden' : ''}">${a.ability.name.replace(/-/g,' ')}${a.is_hidden ? ' ✦' : ''}</span>`
  ).join('');
}

/* ── Render: Moves ── */
async function renderMoves(data, method) {
  const tbody = document.getElementById('moveTableBody');
  tbody.innerHTML = `<tr><td colspan="7" class="empty-msg">LOADING…</td></tr>`;

  const moves = getMovesList(data, method);
  if (!moves.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty-msg">No ${method} moves in Gen 9.</td></tr>`;
    return;
  }

  // Fetch details in parallel (cached)
  const details = await Promise.all(moves.map(m => fetchMove(m.name)));

  tbody.innerHTML = moves.map((m, i) => {
    const d = details[i];
    if (!d) return '';
    const type  = d.type?.name || '?';
    const cat   = d.damage_class?.name || 'status';
    const pwr   = d.power   ?? '—';
    const acc   = d.accuracy ?? '—';
    const pp    = d.pp      ?? '—';
    const catClass = cat === 'physical' ? 'cat-physical' : cat === 'special' ? 'cat-special' : 'cat-status';
    const lvStr = method === 'level-up' ? (m.level || '—') : '—';
    return `<tr>
      <td class="move-lv">${lvStr}</td>
      <td>${m.name.replace(/-/g,' ')}</td>
      <td><span class="type-badge t-${type}" style="font-size:0.5rem;padding:1px 6px">${type}</span></td>
      <td class="${catClass}">${cat.slice(0,4).toUpperCase()}</td>
      <td>${pwr}</td>
      <td>${acc}</td>
      <td>${pp}</td>
    </tr>`;
  }).join('');
}

/* ── Render: Defense ── */
function renderDefense(types) {
  const grid = document.getElementById('defenseGrid');
  const results = computeDefense(types);
  grid.innerHTML = results.map(({ type, mult }) => {
    let cls = 'mult-neutral', label = '1×';
    if (mult === 0)   { cls = 'mult-immune';  label = '0×'; }
    else if (mult <= 0.25) { cls = 'mult-quarter'; label = '¼×'; }
    else if (mult <= 0.5)  { cls = 'mult-half';    label = '½×'; }
    else if (mult >= 4)    { cls = 'mult-quad';    label = '4×'; }
    else if (mult >= 2)    { cls = 'mult-double';  label = '2×'; }
    return `<div class="def-cell">
      <span class="def-type t-${type} type-badge" style="font-size:0.48rem;padding:1px 3px">${type.slice(0,4).toUpperCase()}</span>
      <span class="def-mult ${cls}">${label}</span>
    </div>`;
  }).join('');
}

/* ═══════════ LIST ═══════════ */
function renderList(pokemon) {
  filteredPokemon = pokemon;
  const list = document.getElementById('pokeList');
  if (!pokemon.length) { list.innerHTML = '<div class="loading-msg">NO RESULTS</div>'; return; }
  list.innerHTML = pokemon.map(p =>
    `<div class="poke-list-item${currentPokemonId === p.id ? ' active' : ''}" data-id="${p.id}">
      <img class="list-sprite" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png" alt="" loading="lazy" onerror="this.style.opacity=0">
      <div class="list-meta">
        <span class="list-num">#${String(p.id).padStart(3,'0')}</span>
        <span class="list-name">${p.name}</span>
      </div>
    </div>`
  ).join('');
}

function filterList() {
  const q    = document.getElementById('searchInput').value.trim().toLowerCase();
  const gen  = parseInt(document.getElementById('genFilter').value) || 0;
  const type = document.getElementById('typeFilter').value;

  let list = allPokemon;
  if (gen) { const [lo, hi] = GEN_RANGES[gen-1]; list = list.filter(p => p.id >= lo && p.id <= hi); }
  if (q)   { list = list.filter(p => p.name.includes(q) || String(p.id).includes(q)); }
  // Type filter requires fetched data — skip if not cached
  if (type) { list = list.filter(p => { const d = POKEMON_CACHE.get(p.id); return d ? d.types.some(t => t.type.name === type) : true; }); }
  renderList(list);
}

/* ═══════════ BOOTSTRAP ═══════════ */
async function bootstrap() {
  const stored = sessionStorage.getItem('pokedex_list_v1');
  if (stored) {
    allPokemon = JSON.parse(stored);
  } else {
    const data = await apiFetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
    allPokemon = data.results.map((p, i) => ({
      id: i + 1,
      name: p.name
    }));
    sessionStorage.setItem('pokedex_list_v1', JSON.stringify(allPokemon));
  }
  renderList(allPokemon);

  // Default: load Bulbasaur
  selectPokemon(1);
}

/* ═══════════ EVENT WIRING ═══════════ */
document.getElementById('pokeList').addEventListener('click', e => {
  const item = e.target.closest('.poke-list-item');
  if (!item) return;
  selectPokemon(Number(item.dataset.id));
  item.scrollIntoView({ block: 'nearest' });
});

document.getElementById('searchInput').addEventListener('input', filterList);
document.getElementById('genFilter').addEventListener('change', filterList);
document.getElementById('typeFilter').addEventListener('change', filterList);

document.getElementById('shinyBtn').addEventListener('click', () => {
  isShiny = !isShiny;
  document.getElementById('shinyBtn').classList.toggle('active', isShiny);
  if (currentPokemonId) loadSprite(currentData?.id ?? currentPokemonId, isShiny);
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

document.querySelectorAll('.method-chip').forEach(chip => {
  chip.addEventListener('click', async () => {
    document.querySelectorAll('.method-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeMethod = chip.dataset.method;
    if (currentData) await renderMoves(currentData, activeMethod);
  });
});

document.getElementById('prevBtn').addEventListener('click', () => {
  const idx = filteredPokemon.findIndex(p => p.id === currentPokemonId);
  if (idx > 0) selectPokemon(filteredPokemon[idx - 1].id);
  else if (currentPokemonId > 1) selectPokemon(currentPokemonId - 1);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  const idx = filteredPokemon.findIndex(p => p.id === currentPokemonId);
  if (idx >= 0 && idx < filteredPokemon.length - 1) selectPokemon(filteredPokemon[idx + 1].id);
  else if (currentPokemonId < 1025) selectPokemon(currentPokemonId + 1);
});

bootstrap();
</script>
