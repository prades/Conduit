<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRAGONLORD POKÉDEX</title>
  <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"}}</script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:         #020912;
      --bg2:        #050d1c;
      --bg3:        #070c1a;
      --cyan:       #00e5ff;
      --cyan-dim:   rgba(0,229,255,0.12);
      --gold:       #ffd700;
      --dim:        #28385a;
      --dim2:       #3a5278;
      --text:       #7aa8cc;
      --text2:      #b8d4ec;
      --green:      #00ff88;
      --line:       rgba(0,229,255,0.09);
      --scan-color: #00e5ff;
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      display: flex; flex-direction: column;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--dim); }
    * { scrollbar-width: thin; scrollbar-color: var(--dim) transparent; }

    /* ════════════════════════════════════
       HEADER
    ════════════════════════════════════ */
    .app-header {
      display: flex; align-items: center; gap: 16px;
      padding: 0 20px; height: 46px; flex-shrink: 0;
      background: rgba(2,9,18,0.97);
      border-bottom: 1px solid var(--line);
      position: relative;
    }
    .app-header::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--scan-color) 40%, var(--scan-color) 60%, transparent 100%);
      opacity: 0.25;
    }
    .back-link {
      font-size: 0.68rem; letter-spacing: 0.1em; color: var(--dim2);
      text-decoration: none; transition: color 0.18s; white-space: nowrap;
    }
    .back-link:hover { color: var(--cyan); }
    .header-sys-id {
      font-size: 0.6rem; letter-spacing: 0.18em; color: var(--cyan); opacity: 0.55;
      white-space: nowrap; min-width: 80px;
    }
    .header-title {
      font-size: 0.75rem; letter-spacing: 0.22em; color: var(--cyan);
      flex: 1; text-align: center;
      text-shadow: 0 0 18px rgba(0,229,255,0.35);
    }
    .header-nav { display: flex; align-items: center; gap: 8px; }
    #headerPokeName {
      font-size: 0.7rem; letter-spacing: 0.1em; color: var(--text2);
      min-width: 160px; text-align: center;
    }
    .nav-btn {
      background: none; border: 1px solid rgba(0,229,255,0.18); color: var(--dim2);
      font-family: inherit; font-size: 0.68rem; padding: 3px 11px; cursor: pointer;
      clip-path: polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);
      transition: all 0.15s; letter-spacing: 0.08em;
    }
    .nav-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    /* ════════════════════════════════════
       MAIN GRID
    ════════════════════════════════════ */
    .main-grid {
      display: grid; grid-template-columns: 196px 1fr;
      flex: 1; overflow: hidden;
    }

    /* ════════════════════════════════════
       SIDEBAR
    ════════════════════════════════════ */
    .sidebar {
      border-right: 1px solid var(--line);
      display: flex; flex-direction: column; overflow: hidden;
      background: var(--bg2);
    }
    .sidebar-header {
      padding: 7px 12px; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .status-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--cyan); box-shadow: 0 0 6px var(--cyan);
      flex-shrink: 0; animation: dotPulse 2.4s ease-in-out infinite;
    }
    @keyframes dotPulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .sidebar-label {
      font-size: 0.5rem; letter-spacing: 0.22em; color: var(--cyan); opacity: 0.65;
    }
    .sidebar-controls {
      padding: 8px; display: flex; flex-direction: column; gap: 5px;
      border-bottom: 1px solid var(--line); flex-shrink: 0;
    }
    .search-input {
      width: 100%;
      background: rgba(0,229,255,0.03);
      border: 1px solid rgba(0,229,255,0.12);
      color: var(--text2); font-family: inherit; font-size: 0.63rem;
      letter-spacing: 0.08em; padding: 5px 9px; outline: none;
      clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
      transition: border-color 0.18s;
    }
    .search-input:focus { border-color: rgba(0,229,255,0.35); }
    .search-input::placeholder { color: var(--dim); }
    .filter-row { display: flex; gap: 4px; }
    .filter-sel {
      flex: 1; background: rgba(0,229,255,0.03); border: 1px solid rgba(0,229,255,0.1);
      color: var(--dim2); font-family: inherit; font-size: 0.56rem;
      letter-spacing: 0.05em; padding: 3px 5px; outline: none; cursor: pointer;
      transition: border-color 0.15s;
    }
    .filter-sel:focus { border-color: rgba(0,229,255,0.28); color: var(--text); }
    .filter-sel option { background: #060d1a; color: var(--text); }

    .sidebar-count {
      padding: 4px 12px; font-size: 0.47rem; letter-spacing: 0.14em;
      color: var(--dim); border-bottom: 1px solid var(--line); flex-shrink: 0;
    }
    .sidebar-count em { color: var(--cyan); font-style: normal; }

    .poke-list { flex: 1; overflow-y: auto; }
    .poke-list-item {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 9px 5px 11px; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.025);
      border-left: 2px solid transparent;
      transition: background 0.12s, border-color 0.12s;
      position: relative;
    }
    .poke-list-item:hover { background: rgba(0,229,255,0.04); border-left-color: rgba(0,229,255,0.25); }
    .poke-list-item.active { background: rgba(0,229,255,0.08); border-left-color: var(--cyan); }
    .poke-list-item.active::after {
      content: '▶';
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      font-size: 0.45rem; color: var(--cyan); opacity: 0.6;
    }
    .list-sprite { width: 32px; height: 32px; image-rendering: pixelated; flex-shrink: 0; }
    .list-meta { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .list-num { font-size: 0.5rem; color: var(--dim); letter-spacing: 0.1em; }
    .poke-list-item.active .list-num { color: rgba(0,229,255,0.5); }
    .list-name {
      font-size: 0.63rem; letter-spacing: 0.04em;
      text-transform: capitalize; color: var(--text2);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ════════════════════════════════════
       RIGHT PANEL
    ════════════════════════════════════ */
    .right-panel { display: grid; grid-template-columns: 320px 1fr; overflow: hidden; }

    /* ════════════════════════════════════
       SCENE PANEL + SCAN CHAMBER
    ════════════════════════════════════ */
    .scene-panel { display: flex; flex-direction: column; border-right: 1px solid var(--line); overflow: hidden; }

    .scan-chamber {
      flex: 1; position: relative; overflow: hidden;
      background: #010407; min-height: 0;
      display: flex; align-items: center; justify-content: center;
    }

    /* Grid background */
    .chamber-grid {
      position: absolute; inset: 0; z-index: 1;
      background-image:
        linear-gradient(rgba(0,229,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.035) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    .chamber-grid::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 68% 68% at 50% 50%, transparent 35%, #010407 100%);
    }

    /* THREE.js canvas sits transparent over the grid */
    #threeCanvas {
      position: absolute; inset: 0; z-index: 2;
      display: block; width: 100%; height: 100%;
    }

    /* Corner brackets */
    .corner-bracket { position: absolute; width: 22px; height: 22px; z-index: 4; }
    .corner-bracket::before,
    .corner-bracket::after {
      content: ''; position: absolute;
      background: var(--scan-color);
      box-shadow: 0 0 5px var(--scan-color);
      transition: background 0.5s, box-shadow 0.5s;
    }
    .corner-bracket::before { width: 100%; height: 1.5px; top: 0; left: 0; }
    .corner-bracket::after  { width: 1.5px; height: 100%; top: 0; left: 0; }
    .corner-bracket.tl { top: 16px; left: 16px; }
    .corner-bracket.tr { top: 16px; right: 16px; transform: scaleX(-1); }
    .corner-bracket.bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
    .corner-bracket.br { bottom: 16px; right: 16px; transform: scale(-1,-1); }

    /* Sweep line */
    @keyframes sweep {
      0%   { top: 8%; opacity: 0; }
      6%   { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { top: 92%; opacity: 0; }
    }
    .scan-line {
      position: absolute; left: 8%; right: 8%; height: 1px; z-index: 5;
      background: linear-gradient(90deg,
        transparent 0%, var(--scan-color) 25%, var(--scan-color) 75%, transparent 100%);
      box-shadow: 0 0 8px 2px color-mix(in srgb, var(--scan-color) 40%, transparent);
      animation: sweep 5.5s ease-in-out infinite;
      animation-delay: -1.5s;
      transition: background 0.5s;
    }

    /* Sprite */
    #pokemonSpriteImg {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 6;
      width: 180px; height: 180px;
      image-rendering: pixelated; object-fit: contain;
      filter: drop-shadow(0 0 22px color-mix(in srgb, var(--scan-color) 70%, transparent))
              drop-shadow(0 0 8px rgba(0,0,0,0.9));
      transition: filter 0.5s;
      animation: spriteBob 3.2s ease-in-out infinite;
    }
    @keyframes spriteBob {
      0%,100% { transform: translate(-50%, -50%); }
      50%     { transform: translate(-50%, calc(-50% - 6px)); }
    }
    #pokemonSpriteImg.shiny {
      filter: drop-shadow(0 0 22px rgba(255,215,0,0.55))
              drop-shadow(0 0 10px rgba(255,215,0,0.25))
              brightness(1.1);
    }

    /* Scanline overlay */
    .chamber-scanlines {
      position: absolute; inset: 0; z-index: 7; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px
      );
    }

    /* HUD text */
    .chamber-hud {
      position: absolute; z-index: 8;
      font-size: 0.47rem; letter-spacing: 0.2em;
      color: var(--scan-color); opacity: 0.45;
      transition: color 0.5s;
    }
    .chamber-hud.tl { top: 20px; left: 46px; }
    .chamber-hud.br { bottom: 20px; right: 46px; }

    /* Scene footer */
    .scene-footer {
      padding: 8px 13px; display: flex; align-items: center; gap: 9px;
      border-top: 1px solid var(--line); flex-shrink: 0;
      background: rgba(2,9,18,0.85);
    }
    .type-badges { display: flex; gap: 5px; flex: 1; flex-wrap: wrap; }
    .type-badge {
      font-size: 0.57rem; letter-spacing: 0.12em; padding: 2px 9px;
      text-transform: uppercase; font-weight: 700;
    }
    .shiny-btn {
      background: none; border: 1px solid rgba(255,215,0,0.22); color: var(--dim2);
      font-family: inherit; font-size: 0.58rem; letter-spacing: 0.1em;
      padding: 3px 10px; cursor: pointer;
      clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
      transition: all 0.18s;
    }
    .shiny-btn.active, .shiny-btn:hover { border-color: var(--gold); color: var(--gold); }
    .cry-btn {
      background: none; border: 1px solid rgba(0,229,255,0.18); color: var(--dim2);
      font-size: 0.85rem; padding: 2px 7px; cursor: pointer;
      clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
      transition: all 0.18s; line-height: 1;
    }
    .cry-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .cry-btn.playing {
      color: var(--green); border-color: var(--green);
      animation: cryPulse 0.4s ease-in-out infinite alternate;
    }
    @keyframes cryPulse {
      from { box-shadow: 0 0 4px rgba(0,255,136,0.25); }
      to   { box-shadow: 0 0 14px rgba(0,255,136,0.6); }
    }

    /* ════════════════════════════════════
       INFO PANEL
    ════════════════════════════════════ */
    .info-panel { display: flex; flex-direction: column; overflow: hidden; }

    .poke-header {
      padding: 12px 18px 10px; border-bottom: 1px solid var(--line); flex-shrink: 0;
    }
    .poke-header-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 2px; }
    .poke-id { font-size: 0.62rem; letter-spacing: 0.18em; color: var(--cyan); opacity: 0.6; white-space: nowrap; }
    .poke-name {
      font-size: 1.25rem; font-weight: 900; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--text2);
      text-shadow: 0 0 28px rgba(0,229,255,0.15);
    }
    .poke-meta { font-size: 0.59rem; color: var(--dim2); letter-spacing: 0.1em; margin-top: 4px; margin-bottom: 7px; }
    .poke-type-row { display: flex; gap: 5px; }

    /* ── Stats ── */
    .stats-section { padding: 10px 18px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
    .section-label { font-size: 0.52rem; letter-spacing: 0.22em; color: var(--dim); margin-bottom: 7px; }
    .stat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .stat-name {
      font-size: 0.52rem; letter-spacing: 0.07em; color: var(--dim2);
      width: 34px; text-align: right; text-transform: uppercase; flex-shrink: 0;
    }
    /* Segmented bar */
    .stat-bar-track {
      flex: 1; height: 7px; position: relative;
      background: repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.04) 0px, rgba(255,255,255,0.04) 5px,
        transparent 5px, transparent 7px
      );
    }
    .stat-bar-fill {
      height: 100%; width: 0%;
      transition: width 0.75s cubic-bezier(0.22,1,0.36,1);
      background: repeating-linear-gradient(
        90deg,
        var(--sc) 0px, var(--sc) 5px,
        rgba(0,0,0,0.55) 5px, rgba(0,0,0,0.55) 7px
      );
      box-shadow: 2px 0 10px color-mix(in srgb, var(--sc) 60%, transparent);
    }
    .stat-val { font-size: 0.6rem; letter-spacing: 0.05em; width: 30px; text-align: right; flex-shrink: 0; }
    .bst-row { font-size: 0.52rem; letter-spacing: 0.16em; color: var(--dim); text-align: right; margin-top: 5px; }
    .bst-val { color: var(--gold); }

    /* ── Abilities ── */
    .abilities-section { padding: 7px 18px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
    .ability-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .ability-chip {
      font-size: 0.57rem; letter-spacing: 0.07em; padding: 2px 9px;
      border: 1px solid rgba(0,229,255,0.15); color: var(--dim2);
      clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
      text-transform: capitalize;
    }
    .ability-chip.hidden { border-color: rgba(255,215,0,0.22); color: rgba(255,215,0,0.55); }

    /* ── Tabs ── */
    .info-tabs { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    .tab-bar { display: flex; border-bottom: 1px solid var(--line); flex-shrink: 0; }
    .tab-btn {
      flex: 1; background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--dim); font-family: inherit; font-size: 0.57rem;
      letter-spacing: 0.12em; padding: 7px 4px; cursor: pointer;
      transition: all 0.15s; text-transform: uppercase;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .tab-panel { display: none; flex: 1; overflow-y: auto; padding: 10px 18px; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 7px; }

    /* ── Move table ── */
    .gen-chips {
      display: flex; gap: 4px; flex-wrap: wrap; flex-shrink: 0;
      padding-bottom: 5px; border-bottom: 1px dashed rgba(0,229,255,0.08); margin-bottom: 3px;
    }
    .gen-chip {
      background: none; border: 1px solid rgba(255,255,255,0.07); color: var(--dim2);
      font-family: inherit; font-size: 0.5rem; letter-spacing: 0.08em;
      padding: 2px 6px; cursor: pointer;
      clip-path: polygon(3px 0%,100% 0%,calc(100% - 3px) 100%,0% 100%);
      transition: all 0.12s;
    }
    .gen-chip:hover { border-color: rgba(255,215,0,0.35); color: var(--gold); }
    .gen-chip.active { background: rgba(255,215,0,0.08); border-color: var(--gold); color: var(--gold); }
    .method-chips { display: flex; gap: 5px; flex-shrink: 0; }
    .method-chip {
      background: none; border: 1px solid rgba(255,255,255,0.08); color: var(--dim2);
      font-family: inherit; font-size: 0.57rem; letter-spacing: 0.1em;
      padding: 3px 9px; cursor: pointer;
      clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
      transition: all 0.12s;
    }
    .method-chip:hover { border-color: var(--cyan); color: var(--cyan); }
    .method-chip.active { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }
    .move-table-wrap { overflow-x: auto; flex: 1; }
    .move-table { width: 100%; border-collapse: collapse; font-size: 0.58rem; }
    .move-table th {
      text-align: left; color: var(--dim); letter-spacing: 0.12em;
      padding: 4px 6px; border-bottom: 1px solid var(--line); white-space: nowrap;
    }
    .move-table td {
      padding: 3px 6px; border-bottom: 1px solid rgba(255,255,255,0.025);
      vertical-align: middle; letter-spacing: 0.05em; white-space: nowrap; text-transform: capitalize;
    }
    .move-table tr:hover td { background: rgba(0,229,255,0.03); }
    .move-lv { color: var(--gold); }
    .cat-physical { color: #ff5555; }
    .cat-special  { color: #5588ff; }
    .cat-status   { color: var(--dim2); }
    .empty-msg { color: var(--dim); font-size: 0.62rem; letter-spacing: 0.1em; padding: 18px 0; }

    /* ── Evolution tree ── */
    .evo-tree { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; padding: 4px 0; }
    .evo-node {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 6px 8px; border: 1px solid rgba(0,229,255,0.1);
      background: rgba(0,229,255,0.025); cursor: pointer;
      clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
      transition: all 0.18s; min-width: 68px;
    }
    .evo-node:hover { background: rgba(0,229,255,0.08); border-color: rgba(0,229,255,0.4); }
    .evo-node.current { background: rgba(255,215,0,0.06); border-color: rgba(255,215,0,0.45); }
    .evo-node img { width: 54px; height: 54px; image-rendering: pixelated; }
    .evo-node .evo-name { font-size: 0.57rem; letter-spacing: 0.05em; text-transform: capitalize; color: var(--text2); }
    .evo-node .evo-num  { font-size: 0.48rem; color: var(--dim2); letter-spacing: 0.1em; }
    .evo-arrow {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      color: var(--dim); font-size: 0.52rem; letter-spacing: 0.05em;
      padding: 0 4px; max-width: 88px; text-align: center;
    }
    .evo-arrow .arrow-icon { color: var(--cyan); font-size: 0.9rem; line-height: 1; }
    .evo-arrow .trigger   { color: var(--gold); font-size: 0.5rem; }
    .evo-branches { display: flex; flex-direction: column; gap: 6px; }
    .evo-branch   { display: flex; align-items: center; gap: 6px; }
    .evo-loading  { color: var(--dim); font-size: 0.62rem; letter-spacing: 0.1em; padding: 12px 0; }

    /* ── Defense grid ── */
    .defense-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
    .def-cell {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 5px 2px; border: 1px solid rgba(255,255,255,0.04);
      background: rgba(255,255,255,0.015);
    }
    .def-type  { font-size: 0.48rem; letter-spacing: 0.04em; text-align: center; line-height: 1.2; }
    .def-mult  { font-size: 0.6rem; font-weight: 700; }
    .mult-immune  { color: #52606e; }
    .mult-quarter { color: #34d399; }
    .mult-half    { color: #6ee7b7; }
    .mult-neutral { color: var(--dim); font-size: 0.46rem; }
    .mult-double  { color: #fbbf24; }
    .mult-quad    { color: #ef4444; font-weight: 900; }

    /* ── Dex entry ── */
    .dex-entry { font-size: 0.65rem; line-height: 1.9; color: var(--dim2); letter-spacing: 0.05em; }

    /* ── Type colors ── */
    .t-normal   { background:rgba(168,168,120,.12); color:#a8a878; border:1px solid rgba(168,168,120,.25); }
    .t-fire     { background:rgba(240,128,48,.12);  color:#f08030; border:1px solid rgba(240,128,48,.25); }
    .t-water    { background:rgba(104,144,240,.12); color:#6890f0; border:1px solid rgba(104,144,240,.25); }
    .t-electric { background:rgba(248,208,48,.12);  color:#f8d030; border:1px solid rgba(248,208,48,.25); }
    .t-grass    { background:rgba(120,200,80,.12);  color:#78c850; border:1px solid rgba(120,200,80,.25); }

<script type="module">
import * as THREE from 'three';

/* ══ Type colours ══ */

const TYPE_FOG = {

/* ══ Type chart ══ */
const TC = {
  normal:   {rock:.5,steel:.5,ghost:0},
  fire:     {fire:.5,water:.5,rock:.5,dragon:.5,grass:2,ice:2,bug:2,steel:2},

  fighting: {poison:.5,flying:.5,psychic:.5,bug:.5,fairy:.5,ghost:0,normal:2,ice:2,rock:2,dark:2,steel:2},
  poison:   {poison:.5,ground:.5,rock:.5,ghost:.5,steel:0,grass:2,fairy:2},
  ground:   {grass:.5,bug:.5,flying:0,fire:2,electric:2,poison:2,rock:2,steel:2},
  flying:   {electric:.5,rock:.5,steel:.5,grass:2,fighting:2,bug:2},
  psychic:  {psychic:.5,steel:.5,dark:0,fighting:2,poison:2},
  bug:      {fire:.5,fighting:.5,flying:.5,ghost:.5,steel:.5,fairy:.5,grass:2,psychic:2,dark:2},

  steel:    {fire:.5,water:.5,electric:.5,steel:.5,ice:2,rock:2,fairy:2},
  fairy:    {fire:.5,poison:.5,steel:.5,fighting:2,dragon:2,dark:2}
};
const ALL_TYPES = Object.keys(TC);

function computeDefense(types) {
  return ALL_TYPES.map(atk => {
    let m = 1;
    types.forEach(def => { m *= TC[atk]?.[def] ?? 1; });
    return { type: atk, mult: m };
  });
}

/* ══ Gen ranges ══ */
const GEN_RANGES = [[1,151],[152,251],[252,386],[387,493],[494,649],[650,721],[722,809],[810,905],[906,1025]];

/* ══ Version groups ══ */
const VERSION_GROUPS = [
  { slug:'scarlet-violet',            label:'SV',   gen:9 },
  { slug:'sword-shield',              label:'SWSH', gen:8 },
  { slug:'ultra-sun-ultra-moon',      label:'USUM', gen:7 },
  { slug:'sun-moon',                  label:'SM',   gen:7 },
  { slug:'omega-ruby-alpha-sapphire', label:'ORAS', gen:6 },
  { slug:'x-y',                       label:'XY',   gen:6 },
  { slug:'black-2-white-2',           label:'B2W2', gen:5 },

  { slug:'platinum',                  label:'Pt',   gen:4 },

  { slug:'emerald',                   label:'Em',   gen:3 },

];

/* ══ API helpers ══ */
const POKEMON_CACHE = new Map(), SPECIES_CACHE = new Map();
const MOVE_CACHE    = new Map(), EVO_CACHE     = new Map();

async function apiFetch(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}
async function fetchPokemon(id) {
  if (POKEMON_CACHE.has(id)) return POKEMON_CACHE.get(id);
  const d = await apiFetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
  POKEMON_CACHE.set(id, d); POKEMON_CACHE.set(d.name, d); return d;
}
async function fetchSpecies(id) {
  if (SPECIES_CACHE.has(id)) return SPECIES_CACHE.get(id);
  const d = await apiFetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`);
  SPECIES_CACHE.set(id, d); return d;
}
async function fetchMove(name) {
  if (MOVE_CACHE.has(name)) return MOVE_CACHE.get(name);
  try {
    const d = await apiFetch(`https://pokeapi.co/api/v2/move/${name}`);
    MOVE_CACHE.set(name, d); return d;
  } catch { return null; }
}
async function fetchEvolution(url) {
  if (EVO_CACHE.has(url)) return EVO_CACHE.get(url);
  const d = await apiFetch(url); EVO_CACHE.set(url, d); return d;
}

/* ══ Move helpers ══ */
function getMovesList(data, method, vg) {
  return data.moves
    .filter(m => m.version_group_details.some(d =>
      d.version_group.name === vg && d.move_learn_method.name === method))
    .map(m => ({
      name: m.move.name,
      level: m.version_group_details.find(d =>
        d.version_group.name === vg && d.move_learn_method.name === method)?.level_learned_at ?? 0
    }))
    .sort((a, b) => a.level - b.level);
}
function availableVersionGroups(data) {
  const seen = new Set();
  data.moves.forEach(m => m.version_group_details.forEach(d => seen.add(d.version_group.name)));
  return VERSION_GROUPS.filter(vg => seen.has(vg.slug));
}
function evolutionTriggerText(details) {
  if (!details?.length) return '?';
  const d = details[0];
  if (d.min_level)            return `Lv ${d.min_level}`;
  if (d.item)                 return `Use ${d.item.name.replace(/-/g,' ')}`;
  if (d.held_item)            return `Hold ${d.held_item.name.replace(/-/g,' ')}`;
  if (d.min_happiness)        return `♥ ${d.min_happiness}`;
  if (d.min_affection)        return `Affection ${d.min_affection}`;
  if (d.min_beauty)           return `Beauty ${d.min_beauty}`;
  if (d.known_move)           return `Know ${d.known_move.name.replace(/-/g,' ')}`;
  if (d.known_move_type)      return `Know ${d.known_move_type.name} move`;
  if (d.location)             return `@ ${d.location.name.replace(/-/g,' ')}`;
  if (d.trade_species)        return `Trade w/ ${d.trade_species.name}`;
  if (d.trigger?.name==='trade') return 'Trade';
  if (d.trigger?.name==='shed')  return 'Shed';
  if (d.time_of_day)          return d.time_of_day;
  if (d.gender===1)           return '♀';
  if (d.gender===2)           return '♂';
  if (d.needs_overworld_rain) return 'In rain';
  if (d.turn_upside_down)     return 'Upside down';
  return d.trigger?.name?.replace(/-/g,' ') || 'Special';
}

/* ════════════════════════════════════
   THREE.JS — atmospheric particle scene
   (transparent canvas layered over CSS grid)
════════════════════════════════════ */
const canvas = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);   /* fully transparent clear */
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020912, 0.11);

const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 80);
camera.position.set(0, 1.2, 5.5);
camera.lookAt(0, 0.5, 0);

const ambLight = new THREE.AmbientLight(0x0a1020, 5);
const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(2, 5, 3);
const typeLight = new THREE.PointLight(0x00e5ff, 10, 14);
typeLight.position.set(-1.5, 2.5, 2);
scene.add(ambLight, dirLight, typeLight);

/* Particle system */
let particlesMesh = null;
function buildParticles(hexColor) {
  if (particlesMesh) scene.remove(particlesMesh);
  const N = 140;
  const pos = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const r = 1.4 + Math.random() * 2.8;
    const a = Math.random() * Math.PI * 2;
    pos[i*3]   = Math.cos(a) * r;
    pos[i*3+1] = Math.random() * 4.5 - 0.8;
    pos[i*3+2] = Math.sin(a) * r;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color: hexColor, size: 0.04, transparent: true, opacity: 0.65 });
  particlesMesh = new THREE.Points(geo, mat);
  scene.add(particlesMesh);
}

/* Resize */
function resizeRenderer() {
  const wrap = canvas.parentElement;
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(resizeRenderer).observe(canvas.parentElement);
resizeRenderer();

/* Animate */
const clock = new THREE.Clock();
(function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  if (particlesMesh) particlesMesh.rotation.y = t * 0.07;
  renderer.render(scene, camera);
})();

/* Type theme — updates THREE.js lights + CSS scan-color for all HUD elements */
function setTypeTheme(primaryType) {
  const hexStr = TYPE_COLOR[primaryType] || '#00e5ff';
  const hex    = parseInt(hexStr.replace('#',''), 16);
  const fogHex = TYPE_FOG[primaryType]  || 0x020912;
  typeLight.color.setHex(hex);
  scene.fog.color.setHex(fogHex);
  buildParticles(hex);
  /* CSS custom property drives corner brackets, scan line, HUD text, header line */
  document.documentElement.style.setProperty('--scan-color', hexStr);
}

/* ════════════════════════════════════
   SPRITE
════════════════════════════════════ */
const spriteImg = document.getElementById('pokemonSpriteImg');
function loadSprite(id, shiny = false) {
  spriteImg.classList.toggle('shiny', shiny);
  if (id <= 649) {
    const local    = shiny ? `sprites/animated/shiny/${id}.gif` : `sprites/animated/${id}.gif`;
    const fallback = shiny
      ? `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/home/shiny/${id}.png`
      : `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/home/${id}.png`;
    spriteImg.onerror = () => { spriteImg.onerror = null; spriteImg.src = fallback; };
    spriteImg.src = local;
  } else {
    spriteImg.onerror = null;
    spriteImg.src = shiny
      ? `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/home/shiny/${id}.png`
      : `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/home/${id}.png`;
  }
}

/* ════════════════════════════════════
   UI STATE
════════════════════════════════════ */
let currentPokemonId = null, currentData = null;
let isShiny = false, activeMethod = 'level-up', activeVG = 'scarlet-violet';
let allPokemon = [], filteredPokemon = [], cryAudio = null;

/* ════════════════════════════════════
   SELECT POKÉMON
════════════════════════════════════ */
async function selectPokemon(id) {
  currentPokemonId = id;
  document.getElementById('pokeName').textContent = '…';
  document.getElementById('pokeMeta').textContent = '';

  try {
    const [data, species] = await Promise.all([fetchPokemon(id), fetchSpecies(id)]);
    currentData = data;

    const pad4 = n => String(n).padStart(4, '0');
    const pad3 = n => String(n).padStart(3, '0');

    /* Header */
    document.getElementById('headerSysId').textContent = `SYS-${pad4(data.id)}`;
    document.getElementById('headerPokeName').textContent = `#${pad3(data.id)}  ${data.name.toUpperCase()}`;

    /* Info panel header */
    document.getElementById('pokeId').textContent = `#${pad3(data.id)}`;
    document.getElementById('pokeName').textContent = data.name.toUpperCase();

    const genus = species.genera?.find(g => g.language.name === 'en')?.genus || '';
    const htM   = (data.height / 10).toFixed(1);
    const wtKg  = (data.weight / 10).toFixed(1);
    document.getElementById('pokeMeta').textContent =
      `${genus}  ·  HT ${htM} m  ·  WT ${wtKg} kg`;

    /* HUD labels */
    document.getElementById('hudTL').textContent = `SYS-${pad4(data.id)}`;

    /* Type badges — scene footer + info header */
    const typesHtml = data.types.map(t =>
      `<span class="type-badge t-${t.type.name}">${t.type.name.toUpperCase()}</span>`
    ).join('');
    document.getElementById('typeBadges').innerHTML  = typesHtml;
    document.getElementById('pokeTypeRow').innerHTML = typesHtml;

    /* Theme */
    const primaryType = data.types[0].type.name;
    setTypeTheme(primaryType);
    loadSprite(data.id, isShiny);

    /* Panels */
    renderStats(data.stats);
    renderAbilities(data.abilities);
    renderGenChips(data);
    await renderMoves(data, activeMethod, activeVG);
    renderDefense(data.types.map(t => t.type.name));
    renderEvolution(species);

    const entry = species.flavor_text_entries?.find(e => e.language.name === 'en')?.flavor_text || 'No entry.';
    document.getElementById('dexEntry').textContent = entry.replace(/\f/g, ' ');

    /* Sidebar highlight */
    document.querySelectorAll('.poke-list-item').forEach(el => {
      el.classList.toggle('active', Number(el.dataset.id) === data.id);
    });

  } catch(e) {
    document.getElementById('pokeName').textContent = 'NOT FOUND';
    console.error(e);
  }
}

/* ════════════════════════════════════
   RENDER FUNCTIONS
════════════════════════════════════ */

/* Segmented stat bars */
const STAT_NAMES = {
  hp:'HP', attack:'ATK', defense:'DEF',
  'special-attack':'SpA', 'special-defense':'SpD', speed:'SPE'
};
const STAT_COLORS = {
  hp:'#00e5ff', attack:'#ff5050', defense:'#4488ff',
  'special-attack':'#cc55ff', 'special-defense':'#44ddaa', speed:'#ffcc00'
};
function renderStats(stats) {
  const el = document.getElementById('statsBars');
  let bst = 0;
  el.innerHTML = stats.map(s => {
    bst += s.base_stat;
    const pct = Math.min(100, (s.base_stat / 255) * 100);
    const col = STAT_COLORS[s.stat.name] || '#00e5ff';
    return `<div class="stat-row">
      <span class="stat-name">${STAT_NAMES[s.stat.name] || s.stat.name}</span>
      <div class="stat-bar-track">
        <div class="stat-bar-fill" style="--sc:${col};width:0%" data-pct="${pct}"></div>
      </div>
      <span class="stat-val" style="color:${col}">${s.base_stat}</span>
    </div>`;
  }).join('');
  document.getElementById('bstRow').innerHTML = `BST <span class="bst-val">${bst}</span>`;
  requestAnimationFrame(() => {
    el.querySelectorAll('.stat-bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.pct + '%';
    });
  });
}

function renderAbilities(abilities) {
  document.getElementById('abilitiesEl').innerHTML = abilities.map(a =>
    `<span class="ability-chip${a.is_hidden ? ' hidden' : ''}">${a.ability.name.replace(/-/g,' ')}${a.is_hidden ? ' ✦' : ''}</span>`
  ).join('');
}

function renderGenChips(data) {
  const wrap  = document.getElementById('genChips');
  const avail = availableVersionGroups(data);
  if (!avail.find(vg => vg.slug === activeVG) && avail.length) activeVG = avail[0].slug;
  wrap.innerHTML = avail.map(vg =>
    `<button class="gen-chip${vg.slug === activeVG ? ' active' : ''}" data-vg="${vg.slug}">${vg.label}</button>`
  ).join('');
}

async function renderMoves(data, method, vgSlug) {
  const tbody = document.getElementById('moveTableBody');
  tbody.innerHTML = `<tr><td colspan="7" class="empty-msg">LOADING…</td></tr>`;
  const moves   = getMovesList(data, method, vgSlug);
  const vgLabel = VERSION_GROUPS.find(v => v.slug === vgSlug)?.label || vgSlug;
  if (!moves.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty-msg">No ${method} moves in ${vgLabel}.</td></tr>`;
    return;
  }
  const details = await Promise.all(moves.map(m => fetchMove(m.name)));
  tbody.innerHTML = moves.map((m, i) => {
    const d = details[i]; if (!d) return '';
    const type = d.type?.name || '?';
    const cat  = d.damage_class?.name || 'status';
    const catClass = cat==='physical' ? 'cat-physical' : cat==='special' ? 'cat-special' : 'cat-status';
    const lvStr = method === 'level-up' ? (m.level || '—') : '—';
    return `<tr>
      <td class="move-lv">${lvStr}</td>
      <td>${m.name.replace(/-/g,' ')}</td>
      <td><span class="type-badge t-${type}" style="font-size:0.5rem;padding:1px 6px">${type}</span></td>
      <td class="${catClass}">${cat.slice(0,4).toUpperCase()}</td>
      <td>${d.power??'—'}</td><td>${d.accuracy??'—'}</td><td>${d.pp??'—'}</td>
    </tr>`;
  }).join('');
}

function renderDefense(types) {
  document.getElementById('defenseGrid').innerHTML = computeDefense(types).map(({ type, mult }) => {
    let cls = 'mult-neutral', label = '1×';
    if (mult === 0)        { cls='mult-immune';  label='0×'; }
    else if (mult <= 0.25) { cls='mult-quarter'; label='¼×'; }
    else if (mult <= 0.5)  { cls='mult-half';    label='½×'; }
    else if (mult >= 4)    { cls='mult-quad';    label='4×'; }
    else if (mult >= 2)    { cls='mult-double';  label='2×'; }
    return `<div class="def-cell">
      <span class="def-type t-${type} type-badge" style="font-size:0.46rem;padding:1px 3px">${type.slice(0,4).toUpperCase()}</span>
      <span class="def-mult ${cls}">${label}</span>
    </div>`;
  }).join('');
}

function speciesIdFromUrl(url) {
  const m = url.match(/\/pokemon-species\/(\d+)\//); return m ? Number(m[1]) : null;
}
async function renderEvolution(species) {
  const wrap = document.getElementById('evoTree');
  if (!species?.evolution_chain?.url) { wrap.innerHTML = `<div class="empty-msg">No evolution data.</div>`; return; }
  wrap.innerHTML = `<div class="evo-loading">LOADING CHAIN…</div>`;
  try {
    const chain = await fetchEvolution(species.evolution_chain.url);
    wrap.innerHTML = renderEvoNode(chain.chain);
  } catch { wrap.innerHTML = `<div class="empty-msg">Failed to load chain.</div>`; }
}
function renderEvoNode(node) {
  const id = speciesIdFromUrl(node.species.url);
  const isCurrent = id === currentPokemonId;
  const nodeHtml = `<div class="evo-node${isCurrent?' current':''}" data-id="${id}">
    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png"
         alt="${node.species.name}" onerror="this.style.opacity=0">
    <div class="evo-num">#${String(id).padStart(3,'0')}</div>
    <div class="evo-name">${node.species.name}</div>
  </div>`;
  if (!node.evolves_to.length) return nodeHtml;
  if (node.evolves_to.length === 1) {
    const next = node.evolves_to[0];
    return nodeHtml +
      `<div class="evo-arrow"><span class="arrow-icon">▶</span><span class="trigger">${evolutionTriggerText(next.evolution_details)}</span></div>` +
      renderEvoNode(next);
  }
  const branches = node.evolves_to.map(next =>
    `<div class="evo-branch">
      <div class="evo-arrow"><span class="arrow-icon">▶</span><span class="trigger">${evolutionTriggerText(next.evolution_details)}</span></div>
      ${renderEvoNode(next)}
    </div>`
  ).join('');
  return nodeHtml + `<div class="evo-branches">${branches}</div>`;
}

/* ════════════════════════════════════
   LIST
════════════════════════════════════ */
function renderList(pokemon) {
  filteredPokemon = pokemon;
  const list = document.getElementById('pokeList');
  const countEl = document.querySelector('#sidebarCount em');
  if (countEl) countEl.textContent = pokemon.length.toLocaleString();
  if (!pokemon.length) { list.innerHTML = '<div class="loading-msg">NO RESULTS</div>'; return; }
  list.innerHTML = pokemon.map(p =>
    `<div class="poke-list-item${currentPokemonId===p.id?' active':''}" data-id="${p.id}">
      <img class="list-sprite"
           src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png"
           alt="" loading="lazy" onerror="this.style.opacity=0">
      <div class="list-meta">
        <span class="list-num">#${String(p.id).padStart(3,'0')}</span>
        <span class="list-name">${p.name}</span>
      </div>
    </div>`
  ).join('');
}

function filterList() {
  const q    = document.getElementById('searchInput').value.trim().toLowerCase();
  const gen  = parseInt(document.getElementById('genFilter').value) || 0;
  const type = document.getElementById('typeFilter').value;
  let list = allPokemon;
  if (gen)  { const [lo,hi] = GEN_RANGES[gen-1]; list = list.filter(p => p.id>=lo && p.id<=hi); }
  if (q)    list = list.filter(p => p.name.includes(q) || String(p.id).includes(q));
  if (type) list = list.filter(p => { const d=POKEMON_CACHE.get(p.id); return d ? d.types.some(t=>t.type.name===type) : true; });
  renderList(list);
}

/* ════════════════════════════════════
   BOOTSTRAP
════════════════════════════════════ */
async function bootstrap() {
  const stored = sessionStorage.getItem('pokedex_list_v1');
  if (stored) {
    allPokemon = JSON.parse(stored);
  } else {
    const data = await apiFetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
    allPokemon = data.results.map((p, i) => ({ id: i+1, name: p.name }));
    sessionStorage.setItem('pokedex_list_v1', JSON.stringify(allPokemon));
  }
  renderList(allPokemon);
  selectPokemon(1);
}

/* ════════════════════════════════════
   EVENT WIRING
════════════════════════════════════ */
document.getElementById('pokeList').addEventListener('click', e => {
  const item = e.target.closest('.poke-list-item');
  if (!item) return;
  selectPokemon(Number(item.dataset.id));
  item.scrollIntoView({ block: 'nearest' });
});

document.getElementById('searchInput').addEventListener('input', filterList);
document.getElementById('genFilter').addEventListener('change', filterList);
document.getElementById('typeFilter').addEventListener('change', filterList);

document.getElementById('shinyBtn').addEventListener('click', () => {
  isShiny = !isShiny;
  document.getElementById('shinyBtn').classList.toggle('active', isShiny);
  if (currentPokemonId) loadSprite(currentData?.id ?? currentPokemonId, isShiny);
});

document.getElementById('cryBtn').addEventListener('click', () => {
  if (!currentPokemonId) return;
  const btn = document.getElementById('cryBtn');
  if (cryAudio) { cryAudio.pause(); cryAudio = null; }
  const url = `https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/latest/${currentPokemonId}.ogg`;
  cryAudio = new Audio(url);
  cryAudio.volume = 0.55;
  btn.classList.add('playing');
  cryAudio.play().catch(() => {
    cryAudio = new Audio(`https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/legacy/${currentPokemonId}.ogg`);
    cryAudio.volume = 0.55;
    cryAudio.play().catch(() => btn.classList.remove('playing'));
  });
  cryAudio.addEventListener('ended', () => btn.classList.remove('playing'));
  cryAudio.addEventListener('error', () => btn.classList.remove('playing'));
});

document.getElementById('genChips').addEventListener('click', async e => {
  const chip = e.target.closest('.gen-chip');
  if (!chip || !currentData) return;
  document.querySelectorAll('#genChips .gen-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeVG = chip.dataset.vg;
  await renderMoves(currentData, activeMethod, activeVG);
});

document.getElementById('evoTree').addEventListener('click', e => {
  const node = e.target.closest('.evo-node');
  if (!node) return;
  const id = Number(node.dataset.id);
  if (id && id !== currentPokemonId) selectPokemon(id);
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

document.querySelectorAll('.method-chip').forEach(chip => {
  chip.addEventListener('click', async () => {
    document.querySelectorAll('.method-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeMethod = chip.dataset.method;
    if (currentData) await renderMoves(currentData, activeMethod, activeVG);
  });
});

document.getElementById('prevBtn').addEventListener('click', () => {
  const idx = filteredPokemon.findIndex(p => p.id === currentPokemonId);
  if (idx > 0) selectPokemon(filteredPokemon[idx-1].id);
  else if (currentPokemonId > 1) selectPokemon(currentPokemonId - 1);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  const idx = filteredPokemon.findIndex(p => p.id === currentPokemonId);
  if (idx >= 0 && idx < filteredPokemon.length-1) selectPokemon(filteredPokemon[idx+1].id);
  else if (currentPokemonId < 1025) selectPokemon(currentPokemonId + 1);
});

bootstrap();
</script>
</body>
</html>
