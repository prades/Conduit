<div id="overlay">
    <h1 id="ovr-title">GAME OVER</h1>
    <p id="ovr-sub"></p>
    <p>Shards collected: <span class="stat" id="ovr-shards">0</span></p>
    <p>Enemies converted: <span class="stat" id="ovr-conv">0</span></p>
    <p>Waves survived: <span class="stat" id="ovr-waves">0</span></p>
    <div id="shopGrid"></div>
    <button class="ovr-btn" id="ovr-btn">RESTART</button>
</div>

<canvas id="cavernCanvas"></canvas>

<script>
// ── GLOBAL ERROR DISPLAY ──────────────────────────────────
window.onerror = function(msg, src, line, col, err) {
    const e = document.createElement("div");
    Object.assign(e.style, {
        position:"fixed", top:"0", left:"0", right:"0",
        background:"rgba(0,0,0,0.9)", color:"#ff5555",
        font:"12px monospace", padding:"10px",
        zIndex:"99999", whiteSpace:"pre-wrap"
    });
    e.textContent = "CRASH\n\n" + msg + "\nLine:" + line +
        (err && err.stack ? "\n\n" + err.stack : "");
    document.body.appendChild(e);
};
</script>
