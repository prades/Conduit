class Predator {
    constructor(typeName, def, x, y) {
        this.type = "predator";
        this.predatorType = typeName;
        this.x=x; this.y=y;
        this.dirX=1; this.dirY=0;
        this.facing=0;
        this.lastX=x; this.lastY=y;
        this.attackCooldown=0; this.attackWindup=0;
        this.attackAnim=0; this.headAngle=Math.atan2(this.dirY, this.dirX);
        this.headTurnSpeed=0.05;
        this.hitFlash=0; this.hitStun=0;
        this.health=def.health; this.maxHealth=def.health;
        this.moveSpeed=def.moveSpeed; this.power=def.power;
        this.entryDelay=30; this.reactionDelay=0;
        this.floatOffset=0;
        this.isRetreating=false;
        this.walkCycle=0;
        this.dead=false;
        this.body = {
            head:    { size:0.45, widthScale:1, heightScale:1 },
            thorax:  { size:0.9,  widthScale:1, heightScale:1 },
            abdomen: { size:0.75, widthScale:1, heightScale:1, segments:1, taper:0.9 }
        };
        this.segmentOrder=["head","thorax","abdomen"];
        this.segmentSpacing=10;
        this.joints = {
            neck:    {forward:0, vertical:0},
            waist:   {forward:0, vertical:0},
            legRoot: {forward:0, vertical:0},
            wingRoot:{forward:0, vertical:0}
        };
        this.appendages = {
            legs:      { count:6, spread:10, swingSpeed:0.25, coxa:6, femur:9, tibia:11 },
            wings:     { enabled:true, length:14.2, width:10, angleOffset:6 },
            mandibles: { enabled:true, length:5, spread:0.4, thickness:2 },
            antennae:  { enabled:false, length:6, curvature:0.3 },
            eyes:      { count:2, size:2, glow:0 },
            // Spider-specific
            pedipalps:   { enabled:false, length:8, thickness:2 },
            chelicerae:  { enabled:false, length:10, fangCurve:0.6, thickness:3 },
            spinnerets:  { enabled:false, count:2, size:3 }
        };
        this.armor = { plates:0, ridge:false };
        this.visual = {
            topLight:0.25, bottomDark:0.35, rimLight:0.4,
            segmentGradient:0.6, eyeGlow:0, wingAlpha:0.35, metalness:0
        };
        this.dimensions = { width:def.width, height:def.height };
        this.state="hunt";
        this.moveCooldown=0;
        this.target=null;
        this.currentTarget=null;
        this.color=def.color;
        this.animationPhase=Math.random()*Math.PI*2;
        this.wanderTarget=null;
        this.wanderTimer=0;
    }

    loadPreset(data) {
        if (!data) return;
        if (data.body) {
            Object.assign(this.body.head,    data.body.head    ||{});
            Object.assign(this.body.thorax,  data.body.thorax  ||{});
            Object.assign(this.body.abdomen, data.body.abdomen ||{});
            if (data.body.segmentSpacing) this.segmentSpacing=data.body.segmentSpacing;
        }
        if (data.dimensions)  Object.assign(this.dimensions, data.dimensions);
        if (data.appendages)  Object.keys(data.appendages).forEach(k => { if(this.appendages[k]) Object.assign(this.appendages[k],data.appendages[k]); });
        if (data.stats) {
            if (data.stats.moveSpeed) this.moveSpeed=data.stats.moveSpeed;
            if (data.stats.health)   { this.health=data.stats.health; this.maxHealth=data.stats.health; }
            if (data.stats.power)    this.power=data.stats.power;
        }
    }

    evaluateUtility() {
        const hr = this.health/this.maxHealth;
        const dxC=crystal.x-this.x, dyC=crystal.y-this.y;
        const distCrystal=Math.hypot(dxC,dyC);
        const attackScore = this.currentTarget&&!this.currentTarget.dead
            ? 1-Math.min(1,Math.hypot(this.currentTarget.x-this.x,this.currentTarget.y-this.y)/2) : 0;
        const retreatScore = (1-hr)*0.9;
        const huntScore    = 0.4+(1-Math.min(1,distCrystal/6))*0.2;
        return { attack:attackScore, retreat:retreatScore, hunt:huntScore, wander:0.1 };
    }

    update() {
        if (this.dead) return;

        // ── THREAT SCAN ──
        let threat=null, bestDist=Infinity;
        if (this.lastAttacker&&!this.lastAttacker.dead) {
            const dx=this.lastAttacker.x-this.x, dy=this.lastAttacker.y-this.y;
            const d=Math.sqrt(dx*dx+dy*dy);
            if (d<3) { threat=this.lastAttacker; bestDist=d; }
        }
        if (!threat) {
            actors.forEach(a => {
                if (a.team==="green"&&!a.dead&&(!a.spawnProtection||a.spawnProtection<=0)) {
                    const dx=a.x-this.x, dy=a.y-this.y, d=Math.sqrt(dx*dx+dy*dy);
                    if (d<1.2&&d<bestDist) { bestDist=d; threat=a; }
                }
            });
        }
        if (threat) {
            if (this.reactionDelay<=0) { this.state="attack"; this.currentTarget=threat; this.reactionDelay=20; }
            else this.reactionDelay--;
        }

        // ── HEAD LOOK ──
        // head tracking handled in HEAD CONTROL below
        if (!this.currentTarget || this.currentTarget.dead) this.headAngle+=Math.sin(frame*0.08)*0.02;

        // ── UTILITY AI ──
        const utils=this.evaluateUtility();
        let bestState=this.state, bestScore=utils[this.state]||0;
        for (const k in utils) {
            if (utils[k]>bestScore+0.15) { bestState=k; bestScore=utils[k]; }
        }
        if (this.state!==bestState) {
            if (this.state==="attack") this.moveSpeed=(PREDATOR_TYPES[this.predatorType]||{moveSpeed:this.moveSpeed}).moveSpeed;
            this.state=bestState;
        }

        // ── CRAWL IN ──
        if (this.state==="crawl_in") {
            if (this.entryDelay>0) { this.entryDelay--; return; }
            const dy=this.entryTargetY-this.y;
            if (Math.abs(dy)>0.1) this.y+=dy*0.05;
            else this.state="hunt";
            return;
        }

        // ── WANDER ──
        if (this.state==="wander") {
            if (!this.wanderTarget||this.wanderTimer<=0) {
                const angle=Math.random()*Math.PI*2, radius=3+Math.random()*5;
                this.wanderTarget={ x:this.x+Math.cos(angle)*radius, y:this.y+Math.sin(angle)*radius };
                this.wanderTimer=90+Math.random()*120;
            }
            const dx=this.wanderTarget.x-this.x, dy=this.wanderTarget.y-this.y;
            const dist=Math.hypot(dx,dy);
            if (dist>0.001) {
                const tx=dx/dist, ty=dy/dist, ts=0.12;
                this.dirX+=(tx-this.dirX)*ts; this.dirY+=(ty-this.dirY)*ts;
                const len=Math.hypot(this.dirX,this.dirY)||1;
                this.dirX/=len; this.dirY/=len;
            }
            if (dist>0.2) { const sp=this.moveSpeed*0.7; this.x+=(dx/dist)*sp; this.y+=(dy/dist)*sp; }
            else this.wanderTimer=20+Math.random()*40;
            this.wanderTimer--;
        }

        // ── DAY: stay docile unless provoked ──
        if (gameState.phase === "day" && this.team !== "green") {
            if (this.state === "hunt" || this.state === "attack") {
                // Only revert to wander if not provoked
                if (!this.provoked) {
                    this.state = "wander";
                    this.moveSpeed = (PREDATOR_TYPES[this.predatorType] || this.def || {moveSpeed:0.02}).moveSpeed || 0.02;
                }
            }
        }

        // ── HUNT (→ crystal) ──
        if (this.state==="hunt") {
            const dx=crystal.x-this.x, dy=crystal.y-this.y;
            const dist=Math.sqrt(dx*dx+dy*dy);
            if (dist>0.8) {
                this.x+=(dx/dist)*this.moveSpeed;
                this.y+=(dy/dist)*this.moveSpeed;
                this.dirX=dx/dist; this.dirY=dy/dist;
            } else {
                // ── ATTACK CRYSTAL ──
                if (!this.attackCooldown) this.attackCooldown=0;
                this.attackCooldown--;
                if (this.attackCooldown<=0) {
                    crystal.health=Math.max(0, crystal.health-this.power);
                    shake=6;
                    this.attackCooldown=60;
                }
                this.state="attack";
                this.currentTarget=null; // attacking crystal, not a unit
            }
        }

        // ── ATTACK UNIT ──
        else if (this.state==="attack") {
            const target=this.currentTarget;
            // if no unit target, hunt crystal
            if (!target||target.dead) {
                this.state="hunt"; this.currentTarget=null;
                this.moveSpeed=(PREDATOR_TYPES[this.predatorType]||{moveSpeed:this.moveSpeed}).moveSpeed;
                return;
            }
            this.moveSpeed=0;
            const dx=target.x-this.x, dy=target.y-this.y, dist=Math.sqrt(dx*dx+dy*dy);
            if (dist>1.5) {
                this.state="hunt"; this.currentTarget=null;
                this.moveSpeed=(PREDATOR_TYPES[this.predatorType]||{moveSpeed:this.moveSpeed}).moveSpeed;
                return;
            }
            this.attackAnim+=0.18;
            if (this.attackAnim>=Math.PI) this.attackAnim=0;
            if (!this.attackCooldown) this.attackCooldown=0;
            this.attackCooldown--;
            if (this.attackCooldown<=0) {
                applyDamage(target, this.power, this);
                this.attackCooldown=45;
            }
            return;
        }

        // ── RETREAT ──
        else if (this.state==="retreat") {
            if (this.health/this.maxHealth>0.75) { this.isRetreating=false; this.state="hunt"; return; }
            const pillar=findNearestFriendlyPillar({team:"red",x:this.x,y:this.y});
            if (pillar) {
                const dx=pillar.x-this.x, dy=pillar.y-this.y, dist=Math.sqrt(dx*dx+dy*dy)||0.001;
                this.dirX=dx/dist; this.dirY=dy/dist;
                if (dist>0.6) { this.x+=this.dirX*this.moveSpeed; this.y+=this.dirY*this.moveSpeed; }
                else this.health=Math.min(this.maxHealth,this.health+0.15);
            } else if (this.currentTarget&&!this.currentTarget.dead) {
                const dx=this.x-this.currentTarget.x, dy=this.y-this.currentTarget.y;
                const dist=Math.sqrt(dx*dx+dy*dy)||0.001;
                this.dirX=dx/dist; this.dirY=dy/dist;
                this.x+=this.dirX*this.moveSpeed; this.y+=this.dirY*this.moveSpeed;
            }
            // Keep legs moving during retreat
            this.walkCycle+=this.moveSpeed*40;
            return;
        }

        // ── HEAD CONTROL ──
        const bodyAngle=Math.atan2(this.dirY,this.dirX);
        // During retreat — head snaps to movement direction, no target locking
        const lookTarget = this.state==="retreat" ? null
                         : this.currentTarget && !this.currentTarget.dead ? this.currentTarget
                         : (crystal && this.state==="hunt" ? crystal : null);

        if (lookTarget) {
            // Track target — fast interpolation, no clamp so head freely faces prey
            const dx=lookTarget.x-this.x, dy=lookTarget.y-this.y;
            const targetAngle=Math.atan2(dy,dx);
            let diff=targetAngle-this.headAngle;
            if (diff>Math.PI) diff-=Math.PI*2;
            if (diff<-Math.PI) diff+=Math.PI*2;
            this.headAngle+=diff*0.22;
        } else {
            // No target (or retreating) — snap head to body/movement direction quickly
            const snapSpeed = this.state==="retreat" ? 0.35 : 0.15;
            let diff=bodyAngle-this.headAngle;
            if (diff>Math.PI) diff-=Math.PI*2;
            if (diff<-Math.PI) diff+=Math.PI*2;
            this.headAngle+=diff*snapSpeed;
            if (this.state!=="retreat") {
                this.headAngle+=Math.sin(frame*0.08)*0.01;
                let offset=this.headAngle-bodyAngle;
                if (offset>Math.PI) offset-=Math.PI*2;
                if (offset<-Math.PI) offset+=Math.PI*2;
                offset=Math.max(-1.05,Math.min(1.05,offset));
                this.headAngle=bodyAngle+offset;
            }
        }

        if (this.state==="hunt"||this.state==="wander") this.walkCycle+=this.moveSpeed*40;
        this.lastX=this.x; this.lastY=this.y;
    }
}

// ─────────────────────────────────────────────────────────
//  WORLD GENERATION
// ─────────────────────────────────────────────────────────
function generateSegment(startX) {
    for (let y=-2; y<=5; y++) {
        let type = (y===-2)?'wall_back':(y===5)?'wall_front':'floor';
        const tile = {
            x:startX, y, type,
            h:(type==='wall_back')?34:45,//come here
            pillar:(type==='floor'&&y>=3&&Math.random()<cfg.pillarSpawnRate),
            pillarTeam: Math.random()>0.6?"green":"red",
            pillarCol:null,
            destroyed:false, health:20, maxHealth:20,
            converting:false, pendingDestroy:false,
            upgraded:false, pulseTimer:0,
            reconstructing:false, reconstructProgress:0, workers:[]
        };
        if (tile.pillarTeam==="green") tile.pillarCol="#0f8"; else tile.pillarCol="#f22";
        world.push(tile);

        // NPC spawns
        const zoneIndex=Math.floor(startX/ZONE_LENGTH);
        if (zoneIndex<activeDayZones && type==='floor' && y===3 && Math.random()<cfg.npcSpawnRate) {
            const typeKeys=["virus","lobster","turtle"];
            const npcType=typeKeys[Math.floor(Math.random()*typeKeys.length)];
            const def=NPC_TYPES[npcType];
            const ELEMENT_POOL=[...unlockedElements];
            const element=ELEMENT_POOL[Math.floor(Math.random()*ELEMENT_POOL.length)];
            const personality = PERSONALITY_KEYS[Math.floor(Math.random() * PERSONALITY_KEYS.length)];
            const stats       = applyPersonality(personality);
            const role        = assignRole(stats);
            const npc={
                type:"virus", element, x:startX, y,
                team:"red", convertFlash:0, isNeutralRecruit:true,
                health: stats.hp, maxHealth: stats.hp,
                moveSpeed: def.moveSpeed + (stats.speed - 10) * 0.001,
                power: stats.attack,
                stats, personality, role,
                currentResonance: 0,
                currentWill: stats.will,
                targetX:startX, targetY:y,
                walkCycle:0, moveCooldown:0,
                stance:"follow", isFollower:false, isHealing:false,
                hitFlash:0, spawnProtection:180, dead:false,
                combatTrait:  Object.keys(COMBAT_TRAITS)[Math.floor(Math.random()*2)],
                naturalTrait: Object.keys(NATURAL_TRAITS)[Math.floor(Math.random()*2)],
                perk:         Object.keys(PERKS)[Math.floor(Math.random()*2)]
            };
            actors.push(npc);
            dayStats.redSpawned++;
        }
    }
    lastGenX=startX;
}

// ─────────────────────────────────────────────────────────
//  COMMAND / RADIAL SYSTEM
// ─────────────────────────────────────────────────────────
function performElementJob(actor, tile) {
    switch(actor.element) {
        case "fire":    spawnFireWall(tile.x, tile.y); break;
        case "ping":    disruptEnemiesAt(tile.x, tile.y); break;
        case "psychic": frenzyEnemiesAt(tile.x, tile.y); break;
    }
}

function issueJobCommand(tile) {
    const pool=(followerByElement[player.selectedElement]||[]).filter(a=>!a.job).slice(0,3);
    pool.forEach(a => { a.job={ type:"elementJob", target:tile, executed:false, timer:0 }; });
}

function issueMoveCommand(tile) {
    const pool=followerByElement[player.selectedElement]||[];
    pool.forEach(a => { a.job={ type:"move", target:tile }; a.stance="hold"; });
}

function issueReconstruct(pylon) {
    if (!pylon||!followers||followers.length===0) return;
    if (!pylon.reconstructing) { pylon.reconstructing=false; pylon.reconstructProgress=0; pylon.workers=[]; }
    if (pylon.reconstructing) return;
    const pool=(followerByElement[player.selectedElement]||[]).filter(a=>!a.job).slice(0,3);
    if (pool.length===0) return;
    pylon.reconstructing=true; pylon.reconstructProgress=0; pylon.workers=pool;
    pool.forEach(a => { a.job={ type:"reconstruct", target:pylon }; });
}

function executeCommand() {
    if (!selectedRadialAction) { commandMode=false; return; }
    if (!commandMode) return;
    if (!commandTarget) { commandMode=false; selectedRadialAction=null; return; }
    switch(selectedRadialAction) {
        case "job":        issueJobCommand(commandTarget); break;
        case "reconstruct":
            if (commandTarget.pillar&&!commandTarget.destroyed) issueReconstruct(commandTarget);
            break;
        case "upgrade_pylon": {
            const pylon = commandTarget;
            if (pylon&&pylon.pillar&&!pylon.destroyed&&!pylon.attackMode&&!pylon.waveMode) {
                const el = player.selectedElement;
                // Prefer nearest camper of selected element, fallback to any nearest follower
                const pool = (followerByElement[el]||[]).filter(a=>!a.dead&&!a.job);
                let best = pool.find(a=>a.role==="camper")||pool[0]||null;
                if (!best) {
                    // fallback: any follower regardless of element
                    let bd=Infinity;
                    followers.forEach(f=>{
                        if (!f.dead&&!f.job) {
                            const d=Math.hypot(f.x-pylon.x,f.y-pylon.y);
                            if (d<bd) { bd=d; best=f; }
                        }
                    });
                }
                if (best) {
                    best.job = { type:"merge_pylon", target:pylon };
                    pylon.pendingUpgrade = true;
                    pylon.upgradeFollower = best;
                }
            }
            break;
        }
        case "set_wave_mode": {
            const pylon = commandTarget;
            if (pylon&&pylon.pillar&&!pylon.destroyed&&(pylon.attackMode||pylon.waveMode)) {
                pylon.attackMode = false;
                pylon.waveMode = true;
            }
            break;
        }
        case "set_attack_mode": {
            const pylon = commandTarget;
            if (pylon&&pylon.pillar&&!pylon.destroyed&&(pylon.attackMode||pylon.waveMode)) {
                pylon.attackMode = true;
                pylon.waveMode = false;
            }
            break;
        }
        case "attack": {
            let enemy=getEnemyAtTile(commandTarget);
            if (!enemy) {
                let bd=2;
                actors.forEach(a => {
                    if (a instanceof Predator&&!a.dead) {
                        const dx=a.x-commandTarget.x, dy=a.y-commandTarget.y, d=Math.sqrt(dx*dx+dy*dy);
                        if (d<bd) { bd=d; enemy=a; }
                    }
                });
            }
            if (!enemy) break;
            const pool=(followerByElement[player.selectedElement]||[]).filter(a=>!a.job).slice(0,5);
            pool.forEach(a => { a.job={ type:"attack", target:enemy }; });
            break;
        }
        case "move":  issueMoveCommand(commandTarget); break;
        case "build":
            if (shardCount>=10&&commandTarget&&!commandTarget.pillar) {
                shardCount-=10;
                commandTarget.pillar=true; commandTarget.pillarTeam="green";
                commandTarget.pillarCol="#0f8"; commandTarget.health=20;
                commandTarget.maxHealth=20; commandTarget.upgraded=false;
                commandTarget.destroyed=false;
            }
            break;
    }
    commandMode=false; commandTarget=null;
}

// ─────────────────────────────────────────────────────────
//  NPC UPDATE
// ─────────────────────────────────────────────────────────
function updateRTSNPC(actor) {
    if (actor.spawnProtection===undefined) actor.spawnProtection=0;
    if (actor.dead) return;
    if (actor.spawnProtection>0) { actor.spawnProtection--; }
    if (actor.hitFlash>0) actor.hitFlash--;

    if (actor.combatTrait) { const t=COMBAT_TRAITS[actor.combatTrait]; if(t&&t.onUpdate) t.onUpdate(actor); }
    if (actor.naturalTrait){ const t=NATURAL_TRAITS[actor.naturalTrait]; if(t&&t.onUpdate) t.onUpdate(actor); }

    // return to crystal
    if (!actor.dead&&actor.team==="green"&&actor.returningToCrystal) {
        const dx=crystal.x-actor.x, dy=crystal.y-actor.y, dist=Math.sqrt(dx*dx+dy*dy);
        if (dist>0.6) { actor.x+=(dx/dist)*actor.moveSpeed; actor.y+=(dy/dist)*actor.moveSpeed; }
        else {
            actor.returningToCrystal = false;
            actor.isFollower = true;
            // Assign identity at crystal if not yet assigned
            if (!actor.personality) {
                actor.personality = PERSONALITY_KEYS[Math.floor(Math.random()*PERSONALITY_KEYS.length)];
                actor.stats       = applyPersonality(actor.personality);
                actor.role        = assignRole(actor.stats);
                actor.currentWill = actor.stats.will;
                actor.health      = actor.stats.hp;
                actor.maxHealth   = actor.stats.hp;
                actor.power       = actor.stats.attack;
                actor.moveSpeed   = NPC_TYPES["virus"].moveSpeed + (actor.stats.speed-10)*0.001;
            }
            if (!actor.element) {
                const pool = [...unlockedElements];
                actor.element = pool[Math.floor(Math.random()*pool.length)] || "fire";
            }
            if (!actor.combatTrait)  actor.combatTrait  = Object.keys(COMBAT_TRAITS)[Math.floor(Math.random()*2)];
            if (!actor.naturalTrait) actor.naturalTrait = Object.keys(NATURAL_TRAITS)[Math.floor(Math.random()*2)];
            if (!actor.perk)         actor.perk         = Object.keys(PERKS)[Math.floor(Math.random()*2)];
            // Flash element color on arrival
            actor.convertFlash = 30;
            actor.isNeutralRecruit = false;
            followers.push(actor);
            if (!followerByElement[actor.element]) followerByElement[actor.element]=[];
            followerByElement[actor.element].push(actor);
        }
        return;
    }

    // red healing
    if (actor.team==="red"&&actor.health<actor.maxHealth*0.5) {
        const pillar=findNearestFriendlyPillar(actor);
        if (pillar) {
            const dx=pillar.x-actor.x, dy=pillar.y-actor.y, dist=Math.sqrt(dx*dx+dy*dy);
            if (dist>0.2) { actor.x+=(dx/dist)*actor.moveSpeed; actor.y+=(dy/dist)*actor.moveSpeed; }
            return;
        }
    }

    if (actor.disrupted>0) { actor.disrupted--; return; }
    if (actor.frenzied>0) {
        actor.frenzied--;
        let nearest=null, bd=Infinity;
        actors.forEach(other => {
            if (other===actor) return;
            const dx=other.x-actor.x, dy=other.y-actor.y, d=dx*dx+dy*dy;
            if (d<bd) { bd=d; nearest=other; }
        });
        if (nearest) {
            actor.x+=(nearest.x-actor.x)*actor.moveSpeed;
            actor.y+=(nearest.y-actor.y)*actor.moveSpeed;
        }
        return;
    }

    // element job
    if (actor.job&&actor.job.type==="elementJob") {
        const t=actor.job.target;
        actor.x+=(t.x-actor.x)*actor.moveSpeed; actor.y+=(t.y-actor.y)*actor.moveSpeed;
        const dx=actor.x-t.x, dy=actor.y-t.y, dist=Math.sqrt(dx*dx+dy*dy);
        if (dist<0.6) {
            if (!actor.job.executed) { performElementJob(actor,t); actor.job.executed=true; actor.job.timer=45; }
            actor.job.timer--;
            if (actor.job.timer<=0) actor.job=null;
        }
        return;
    }

    // merge into pylon — walk over, disappear, pylon activates attack mode
    if (actor.job&&actor.job.type==="merge_pylon") {
        const p=actor.job.target;
        if (!p||p.destroyed||!p.pendingUpgrade) { actor.job=null; return; }
        const dx=p.x-actor.x, dy=p.y-actor.y, dist=Math.sqrt(dx*dx+dy*dy);
        if (dist>0.5) {
            // Walk toward pylon
            actor.x+=dx*actor.moveSpeed*2; actor.y+=dy*actor.moveSpeed*2;
            actor.walkCycle+=actor.moveSpeed*40;
        } else {
            // Arrived — merge: absorb follower into pylon
            p.attackMode = true;
            p.attackModeElement = actor.element || "core";
            p.attackModeColor = actor.color || "#0f8";
            p.attackFireTimer = 0;
            p.attackRange = 2.5;
            p.attackPower = (actor.stats?.specialAttack||10) * 1.2;
            p.pendingUpgrade = false;
            p.upgradeFollower = null;
            p.pulseTimer = 0;
            // Visual merge flash
            for(let i=0;i<8;i++) shards.push({x:p.x,y:p.y,z:1+Math.random(),vz:-0.08-Math.random()*0.06,color:p.attackModeColor});
            // Remove follower
            actor.dead = true;
            actor.sacrificed = true;
            actor.job = null;
            // Remove from followers array
            const fi = followers.indexOf(actor);
            if (fi >= 0) followers.splice(fi, 1);
        }
        return;
    }

    // reconstruct
    if (actor.job&&actor.job.type==="reconstruct") {
        const p=actor.job.target;
        if (!p||p.destroyed||!p.reconstructing) { actor.job=null; return; }
        actor.x+=(p.x-actor.x)*actor.moveSpeed; actor.y+=(p.y-actor.y)*actor.moveSpeed;
        const dx=actor.x-p.x, dy=actor.y-p.y, dist=Math.sqrt(dx*dx+dy*dy);
        if (dist<0.8) p.reconstructProgress+=0.01;
        return;
    }

    // move / hold
    if (actor.job&&actor.job.type==="move") {
        if (actor.health<actor.maxHealth*0.5) { actor.job=null; }
        else {
            const t=actor.job.target;
            if (!t) { actor.job=null; return; }
            const dx=t.x-actor.x, dy=t.y-actor.y, dist=Math.sqrt(dx*dx+dy*dy);
            if (dist>0.6) { actor.x+=(dx/dist)*actor.moveSpeed; actor.y+=(dy/dist)*actor.moveSpeed; }
            return;
        }
    }

    // attack job
    if (actor.job&&actor.job.type==="attack") {
        const enemy=actor.job.target;
        if (!enemy||enemy.dead) { actor.job=null; actor.firstStrikeUsed=false; return; }
        const dx=enemy.x-actor.x, dy=enemy.y-actor.y, dist=Math.sqrt(dx*dx+dy*dy);
        if (dist>0.8) { actor.x+=dx*actor.moveSpeed; actor.y+=dy*actor.moveSpeed; }
        else {
            let dmg=actor.power*0.3;
            if (actor.damageMultiplier) dmg*=actor.damageMultiplier;
            applyDamage(enemy,dmg,actor);
            if (actor.perk) { const pk=PERKS[actor.perk]; if(pk&&pk.onDealDamage) pk.onDealDamage(actor,dmg); }
            if (enemy.health<=0) { enemy.dead=true; actor.job=null; actor.firstStrikeUsed=false; }
        }
        return;
    }

    // healing
    if (!actor.isHealing&&actor.health<actor.maxHealth*0.5) actor.isHealing=true;
    if ( actor.isHealing&&actor.health>=actor.maxHealth*0.95) actor.isHealing=false;
    if (actor.isHealing) {
        const pillar=findNearestFriendlyPillar(actor);
        if (pillar) {
            const dx=pillar.x-actor.x, dy=pillar.y-actor.y, dist=Math.sqrt(dx*dx+dy*dy);
            if (dist>0.6) { actor.x+=(dx/dist)*actor.moveSpeed; actor.y+=(dy/dist)*actor.moveSpeed; }
            return;
        }
    }

    // ── ROLE-DRIVEN MOVEMENT ──────────────────────────────
    if (actor.team==="green" && (actor.stance||"follow")==="follow") {

        const role = actor.role || "brawler";

        // Find nearest enemy for role decisions
        let nearestEnemy = null;
        let nearestEnemyDist = Infinity;
        actors.forEach(a => {
            if ((a.team==="red" || (a instanceof Predator && a.team !== "green" && !a.isClone)) && !a.dead) {
                const dx=a.x-actor.x, dy=a.y-actor.y, d=Math.sqrt(dx*dx+dy*dy);
                if (d < nearestEnemyDist) { nearestEnemyDist=d; nearestEnemy=a; }
            }
        });

        // ── BRAWLER: chase nearest enemy aggressively ──
        if (role === "brawler") {
            if (nearestEnemy && nearestEnemyDist < 6) {
                // Close in on enemy
                const dx=nearestEnemy.x-actor.x, dy=nearestEnemy.y-actor.y;
                const dist=Math.sqrt(dx*dx+dy*dy);
                if (dist > 0.8) {
                    actor.x+=(dx/dist)*actor.moveSpeed;
                    actor.y+=(dy/dist)*actor.moveSpeed;
                }
                // Auto attack when in range
                if (dist <= 0.8) {
                    followerAttack(actor, nearestEnemy);
                }
            } else {
                // No nearby enemy — follow player
                const dx=player.x-actor.x, dy=player.y-actor.y, dist=Math.sqrt(dx*dx+dy*dy);
                if (dist>FOLLOW_STOP) { actor.x+=(dx/dist)*actor.moveSpeed; actor.y+=(dy/dist)*actor.moveSpeed; }
            }
            return;
        }

        // ── SNIPER: maintain preferred distance, fire ranged projectiles ──
        if (role === "sniper") {
            const SNIPER_PREFERRED = 4.0;
            const SNIPER_MIN       = 2.5;

            if (nearestEnemy && nearestEnemyDist < 10) {
                const dx=nearestEnemy.x-actor.x, dy=nearestEnemy.y-actor.y;
                const dist=Math.sqrt(dx*dx+dy*dy);

                if (dist < SNIPER_MIN) {
                    actor.x-=(dx/dist)*actor.moveSpeed*1.2;
                    actor.y-=(dy/dist)*actor.moveSpeed*1.2;
                } else if (dist > SNIPER_PREFERRED) {
                    actor.x+=(dx/dist)*actor.moveSpeed*0.6;
                    actor.y+=(dy/dist)*actor.moveSpeed*0.6;
                } else {
                    // In sweet spot — fire ranged projectile
                    if (!actor.attackCooldown) actor.attackCooldown = 0;
                    if (actor.attackCooldown <= 0) {
                        const elDef = ELEMENTS.find(e=>e.id===actor.element);
                        const col   = elDef ? elDef.color : "#fff";
                        const dmg   = (actor.stats?.specialAttack||10) * 0.5;
                        spawnFollowerProjectile(actor, nearestEnemy, col, dmg, 5, null);
                        actor.attackCooldown = 55;
                        if (actor.currentWill !== undefined) actor.currentWill = Math.max(0, actor.currentWill - 1);
                    } else {
                        actor.attackCooldown--;
                    }
                }
            } else {
                const dx=player.x-actor.x, dy=player.y-actor.y, dist=Math.sqrt(dx*dx+dy*dy);
                if (dist > FOLLOW_STOP + 1.5) { actor.x+=(dx/dist)*actor.moveSpeed; actor.y+=(dy/dist)*actor.moveSpeed; }
            }
            return;
        }

        // ── CAMPER: anchor to nearest friendly pylon or crystal, engage short range only ──
        if (role === "camper") {
            const CAMPER_ENGAGE_RADIUS = 2.5;

            // Find anchor point — nearest friendly pylon or crystal
            const pillar = findNearestFriendlyPillar(actor);
            const anchorX = pillar ? pillar.x : crystal.x;
            const anchorY = pillar ? pillar.y : crystal.y;

            const dxA=anchorX-actor.x, dyA=anchorY-actor.y;
            const distAnchor=Math.sqrt(dxA*dxA+dyA*dyA);

            if (nearestEnemy && nearestEnemyDist < CAMPER_ENGAGE_RADIUS) {
                // Enemy close enough — engage
                const dx=nearestEnemy.x-actor.x, dy=nearestEnemy.y-actor.y;
                const dist=Math.sqrt(dx*dx+dy*dy);
                if (dist > 0.8) {
                    actor.x+=(dx/dist)*actor.moveSpeed*0.8;
                    actor.y+=(dy/dist)*actor.moveSpeed*0.8;
                } else {
                    followerAttack(actor, nearestEnemy);
                }
            } else if (distAnchor > 1.0) {
                // Return to anchor
                actor.x+=(dxA/distAnchor)*actor.moveSpeed;
                actor.y+=(dyA/distAnchor)*actor.moveSpeed;
            }
            return;
        }

        // Fallback — plain follow
        const dx=player.x-actor.x, dy=player.y-actor.y, dist=Math.sqrt(dx*dx+dy*dy);
        if (dist>FOLLOW_STOP) { actor.x+=(dx/dist)*actor.moveSpeed; actor.y+=(dy/dist)*actor.moveSpeed; }
        return;
    }

    // walk cycle
    const dxM=actor.x-(actor.lastX||actor.x), dyM=actor.y-(actor.lastY||actor.y);
    if (Math.abs(dxM)>0.001||Math.abs(dyM)>0.001) actor.walkCycle+=0.25;
    actor.lastX=actor.x; actor.lastY=actor.y;

    // idle wander
    if (actor.moveCooldown>0) { actor.moveCooldown--; return; }
    const dirs=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
    const d=dirs[Math.floor(Math.random()*dirs.length)];
    actor.x+=(actor.x+d.x-actor.x)*actor.moveSpeed;
    actor.y+=(actor.y+d.y-actor.y)*actor.moveSpeed;
    actor.moveCooldown=60;
}

function updateNPC(actor) {
    if (actor instanceof Predator && actor.team !== "green") {
        actor.update();
    } else {
        const _prevX = actor.x, _prevY = actor.y;
        updateRTSNPC(actor);
        // Tick walk cycle for clones based on actual movement
        if (actor.isClone) {
            const _moved = Math.hypot(actor.x - _prevX, actor.y - _prevY);
            if (_moved > 0.001) actor.walkCycle = (actor.walkCycle||0) + actor.moveSpeed * 40;
        }
    }
}

// ─────────────────────────────────────────────────────────
//  DRAWING HELPERS
// ─────────────────────────────────────────────────────────
function drawHealthBar(x, y, width, height, health, maxHealth, drawCtx=ctx) {
    if (typeof health!=="number"||typeof maxHealth!=="number"||maxHealth<=0) return;
    const pct=Math.max(0,Math.min(1,health/maxHealth));
    const col = pct>0.6?"#0f8":pct>0.3?"#ff0":"#f22";
    drawCtx.fillStyle="#000"; drawCtx.fillRect(x,y,width,height);
    drawCtx.fillStyle=col;    drawCtx.fillRect(x+1,y+1,(width-2)*pct,height-2);
}

function drawRadialButton(x, y, label, active) {
    ctx.fillStyle=active?"#0f8":"#055";
    ctx.beginPath(); ctx.arc(x,y,10,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=active?"#000":"#0f8";
    ctx.font="12px monospace"; ctx.textAlign="center";
    ctx.fillText(label,x,y-14);
}

function drawRadialMenu() {
    if (!commandMode) return;
    selectedRadialAction=null;
    const dist=Math.hypot(dragDX,dragDY), angle=Math.atan2(dragDY,dragDX);
    ctx.save(); ctx.setTransform(1,0,0,1,0,0);
    ctx.strokeStyle="#0f8"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(commandX,commandY,RADIAL_RADIUS,0,Math.PI*2); ctx.stroke();

    // RIGHT = BUILD
    const bHov=dist>RADIAL_RADIUS*0.4&&angle>-Math.PI/4&&angle<Math.PI/4;
    drawRadialButton(commandX+RADIAL_RADIUS, commandY, "BUILD", bHov);
    if (bHov) selectedRadialAction="build";

    // UP = JOB
    const jHov=dist>RADIAL_RADIUS*0.4&&angle<-Math.PI/4&&angle>-3*Math.PI/4;
    drawRadialButton(commandX, commandY-RADIAL_RADIUS, "JOB", jHov);
    if (jHov) selectedRadialAction="job";

clearFollowers();

    // LEFT = context-sensitive pylon actions or RECON
    const rHov=dist>RADIAL_RADIUS*0.4&&Math.abs(angle)>Math.PI*3/4;
    const isPylonTarget = commandTarget&&commandTarget.pillar&&!commandTarget.destroyed;
    const isUpgradedPylon = isPylonTarget&&(commandTarget.attackMode||commandTarget.waveMode);
    let leftLabel, leftAction;
    if (isUpgradedPylon) {
        // Already upgraded — switch mode
        leftLabel = commandTarget.waveMode ? "ATTACK" : "WAVE";
        leftAction = commandTarget.waveMode ? "set_attack_mode" : "set_wave_mode";
    } else if (isPylonTarget) {
        leftLabel = "UPGRADE";
        leftAction = "upgrade_pylon";
    } else {
        leftLabel = "RECON";
        leftAction = "reconstruct";
    }
    drawRadialButton(commandX-RADIAL_RADIUS, commandY, leftLabel, rHov);
    if (rHov) selectedRadialAction = leftAction;

    // DOWN = MOVE / ATTACK
    const enemy=getEnemyAtTile(commandTarget);
    const dHov=dist>RADIAL_RADIUS*0.4&&angle>Math.PI/4&&angle<3*Math.PI/4;
    drawRadialButton(commandX, commandY+RADIAL_RADIUS, enemy?"ATTACK":"MOVE", dHov);
    if (dHov) selectedRadialAction=enemy?"attack":"move";

    ctx.restore();
}

function drawPredatorDebug(actor, px, py) {
    if (!DEBUG_PREDATOR) return;
    ctx.save(); ctx.setTransform(1,0,0,1,0,0);
    const bx=px-60, by=py-140, bw=120, bh=70;
    ctx.fillStyle="rgba(0,0,0,0.6)"; ctx.fillRect(bx,by,bw,bh);
    ctx.strokeStyle="rgba(0,255,136,0.6)"; ctx.strokeRect(bx,by,bw,bh);
    ctx.fillStyle="#0f8"; ctx.font="11px monospace"; ctx.textAlign="left";
    const snap=Math.round(Math.atan2(actor.dirY,actor.dirX)/(Math.PI/4))*(Math.PI/4);
    ["STATE:"+actor.state,"X:"+actor.x.toFixed(2),"Y:"+actor.y.toFixed(2),
     "dX:"+actor.dirX.toFixed(2),"dY:"+actor.dirY.toFixed(2),
     "snap°:"+(snap*180/Math.PI).toFixed(0)
    ].forEach((l,i)=>ctx.fillText(l,bx+6,by+14+i*11));
    ctx.restore();
}

// ─────────────────────────────────────────────────────────
//  DRAW NPC  (FIX: one drawLeg per scope, no duplicate)
// ─────────────────────────────────────────────────────────
function drawNPC(actor, px, py, drawCtx=ctx) {
    if (actor instanceof Predator) {
        _drawPredator(actor, px, py, drawCtx);
    } else {
        _drawVirus(actor, px, py, drawCtx);
    }
}

function _drawPredator(actor, px, py, drawCtx) {
    const dim=actor.dimensions;
    let bodyBaseY=py-(dim.height*2) - (actor.heightBoost ? dim.height*(actor.heightBoost-1) : 0);
    let rearOffset=0;
    if (actor.state==="attack") { const t=actor.attackAnim/Math.PI; rearOffset=Math.sin(t*Math.PI)*4; }
    bodyBaseY-=rearOffset;

    const angle=Math.atan2(actor.dirY,actor.dirX);
    const dirX=Math.cos(angle), dirY=Math.sin(angle);

    // Build segments
    const segments=[];
    const baseLength=dim.height*0.9;
    segments.push({ length:baseLength*actor.body.thorax.size,  width:dim.width*actor.body.thorax.size,  rotation:angle });
    segments.push({ length:baseLength*actor.body.head.size,    width:dim.width*actor.body.head.size,    rotation:actor.headAngle||angle });
    let abdLen=baseLength*actor.body.abdomen.size;
    for (let i=0;i<actor.body.abdomen.segments;i++) {
        segments.push({ length:abdLen, width:dim.width*actor.body.abdomen.size, rotation:angle });
        abdLen*=actor.body.abdomen.taper;
    }

    // Position segments
    segments[0].cx=px; segments[0].cy=bodyBaseY;
    segments[1].cx=segments[0].cx+dirX*(segments[0].length*0.5+segments[1].length*0.5);
    segments[1].cy=segments[0].cy+dirY*(segments[0].length*0.5+segments[1].length*0.5);
    let prevX=segments[0].cx, prevY=segments[0].cy;
    for (let i=2;i<segments.length;i++) {
        prevX-=dirX*segments[i].length; prevY-=dirY*segments[i].length;
        segments[i].cx=prevX; segments[i].cy=prevY;
    }

    // Nymph: draw translucent
    if (actor.isNymph) drawCtx.globalAlpha = 0.38;
    // Boss aura ring
    if (actor.isBoss && (actor.team !== "green" || actor.isClone)) {
        const auraR = (actor.shieldAuraRadius||5) * TILE_W * 0.5;
        const pulse = 0.5 + 0.5 * Math.sin((actor.shieldAuraPulse||0) * 0.1);
        drawCtx.save();
        drawCtx.globalAlpha = 0.12 + pulse * 0.08;
        drawCtx.strokeStyle = "#aaddff";
        drawCtx.lineWidth = 3;
        drawCtx.beginPath();
        drawCtx.arc(px, bodyBaseY, auraR, 0, Math.PI*2);
        drawCtx.stroke();
        drawCtx.globalAlpha = 1;
        drawCtx.restore();
    }

    // Draw segments back-to-front
    const isRedTeam = (actor.team !== "green" && !actor.isClone);
    for (let i=segments.length-1;i>=0;i--) {
        const seg=segments[i];
        drawCtx.save(); drawCtx.translate(seg.cx,seg.cy); drawCtx.rotate(seg.rotation);
        // Red team: black body
        const baseCol = (actor.hitFlash>0 && actor.state!=="retreat") ? "#fff" : (isRedTeam ? "#111" : actor.color);
        drawCtx.fillStyle = baseCol;
        const cr = actor.segmentCornerRadius !== undefined ? actor.segmentCornerRadius : 6;
        // Spider abdomen — draw as a protruding globe (ellipse) instead of roundRect
        const isAbdomen = i >= 2; // segments 0=thorax, 1=head, 2+=abdomen
        if (actor.body.abdomen.round && isAbdomen) {
            const rx = seg.width * 0.52;
            const ry = seg.length * 0.58;
            drawCtx.beginPath();
            drawCtx.ellipse(0, 0, rx, ry, 0, 0, Math.PI*2);
            drawCtx.fill();
            // Specular highlight — top-left dome shine
            const shimCol = isRedTeam ? "rgba(200,40,60,0.3)" : "rgba(180,180,220,0.3)";
            drawCtx.fillStyle = shimCol;
            drawCtx.beginPath();
            drawCtx.ellipse(-rx*0.22, -ry*0.22, rx*0.35, ry*0.3, -0.4, 0, Math.PI*2);
            drawCtx.fill();
        } else {
            drawCtx.beginPath(); drawCtx.roundRect(-seg.width*0.5,-seg.length*0.5,seg.width,seg.length,cr); drawCtx.fill();
        }
        // Red team accent stripe on each segment
        if (isRedTeam && actor.hitFlash<=0) {
            drawCtx.fillStyle = "#cc1111";
            const sw = seg.width*0.25, sh = seg.length*0.18;
            // Center stripe
            drawCtx.fillRect(-sw*0.5, -seg.length*0.25, sw, sh);
            // Two side dots
            drawCtx.beginPath(); drawCtx.arc(-seg.width*0.28, 0, seg.width*0.07, 0, Math.PI*2); drawCtx.fill();
            drawCtx.beginPath(); drawCtx.arc( seg.width*0.28, 0, seg.width*0.07, 0, Math.PI*2); drawCtx.fill();
        }
        drawCtx.restore();
    }
    // Stinger tail for scorpions
    if (isRedTeam && actor.hasStinger && segments.length > 2) {
        const tail = segments[segments.length-1];
        const tailAngle = angle + Math.PI + Math.sin(frame*0.05)*0.3;
        const stingLen = 14;
        const sx = tail.cx - dirX*tail.length*0.5;
        const sy = tail.cy - dirY*tail.length*0.5;
        drawCtx.save();
        drawCtx.strokeStyle="#cc1111"; drawCtx.lineWidth=3; drawCtx.lineCap="round";
        drawCtx.beginPath();
        drawCtx.moveTo(sx, sy);
        drawCtx.quadraticCurveTo(
            sx - dirX*stingLen*0.5 + Math.cos(tailAngle)*stingLen*0.8,
            sy - dirY*stingLen*0.5 + Math.sin(tailAngle)*stingLen*0.8,
            sx + Math.cos(tailAngle)*stingLen,
            sy + Math.sin(tailAngle)*stingLen
        );
        drawCtx.stroke();
        drawCtx.restore();
    }

    const perpX=-dirY, perpY=dirX;
    const thoraxCX=segments[0].cx+dirX*actor.joints.legRoot.forward;
    const thoraxCY=segments[0].cy+actor.joints.legRoot.vertical;

    // Legs
    const legData=actor.appendages.legs;
    if (legData && legData.count===6) {
        drawCtx.strokeStyle=isRedTeam?"#331111":"#111"; drawCtx.lineWidth=2;
        const positions=[-1,0,1];
        positions.forEach((pos,index)=>{
            const long=-pos*(dim.width*0.35);
            const hx=thoraxCX+dirX*long, hy=thoraxCY+dirY*long;
            _drawInsectLeg(drawCtx,hx,hy, 1,(index+1)%2===0?0:Math.PI,pos,actor,legData,dirX,dirY,perpX,perpY);
            _drawInsectLeg(drawCtx,hx,hy,-1,(index)%2===0?0:Math.PI,pos,actor,legData,dirX,dirY,perpX,perpY);
        });
    } else if (legData && legData.count===8) {
        // Spider: 4 pairs, tightly clustered on cephalothorax, legs arc out wide and tall
        drawCtx.strokeStyle=isRedTeam?"#550011":"#1a1a1a"; drawCtx.lineWidth=2.5;
        const positions=[-1.2,-0.4,0.4,1.2];
        positions.forEach((pos,index)=>{
            const long=-pos*(dim.width*0.22);
            const hx=thoraxCX+dirX*long, hy=thoraxCY+dirY*long;
            _drawInsectLeg(drawCtx,hx,hy, 1,(index+1)%2===0?0:Math.PI,pos,actor,legData,dirX,dirY,perpX,perpY);
            _drawInsectLeg(drawCtx,hx,hy,-1,(index)%2===0?0:Math.PI,pos,actor,legData,dirX,dirY,perpX,perpY);
        });
    }

    // Mandibles — fixed diagonal inward V-shape, each side gyrates independently like chomping incisors
    const mandData=actor.appendages.mandibles;
    if (mandData&&mandData.enabled) {
        const headSeg=segments[1];
        const ha=actor.headAngle;
        const fwdX=Math.cos(ha), fwdY=Math.sin(ha);
        const sideX=-fwdY, sideY=fwdX;
        const baseX=headSeg.cx+fwdX*5, baseY=headSeg.cy+fwdY*5;

        // Each mandible gyrates on its own phase — offset by PI so they alternate
        const chompSpeed = actor.state==="attack" ? 0.35 : 0.10;
        const leftGyrate  = Math.sin((actor.walkCycle||0) * chompSpeed) * 0.4;
        const rightGyrate = Math.sin((actor.walkCycle||0) * chompSpeed + Math.PI) * 0.4;

        const mandCol = isRedTeam ? "#550000" : "#1a1a1a";
        drawCtx.save();
        drawCtx.strokeStyle = mandCol;
        drawCtx.lineWidth = mandData.thickness;
        drawCtx.lineCap = "round";

        [-1, 1].forEach((side, si) => {
            const gyrate = side === -1 ? leftGyrate : rightGyrate;
            // Base attachment — spread outward from head center
            const bx = baseX + sideX * side * 3.5;
            const by = baseY + sideY * side * 3.5;

            // Fixed diagonal inward angle — points toward center-forward like a V
            // Base angle: 35° inward from forward axis, then gyrate on top
            const diagAngle = ha + side * (-0.6) + gyrate;
            const tipX = bx + Math.cos(diagAngle) * mandData.length;
            const tipY = by + Math.sin(diagAngle) * mandData.length;

            // Elbow joint — mandible has two segments for incisor look
            const elbowX = bx + Math.cos(diagAngle) * mandData.length * 0.55;
            const elbowY = by + Math.sin(diagAngle) * mandData.length * 0.55;
            // Second segment angles further inward
            const seg2Angle = diagAngle - side * 0.45;
            const tip2X = elbowX + Math.cos(seg2Angle) * mandData.length * 0.5;
            const tip2Y = elbowY + Math.sin(seg2Angle) * mandData.length * 0.5;

            drawCtx.beginPath();
            drawCtx.moveTo(bx, by);
            drawCtx.lineTo(elbowX, elbowY);
            drawCtx.stroke();
            drawCtx.beginPath();
            drawCtx.moveTo(elbowX, elbowY);
            drawCtx.lineTo(tip2X, tip2Y);
            drawCtx.stroke();

            // Sharp tip dot
            drawCtx.fillStyle = mandCol;
            drawCtx.beginPath();
            drawCtx.arc(tip2X, tip2Y, mandData.thickness * 0.6, 0, Math.PI*2);
            drawCtx.fill();
        });

        drawCtx.restore();
    }

    // Chelicerae — spider downward-curved fangs
    const chelData = actor.appendages.chelicerae;
    if (chelData && chelData.enabled) {
        const headSeg = segments[1] || segments[0];
        const ha = actor.headAngle;
        const fwdX=Math.cos(ha), fwdY=Math.sin(ha);
        const sideX=-fwdY, sideY=fwdX;
        const baseX=headSeg.cx+fwdX*5, baseY=headSeg.cy+fwdY*5;
        const fangCol = isRedTeam ? "#880011" : "#1a0a00";
        drawCtx.save();
        drawCtx.strokeStyle=fangCol; drawCtx.lineWidth=chelData.thickness; drawCtx.lineCap="round";
        [-1,1].forEach(side => {
            const ox = sideX*3.5*side, oy = sideY*3.5*side;
            // Base segment downward
            const mid1X = baseX+ox+fwdX*chelData.length*0.45;
            const mid1Y = baseY+oy+fwdY*chelData.length*0.45;
            // Fang curves inward — chelicerae hook
            const tipX = mid1X + fwdX*chelData.length*0.5 - sideX*side*chelData.fangCurve*6;
            const tipY = mid1Y + fwdY*chelData.length*0.5 - sideY*side*chelData.fangCurve*6;
            drawCtx.beginPath();
            drawCtx.moveTo(baseX+ox, baseY+oy);
            drawCtx.quadraticCurveTo(mid1X, mid1Y, tipX, tipY);
            drawCtx.stroke();
            // Fang tip dot
            drawCtx.fillStyle = isRedTeam ? "#cc1122" : "#333";
            drawCtx.beginPath(); drawCtx.arc(tipX, tipY, chelData.thickness*0.7, 0, Math.PI*2); drawCtx.fill();
        });
        drawCtx.restore();
    }

    // Pedipalps — short segmented sensory arms flanking chelicerae
    const pedData = actor.appendages.pedipalps;
    if (pedData && pedData.enabled) {
        const headSeg = segments[1] || segments[0];
        const ha = actor.headAngle;
        const fwdX=Math.cos(ha), fwdY=Math.sin(ha);
        const sideX=-fwdY, sideY=fwdX;
        const baseX=headSeg.cx+fwdX*3, baseY=headSeg.cy+fwdY*3;
        drawCtx.save();
        drawCtx.strokeStyle=isRedTeam?"#550011":"#333"; drawCtx.lineWidth=pedData.thickness; drawCtx.lineCap="round";
        [-1,1].forEach(side => {
            const ox=sideX*6*side, oy=sideY*6*side;
            // Two segments — elbow out then tip bulb
            const j1x=baseX+ox+fwdX*pedData.length*0.5;
            const j1y=baseY+oy+fwdY*pedData.length*0.5;
            const tipX=j1x+fwdX*pedData.length*0.4+sideX*side*2;
            const tipY=j1y+fwdY*pedData.length*0.4+sideY*side*2;
            drawCtx.beginPath(); drawCtx.moveTo(baseX+ox,baseY+oy); drawCtx.lineTo(j1x,j1y); drawCtx.stroke();
            drawCtx.beginPath(); drawCtx.moveTo(j1x,j1y); drawCtx.lineTo(tipX,tipY); drawCtx.stroke();
            // Bulb tip
            drawCtx.fillStyle=isRedTeam?"#330011":"#444";
            drawCtx.beginPath(); drawCtx.arc(tipX,tipY,pedData.thickness*1.2,0,Math.PI*2); drawCtx.fill();
        });
        drawCtx.restore();
    }

    // Spinnerets — rear of abdomen, small paired nubs
    const spinData = actor.appendages.spinnerets;
    if (spinData && spinData.enabled) {
        const abdSeg = segments[segments.length-1];
        const tailX = abdSeg.cx - dirX*abdSeg.length*0.55;
        const tailY = abdSeg.cy - dirY*abdSeg.length*0.55;
        drawCtx.save();
        drawCtx.fillStyle = isRedTeam ? "#330011" : "#2a2a2a";
        [-1,1].forEach(side => {
            const ox=perpX*side*abdSeg.width*0.2, oy=perpY*side*abdSeg.width*0.2;
            drawCtx.beginPath();
            drawCtx.ellipse(tailX+ox, tailY+oy, spinData.size*0.7, spinData.size, angle, 0, Math.PI*2);
            drawCtx.fill();
        });
        drawCtx.restore();
    }

    // Spider eyes — 4 pairs arranged in arc on cephalothorax front
    if (actor.appendages.eyes && actor.appendages.eyes.count === 8) {
        const headSeg = segments[1] || segments[0];
        const ha = actor.headAngle;
        const fwdX=Math.cos(ha), fwdY=Math.sin(ha);
        const sideX=-fwdY, sideY=fwdX;
        const eyeSize = actor.appendages.eyes.size;
        const eyeGlow = actor.appendages.eyes.glow || 0;
        const eyeBaseX = headSeg.cx+fwdX*headSeg.length*0.3;
        const eyeBaseY = headSeg.cy+fwdY*headSeg.length*0.3;
        // Two rows of 4 eyes each
        [[0.5,1.5],[0.5,1.5]].forEach((cols, row) => {
            cols.forEach((col, ci) => {
                [-1,1].forEach(side => {
                    const ex = eyeBaseX + sideX*col*eyeSize*2*side - fwdX*row*eyeSize*2.5;
                    const ey = eyeBaseY + sideY*col*eyeSize*2*side - fwdY*row*eyeSize*2.5;
                    drawCtx.save();
                    if (eyeGlow > 0) { drawCtx.shadowColor=isRedTeam?"#ff2244":"#ffffff"; drawCtx.shadowBlur=eyeSize*eyeGlow*3; }
                    drawCtx.fillStyle = isRedTeam ? "#ff2244" : "#eeeeff";
                    drawCtx.beginPath(); drawCtx.arc(ex, ey, eyeSize, 0, Math.PI*2); drawCtx.fill();
                    // Pupil
                    drawCtx.shadowBlur=0;
                    drawCtx.fillStyle="#000";
                    drawCtx.beginPath(); drawCtx.arc(ex+fwdX*0.5, ey+fwdY*0.5, eyeSize*0.45, 0, Math.PI*2); drawCtx.fill();
                    drawCtx.restore();
                });
            });
        });
    }

    // Wings / Elytra
    const wingData=actor.appendages.wings;
    if (wingData&&wingData.enabled) {
        const wCX=px+dirX*actor.joints.wingRoot.forward;
        const wCY=bodyBaseY+actor.joints.wingRoot.vertical;
        const flare=wingData.angleOffset/2;
        drawCtx.save(); drawCtx.fillStyle=`rgba(180,220,255,${actor.visual.wingAlpha})`;
        drawCtx.beginPath(); drawCtx.moveTo(wCX,wCY);
        drawCtx.lineTo(wCX+perpX*wingData.length-dirX*wingData.width*flare, wCY+perpY*wingData.length-dirY*wingData.width*flare);
        drawCtx.lineTo(wCX-dirX*wingData.width,wCY-dirY*wingData.width); drawCtx.closePath(); drawCtx.fill();
        drawCtx.beginPath(); drawCtx.moveTo(wCX,wCY);
        drawCtx.lineTo(wCX-perpX*wingData.length-dirX*wingData.width*flare, wCY-perpY*wingData.length-dirY*wingData.width*flare);
        drawCtx.lineTo(wCX-dirX*wingData.width,wCY-dirY*wingData.width); drawCtx.closePath(); drawCtx.fill();
        drawCtx.restore();
    }

    // Beetle elytra — hardened shell halves, concave dome, meet at center seam
    if (actor.armorPlated) {
        const thorax = segments[0];
        const abdomen = segments[segments.length-1];

        // Shell runs from thorax center back to abdomen tip
        const shellFrontX = thorax.cx;
        const shellFrontY = thorax.cy;
        const shellBackX  = abdomen.cx - dirX * abdomen.length * 0.5;
        const shellBackY  = abdomen.cy - dirY * abdomen.length * 0.5;
        const shellLen    = Math.hypot(shellBackX - shellFrontX, shellBackY - shellFrontY);
        const halfW       = dim.width * 0.55; // how far each half dome extends sideways

        // Isometric compression
        const isoY = 0.5;

        drawCtx.save();

        // Draw two shell halves — left and right
        [-1, 1].forEach(side => {
            const outX = perpX * side * halfW;
            const outY = perpY * side * halfW * isoY;

            // Shell outline points
            const tipFX = shellFrontX;
            const tipFY = shellFrontY;
            const tipBX = shellBackX;
            const tipBY = shellBackY;
            const outerMidX = shellFrontX + (shellBackX - shellFrontX) * 0.5 + outX;
            const outerMidY = shellFrontY + (shellBackY - shellFrontY) * 0.5 + outY;

            // Base shell fill — dark chitin
            const shellBaseColor = isRedTeam ? "#1a0000" : "#1a1a2e";
            drawCtx.fillStyle = shellBaseColor;
            drawCtx.beginPath();
            drawCtx.moveTo(tipFX, tipFY);
            // Convex outer edge (dome outward)
            drawCtx.quadraticCurveTo(outerMidX, outerMidY, tipBX, tipBY);
            // Concave inner seam (curves slightly back toward center)
            const seamCtrlX = (tipFX + tipBX) * 0.5 - perpX * side * halfW * 0.18;
            const seamCtrlY = (tipFY + tipBY) * 0.5 - perpY * side * halfW * 0.18 * isoY;
            drawCtx.quadraticCurveTo(seamCtrlX, seamCtrlY, tipFX, tipFY);
            drawCtx.closePath();
            drawCtx.fill();

            // Highlight ridge — top curve of the dome
            const ridgeColor = isRedTeam ? "#330000" : "#2a2a4a";
            drawCtx.strokeStyle = ridgeColor;
            drawCtx.lineWidth = 2.5;
            drawCtx.beginPath();
            drawCtx.moveTo(tipFX, tipFY);
            drawCtx.quadraticCurveTo(outerMidX, outerMidY, tipBX, tipBY);
            drawCtx.stroke();

            // Specular highlight — inner dome shine strip
            const shineX = shellFrontX + (shellBackX - shellFrontX) * 0.3 + outX * 0.45;
            const shineY = shellFrontY + (shellBackY - shellFrontY) * 0.3 + outY * 0.45;
            const shine2X = shellFrontX + (shellBackX - shellFrontX) * 0.65 + outX * 0.4;
            const shine2Y = shellFrontY + (shellBackY - shellFrontY) * 0.65 + outY * 0.4;
            const shineCol = isRedTeam ? "rgba(180,30,30,0.35)" : "rgba(100,120,200,0.35)";
            drawCtx.strokeStyle = shineCol;
            drawCtx.lineWidth = 3;
            drawCtx.lineCap = "round";
            drawCtx.beginPath();
            drawCtx.moveTo(shineX, shineY);
            drawCtx.lineTo(shine2X, shine2Y);
            drawCtx.stroke();
        });

        // Center seam line
        drawCtx.strokeStyle = isRedTeam ? "#440000" : "#0a0a1a";
        drawCtx.lineWidth = 1.5;
        drawCtx.setLineDash([3, 4]);
        drawCtx.beginPath();
        drawCtx.moveTo(shellFrontX, shellFrontY);
        drawCtx.lineTo(shellBackX, shellBackY);
        drawCtx.stroke();
        drawCtx.setLineDash([]);

        drawCtx.restore();
    }

    // Shield indicator ring around shielded units
    if (actor.shielded && actor.shieldAmount > 0) {
        drawCtx.save();
        drawCtx.strokeStyle = "#aaddff";
        drawCtx.lineWidth = 2;
        drawCtx.globalAlpha = 0.7 + 0.3 * Math.sin(frame * 0.15);
        drawCtx.beginPath();
        drawCtx.arc(px, bodyBaseY, dim.width * 0.7, 0, Math.PI*2);
        drawCtx.stroke();
        drawCtx.restore();
    }

    if (actor.isNymph) drawCtx.globalAlpha = 1; // restore after nymph transparency
    drawHealthBar(px-18, py-85, 36, 5, actor.health, actor.maxHealth, drawCtx);
    drawPredatorDebug(actor, px, py);
}

// Insect leg helper — standalone, no name collision
function _drawInsectLeg(drawCtx, hx, hy, side, phaseOffset, pos, actor, legData, dirX, dirY, perpX, perpY) {
    const coxaLen=legData.coxa, femurLen=legData.femur, tibiaLen=legData.tibia;
    const outX=perpX*side, outY=perpY*side;
    let gait=actor.state!=="attack"?Math.sin(actor.walkCycle+phaseOffset):0;
    const isSwing=gait>0;
    let stride=isSwing?gait*4:0, lift=isSwing?gait*4:0;
    const j1x=hx+outX*coxaLen, j1y=hy+outY*coxaLen+2-lift*0.5;
    const sweep=Math.sin(actor.walkCycle*legData.swingSpeed+phaseOffset)*4;
    let j2x=j1x+(-dirX)*femurLen*0.6+outX*(femurLen*0.4+sweep);
    let j2y=j1y+(-dirY)*femurLen*0.6+outY*(femurLen*0.4+sweep)-lift*0.5;
    if (actor.state==="attack"&&pos===-1) {
        const strike=Math.sin(actor.attackAnim);
        if (strike>0) { j2x+=dirX*strike*-0.5; j2y+=dirY*strike*-0.5; }
    }
    const gtX=j2x+dirX*stride, gtY=j2y+10-lift;
    const dx=gtX-j2x, dy=gtY-j2y, len=Math.hypot(dx,dy)||1;
    const footX=j2x+(dx/len)*tibiaLen, footY=j2y+(dy/len)*tibiaLen;
    drawCtx.beginPath(); drawCtx.moveTo(hx,hy); drawCtx.lineTo(j1x,j1y); drawCtx.lineTo(j2x,j2y); drawCtx.lineTo(footX,footY); drawCtx.stroke();
}

function _drawVirus(actor, px, py, drawCtx) {
    drawHealthBar(px-14, py-75, 28, 4, actor.health, actor.maxHealth, drawCtx);
    const bodyY=py-40;
    drawCtx.fillStyle="#222"; drawCtx.fillRect(px-4,bodyY+10,8,12);

    const elementDef=ELEMENTS.find(e=>e.id===actor.element);
    const elementColor=actor.isNeutralRecruit?"#aaaaaa":(elementDef?elementDef.color:"#777");
    const hr=actor.maxHealth>0?actor.health/actor.maxHealth:0;
    const br=0.25+hr*0.75;
    const r=parseInt(elementColor.substring(1,3),16);
    const g=parseInt(elementColor.substring(3,5),16);
    const b=parseInt(elementColor.substring(5,7),16);
    const headColor=`rgb(${Math.floor(r*br)},${Math.floor(g*br)},${Math.floor(b*br)})`;

    drawCtx.fillStyle=actor.hitFlash>0&&actor.state!=="retreat"?"#fff":headColor;
    drawCtx.beginPath(); drawCtx.moveTo(px,bodyY-8); drawCtx.lineTo(px+10,bodyY+2);
    drawCtx.lineTo(px,bodyY+12); drawCtx.lineTo(px-10,bodyY+2); drawCtx.closePath(); drawCtx.fill();
    drawCtx.fillStyle="rgba(255,255,255,0.2)";
    drawCtx.beginPath(); drawCtx.moveTo(px,bodyY-8); drawCtx.lineTo(px+5,bodyY+2); drawCtx.lineTo(px,bodyY+6); drawCtx.closePath(); drawCtx.fill();

    // 3 mechanical legs (FIX: drawLeg is local, no collision)
    drawCtx.strokeStyle="#111"; drawCtx.lineWidth=3;
    const legSpread=14, step=Math.sin(actor.walkCycle*0.12+actor.x)*4;
    function drawVirusLeg(offsetX) {
        const hipX=px+offsetX, hipY=bodyY+20;
        const kneeX=hipX+offsetX*0.4, kneeY=hipY+10+step;
        const footX=kneeX+offsetX*0.4, footY=kneeY+12;
        drawCtx.beginPath(); drawCtx.moveTo(hipX,hipY); drawCtx.lineTo(kneeX,kneeY); drawCtx.lineTo(footX,footY); drawCtx.stroke();
    }
    drawVirusLeg(-legSpread); drawVirusLeg(legSpread); drawVirusLeg(0);
}

// ─────────────────────────────────────────────────────────
//  PLAYER DRAW
// ─────────────────────────────────────────────────────────
function drawPlayer(p) {
    if (player.angryTimer>0) player.angryTimer--;
    const bob=Math.sin(frame*cfg.bobSpeed)*cfg.bobAmount;
    let targetTilt=player.targetX>player.x?cfg.tiltIntensity:(player.targetX<player.x?-cfg.tiltIntensity:0);
    player.rotY+=((player.baseRot+targetTilt)-player.rotY)*cfg.rotationSmoothing;
    const w=26,h=22,d=36,c=Math.cos(player.rotY),s=Math.sin(player.rotY);
    ctx.save(); ctx.translate(p.x, p.y+bob-45);
    const proj=(x,y,z)=>{ let rZ=x*s+z*c; return {x:x*c-z*s, y:y+rZ*0.35}; };
    const v=[proj(-w,-h,-7),proj(w,-h,-7),proj(w,h,0),proj(-w,h,0),
             proj(-w,-h,d), proj(w,-h,d), proj(w,h,d), proj(-w,h,d)];
    let ventPos=proj(w,-2,d/2);
    if (frame%cfg.exhaustFrequency===0) {
        smoke.push({x:p.x+ventPos.x,y:p.y+bob-45+ventPos.y,vx:0.2+Math.random()*0.4,vy:-0.15-Math.random()*0.2,life:1,size:4+Math.random()*6});
    }
    ctx.lineWidth=5; ctx.strokeStyle="#050505";
    for (let t=0;t<4;t++) {
        let sock=proj(t%2===0?-11:11,t<2?-7:7,d);
        if (t===3&&latchedPillar&&latchedPillar.health>0) {
            const tx=(latchedPillar.x-player.visualX-(latchedPillar.y-player.visualY))*TILE_W+canvas.width/2;
            const ty=(latchedPillar.x-player.visualX+(latchedPillar.y-player.visualY))*TILE_H+canvas.height/2-85;
            ctx.save(); ctx.setTransform(1,0,0,1,0,0);
            ctx.beginPath(); ctx.moveTo(p.x+sock.x,p.y+bob-45+sock.y); ctx.quadraticCurveTo(p.x+sock.x,p.y+bob+5,tx,ty);
            ctx.strokeStyle="#050505"; ctx.lineWidth=7; ctx.stroke();
            ctx.strokeStyle="#0f8"; ctx.lineWidth=2; ctx.setLineDash([4,12]); ctx.lineDashOffset=-frame*3; ctx.stroke();
            ctx.restore();
        } else {
            ctx.beginPath(); ctx.moveTo(sock.x,sock.y);
            for (let i=0;i<50;i+=10) ctx.lineTo(sock.x+Math.sin(frame*0.06+t)*5, sock.y+i);
            ctx.stroke();
        }
    }
    const drawF=(pts,col)=>{ ctx.fillStyle=col; ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y); pts.forEach(pt=>ctx.lineTo(pt.x,pt.y)); ctx.fill(); };
    drawF([v[4],v[5],v[6],v[7]],"#020202"); drawF([v[0],v[3],v[7],v[4]],"#0a0a0a");
    drawF([v[1],v[2],v[6],v[5]],"#111111"); drawF([v[0],v[1],v[5],v[4]],"#222222");
    drawF([v[0],v[1],v[2],v[3]],"#333333");
    const sw=w*0.82,sh=h*0.78,sz=-7.2;
    const sPts=[proj(-sw,-sh,sz),proj(sw,-sh,sz),proj(sw,sh,sz+0.5),proj(-sw,sh,sz+0.5)];
    ctx.fillStyle="#010801"; ctx.beginPath(); ctx.moveTo(sPts[0].x,sPts[0].y); sPts.forEach(pt=>ctx.lineTo(pt.x,pt.y)); ctx.fill();
    const isAngry=player.angryTimer>0;
    ctx.strokeStyle=isAngry?"#f22":"#0f8"; ctx.lineWidth=3; ctx.lineCap="round";
    [-1,1].forEach(sd=>{
        ctx.beginPath();
        let xOff=sd===-1?-11:4;
        let e1=proj(xOff,-1+(isAngry&&sd===-1?-2:0),sz-0.1);
        let e2=proj(xOff+7,-1+(isAngry&&sd===1?-2:0),sz-0.1);
        ctx.moveTo(e1.x,e1.y); ctx.lineTo(e2.x,e2.y); ctx.stroke();
    });
    ctx.restore();
}

function drawFollowerElementUI() {
    const x=20, rowH=28, width=180;

    ctx.save(); ctx.setTransform(1,0,0,1,0,0);

        const yy=y+i*rowH;

        ctx.fillStyle=selected?"rgba(255,255,255,0.12)":"rgba(0,0,0,0.65)";
        ctx.fillRect(x,yy,width,rowH);
        ctx.strokeStyle=unlocked?el.color:"#333"; ctx.lineWidth=selected?2:1;
        ctx.strokeRect(x,yy,width,rowH);

        if (unlocked) {

            const pool = followerByElement[el.id] || [];
            const brawlers = pool.filter(a=>a.role==="brawler").length;
            const snipers  = pool.filter(a=>a.role==="sniper").length;
            const campers  = pool.filter(a=>a.role==="camper").length;

            // count on right
            ctx.textAlign="right";
            ctx.fillText(count, x+width-10, yy+rowH/2);

            ctx.font="13px monospace";
        }

}

function handleFollowerUIClick(x, y) {
    const baseX=20, rowH=28, width=180;
    const totalH=ELEMENTS.length*rowH, baseY=canvas.height-20-totalH;
    if (x<baseX||x>baseX+width||y<baseY||y>baseY+totalH) return false;
    const index=Math.floor((y-baseY)/rowH);
    const element=ELEMENTS[index];
    if (!element||!unlockedElements.has(element.id)) return false;
    player.selectedElement=element.id; return true;
}

let dayTimer = 0;           // frames elapsed since day started
const DAY_MIN_FRAMES = 1800; // minimum 30 seconds of day (at 60fps)

function startNight() {
    gameState.phase="night";
    dayTimer=0;
    nightKillCount=0;
    nightEnemiesTarget=enemiesThisWave();
    nightPredatorsRemaining=predatorsThisWave();
    zonePredators={};
    zoneRespawnTimers={};
    waveUI.textContent="Night "+gameState.nightNumber+" — Kill "+nightEnemiesTarget;
}

function checkWaveClear() {
    if (gameState.phase!=="night") return;
    // Night ends when kill target is reached
    if (nightKillCount >= nightEnemiesTarget) {
        gameState.phase="waveComplete";
        gameState.totalWavesSurvived++;
        showWaveClear();
    }
}

function showWaveClear() {
    const overlay=document.getElementById("overlay");
    document.getElementById("ovr-title").textContent="WAVE "+gameState.nightNumber+" CLEARED";
    document.getElementById("ovr-title").style.color="#0f8";
    document.getElementById("ovr-sub").textContent="Opening Supply Cache…";
    document.getElementById("ovr-shards").textContent=shardCount;
    document.getElementById("ovr-conv").textContent=dayStats.redConverted;
    document.getElementById("ovr-waves").textContent=gameState.totalWavesSurvived;
    document.getElementById("ovr-btn").textContent="NEXT WAVE";
    document.getElementById("ovr-btn").onclick=nextWave;
    buildShopGrid();
    overlay.classList.add("active");
}

function showGameOver() {
    gameState.phase="gameOver";
    gameState.running=false;
    const overlay=document.getElementById("overlay");
    document.getElementById("ovr-title").textContent="CRYSTAL DESTROYED";
    document.getElementById("ovr-title").style.color="#f22";
    document.getElementById("ovr-sub").textContent="The network has collapsed.";
    document.getElementById("ovr-shards").textContent=shardCount;
    document.getElementById("ovr-conv").textContent=dayStats.redConverted;
    document.getElementById("ovr-waves").textContent=gameState.totalWavesSurvived;
    document.getElementById("ovr-btn").textContent="RESTART";
    document.getElementById("ovr-btn").onclick=restartGame;
    document.getElementById("shopGrid").innerHTML="";
    overlay.classList.add("active");
}

function buildShopGrid() {
    const grid=document.getElementById("shopGrid");
    grid.innerHTML="";
    SHOP_ITEMS.forEach(item=>{
        if (item.element&&unlockedElements.has(item.element)) return; // already unlocked
        const div=document.createElement("div");
        div.className="shop-item"+(boughtItems.has(item.id)?" bought":"");
        div.innerHTML=`<div>${item.label}</div><div class="cost">${item.cost} shards</div>`;
        div.onclick=()=>{
            if (shardCount<item.cost||boughtItems.has(item.id)) return;
            shardCount-=item.cost;
            saveShards();
            item.apply();
            boughtItems.add(item.id);
            div.classList.add("bought");
            document.getElementById("ovr-shards").textContent=shardCount;
            shardUI.textContent="Shards: "+shardCount;
    // Zone indicator
    const _zoneEl = document.getElementById("zoneInfo");
    if (_zoneEl) {
        const _pz = getZoneIndex(Math.floor(player.x));
        _zoneEl.textContent = _pz === 0 ? "Zone: Home" : "Zone: " + _pz;
    }
    // Update DNA HUD
    const _dna = getDNA();
    const dnaEntries = Object.entries(_dna).filter(([k,v])=>v>0);
    const dnaEl = document.getElementById("dnaHud");
    if (dnaEl) {
        dnaEl.textContent = dnaEntries.length === 0
            ? "DNA: none"
            : "DNA: " + dnaEntries.map(([k,v])=>k.replace("_"," ")+"x"+v).join(" | ");
    }
        };
        grid.appendChild(div);
    });
}

function spawnFollowerFromSave(entry) {
    const personality = entry.personality || PERSONALITY_KEYS[Math.floor(Math.random()*PERSONALITY_KEYS.length)];
    const stats = entry.stats || applyPersonality(personality);
    const role  = entry.role  || assignRole(stats);
    const npc = {
        type:"virus", element:entry.element||"fire",
        x:crystal.x+(Math.random()-0.5)*2,
        y:crystal.y+(Math.random()-0.5)*2,
        team:"green",
        health:stats.hp, maxHealth:stats.hp,
        moveSpeed: NPC_TYPES["virus"].moveSpeed + ((stats.speed||10)-10)*0.001,
        power: stats.attack||5,
        stats, personality, role,
        currentResonance:0, currentWill:stats.will||20,
        walkCycle:0, moveCooldown:0, stance:"follow", isFollower:true, isHealing:false,
        hitFlash:0, dead:false,
        combatTrait:entry.combatTrait, naturalTrait:entry.naturalTrait, perk:entry.perk
    };
    actors.push(npc); followers.push(npc);
    if(!followerByElement[npc.element]) followerByElement[npc.element]=[];
    followerByElement[npc.element].push(npc);
}

function nextWave() {
    gameState.nightNumber++;
    boughtItems.clear();
    dayStats.redSpawned=0; dayStats.redConverted=0;
    spawnHazardsForDay();

    // ── Collect every follower in the army right now ──
    // alive followers + still-walking-to-crystal + queued-for-respawn
    const armyNow = [
        ...followers.filter(a=>!a.dead&&!a.sacrificed&&a.isFollower&&a.personality),
        ...actors.filter(a=>a.team==="green"&&a.returningToCrystal&&!a.dead&&!a.sacrificed&&a.personality),
        ...respawnQueue.filter(e=>!e.isClone&&!e.sacrificed&&e.personality)
    ];
    const cloneArmy = [
        ...actors.filter(a=>a.isClone&&a.team==="green"&&!a.dead&&!a.sacrificed),
        ...respawnQueue.filter(e=>e.isClone)
    ];

    // Save full follower roster to localStorage
    const rosterToSave = armyNow.map(a=>({
        element:     a.element     || "fire",
        personality: a.personality,
        combatTrait: a.combatTrait,
        naturalTrait:a.naturalTrait,
        perk:        a.perk,
        stats:       a.stats,
        role:        a.role
    }));
    try { localStorage.setItem("tubecrawler_followers", JSON.stringify(rosterToSave)); } catch(e) {}

    // Save gameState
    saveGameState();

    // ── Wipe everything, start clean ──
    actors=[]; followers=[]; respawnQueue=[];
    ELEMENTS.forEach(el=>{ followerByElement[el.id]=[]; });
    activePredator=null; predatorRespawnTimer=0;
    zonePredators={}; zoneRespawnTimers={};

    // ── Restore saved followers at crystal ──
    const saved = loadFollowers();
    saved.forEach(entry => spawnFollowerFromSave(entry));

    // ── Restore clones at crystal ──
    cloneArmy.forEach(a => {
        if (a instanceof Predator) {
            a.x = crystal.x + (Math.random()-0.5)*2;
            a.y = crystal.y + (Math.random()-0.5)*2;
            a.job = null; a.state = "wander";
            actors.push(a);
        } else {
            // was queued clone entry
            const speciesDef = SPECIES[a.speciesName];
            if (!speciesDef) return;
            const classDef = speciesDef[a.className];
            const def = { width:classDef.width, height:classDef.height, moveSpeed:classDef.moveSpeed, health:classDef.health, power:classDef.power, color:speciesDef.color };
            const clone = new Predator(a.className, def, crystal.x+(Math.random()-0.5)*2, crystal.y+(Math.random()-0.5)*2);
            clone.state="wander"; clone.team="green"; clone.isClone=true;
            clone.speciesName=a.speciesName; clone.className=a.className;
            applySpeciesBody(clone, a.speciesName);
            actors.push(clone);
        }
    });

    // ── Spawn neutral recruits in zones — gray, convertible ──
    const hostileZones = Math.min(activeDayZones - 1, 5);
    for (let z = 1; z <= hostileZones; z++) {
        const count = 1 + Math.floor(Math.random() * 2);
        for (let i = 0; i < count; i++) {
            const spawnX = z * ZONE_LENGTH + 2 + Math.floor(Math.random() * (ZONE_LENGTH - 4));
            const spawnY = 2 + Math.floor(Math.random() * 2);
            actors.push({
                type:"virus", element:null, x:spawnX, y:spawnY,
                team:"red", isNeutralRecruit:true,
                health:15, maxHealth:15, moveSpeed:0.018, power:2,
                stats:null, personality:null, role:null,
                currentResonance:0, currentWill:0,
                walkCycle:0, moveCooldown:0,
                stance:"wander", isFollower:false, isHealing:false,
                hitFlash:0, spawnProtection:120, dead:false, convertFlash:0
            });
        }
    }
    // expand world
    // Zone cap at 5 — after that species rank up instead
    if (activeDayZones < 5) {
        activeDayZones++;
        for (let i=lastGenX+1;i<=lastGenX+ZONE_LENGTH;i++) generateSegment(i);
    }
    document.getElementById("overlay").classList.remove("active");
    gameState.running=true;
    startNight();
}

function restartGame() {
    // Full reset
    world=[];actors=[];followers=[];
    ELEMENTS.forEach(el=>{ followerByElement[el.id]=[]; });
    projectiles=[];fragments=[];smoke=[];shards=[];elementEffects=[];floatingTexts=[];followerProjectiles=[];clearDNA();
    pendingPillarDestruction=[];respawnQueue=[];
    frame=0;shake=0;lastGenX=0;shardCount=0;clearShards();clearUnlocks();clearFollowers();clearGameState();
    try { localStorage.removeItem('tubecrawler_followers'); } catch(e) {}
    unlockedElements=new Set(["fire","electric"]);
    latchedPillar=null;activePredator=null;predatorRespawnTimer=0;zonePredators={};zoneRespawnTimers={};
    activeDayZones=3;exploredZones=new Set();
    boughtItems.clear();
    crystal={ x:0,y:2,health:300,maxHealth:300,radius:0.8 };
    player={ x:2,y:1,visualX:2,visualY:1,targetX:2,targetY:1,
             rotY:Math.PI*0.75, baseRot:Math.PI*0.75, angryTimer:0,
             selectedElement:"fire", siphonHold:0 };
    gameState={ phase:"day", nightNumber:1, totalWavesSurvived:0, running:true };
    dayStats={ redSpawned:0, redConverted:0 };
    nightKillCount=0; nightEnemiesTarget=0; nightPredatorsRemaining=0;
    for (let i=0;i<20;i++) generateSegment(i);
    // No free spawns — player earns followers and encounters predators naturally
    spawnHazardsForDay();
    document.getElementById("overlay").classList.remove("active");
    requestAnimationFrame(render);
}
