<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coastal Estuary</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#87CEEB;font-family:system-ui}
canvas{display:block}
#home{
  position:fixed;top:14px;left:14px;z-index:10;
  background:rgba(255,255,255,0.75);color:#3a2808;text-decoration:none;
  padding:7px 15px;border-radius:10px;font:bold 13px/1 system-ui;
  backdrop-filter:blur(6px);border:1.5px solid rgba(255,255,255,0.6);
}
#home:hover{background:rgba(255,255,255,0.92)}
#hint{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,0.55);color:#3a6050;
  padding:6px 18px;border-radius:20px;font:13px/1.5 system-ui;
  backdrop-filter:blur(4px);pointer-events:none;z-index:10;
  white-space:nowrap;
}
</style>
</head>
<body>
<a id="home" href="../index.html">← Home</a>
<div id="hint">Drag · Scroll to zoom · Right-drag to pan</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Scene ─────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9FD8F0);
scene.fog = new THREE.FogExp2(0xB8E8F8, 0.012);

// ── Camera ────────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 400);
camera.position.set(22, 14, 28);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.maxPolarAngle = Math.PI * 0.46;
controls.minDistance = 8;
controls.maxDistance = 90;
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.update();

// ── Lighting ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xFFF5D8, 1.1));
scene.add(new THREE.HemisphereLight(0x9FD8F0, 0x88CC66, 0.5));

const sun = new THREE.DirectionalLight(0xFFE898, 2.2);
sun.position.set(35, 55, 25);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 180;
sun.shadow.camera.left = -55;
sun.shadow.camera.right = 55;
sun.shadow.camera.top = 55;
sun.shadow.camera.bottom = -55;
sun.shadow.bias = -0.001;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xA8D8FF, 0.45);
fill.position.set(-25, 8, -20);
scene.add(fill);

// ── Toon gradient maps ────────────────────────────────────────────────────────
function gradMap(steps) {
  const d = new Uint8Array(steps);
  for (let i = 0; i < steps; i++) d[i] = Math.round((i / (steps - 1)) * 255);
  const t = new THREE.DataTexture(d, steps, 1, THREE.RedFormat);
  t.minFilter = t.magFilter = THREE.NearestFilter;
  t.needsUpdate = true;
  return t;
}
const gm3 = gradMap(3);
const gm4 = gradMap(4);

function toon(color, extra) {
  return new THREE.MeshToonMaterial({ color, gradientMap: gm3, ...extra });
}

// ── Terrain height ────────────────────────────────────────────────────────────
function th(x, z) {
  let h = Math.sin(x * 0.14) * 1.0
        + Math.cos(z * 0.11) * 0.7
        + Math.sin(x * 0.31 + z * 0.22) * 0.45
        + Math.sin(x * 0.55 - z * 0.4) * 0.2;
  // Beach taper toward ocean
  if (z > 10) h -= (z - 10) * 0.45;
  // River valley (curves slightly with x offset)
  const rv = Math.abs(x + z * 0.15);
  if (rv < 5) h -= (5 - rv) * 0.32;
  return Math.max(h, -0.3);
}

// ── Ground ────────────────────────────────────────────────────────────────────
const GEO = new THREE.PlaneGeometry(130, 130, 90, 90);
GEO.rotateX(-Math.PI / 2);
const gPos = GEO.attributes.position;

// Vertex colors for zone painting
const colBuf = new Float32Array(gPos.count * 3);
for (let i = 0; i < gPos.count; i++) {
  const x = gPos.getX(i), z = gPos.getZ(i);
  gPos.setY(i, th(x, z));
  const y = th(x, z);
  const rv = Math.abs(x + z * 0.15);
  let r, g, b;
  if (z > 9 || y < -0.05) {       // sand / beach
    r = 0.96; g = 0.90; b = 0.63;
  } else if (rv < 4.2) {           // river mud bank
    r = 0.70; g = 0.60; b = 0.42;
  } else {                         // grass
    r = 0.49; g = 0.82; b = 0.44;
  }
  colBuf[i * 3] = r; colBuf[i * 3 + 1] = g; colBuf[i * 3 + 2] = b;
}
GEO.setAttribute('color', new THREE.BufferAttribute(colBuf, 3));
GEO.computeVertexNormals();

const ground = new THREE.Mesh(GEO, new THREE.MeshToonMaterial({ vertexColors: true, gradientMap: gm3 }));
ground.receiveShadow = true;
scene.add(ground);

// ── Water helpers ─────────────────────────────────────────────────────────────
function waterPlane(w, d, segs, color, opacity) {
  const geo = new THREE.PlaneGeometry(w, d, segs, segs);
  geo.rotateX(-Math.PI / 2);
  const mat = new THREE.MeshToonMaterial({ color, transparent: true, opacity, gradientMap: gm3, depthWrite: false });
  const mesh = new THREE.Mesh(geo, mat);
  return mesh;
}

// Ocean
const ocean = waterPlane(220, 100, 30, 0x55BBEC, 0.90);
ocean.position.set(0, -0.18, 55);
scene.add(ocean);

// Foam strip at shoreline
const foam = waterPlane(220, 3, 1, 0xEEF8FF, 0.60);
foam.position.set(0, -0.05, 11.5);
scene.add(foam);

// River — curved strip
const RIVER_PTS = [
  new THREE.Vector3(-3, -0.08, -38),
  new THREE.Vector3(-2, -0.06, -22),
  new THREE.Vector3(-1, -0.04, -10),
  new THREE.Vector3( 0, -0.03,  0),
  new THREE.Vector3( 1, -0.02,  8),
  new THREE.Vector3( 2, -0.02, 14),
];
const riverCurve = new THREE.CatmullRomCurve3(RIVER_PTS);

function buildStrip(curve, width, segments, widen) {
  const pts = curve.getPoints(segments);
  const verts = [], uvs = [], idx = [];
  for (let i = 0; i < pts.length; i++) {
    const t = i / (pts.length - 1);
    const p = pts[i];
    const next = pts[Math.min(i + 1, pts.length - 1)];
    const prev = pts[Math.max(i - 1, 0)];
    const tang = new THREE.Vector3().subVectors(next, prev).normalize();
    const right = new THREE.Vector3().crossVectors(tang, new THREE.Vector3(0, 1, 0)).normalize();
    const w = width * (widen ? (0.7 + t * 0.9) : 1.0);
    verts.push(p.x - right.x * w / 2, p.y, p.z - right.z * w / 2,
               p.x + right.x * w / 2, p.y, p.z + right.z * w / 2);
    uvs.push(0, t, 1, t);
    if (i < pts.length - 1) {
      const b = i * 2;
      idx.push(b, b + 1, b + 2, b + 1, b + 3, b + 2);
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  return geo;
}

const river = new THREE.Mesh(
  buildStrip(riverCurve, 5.5, 50, true),
  new THREE.MeshToonMaterial({ color: 0x70C8EE, transparent: true, opacity: 0.88, gradientMap: gm3, depthWrite: false })
);
scene.add(river);

// Estuary pool where river fans into ocean
const estuaryGeo = new THREE.CircleGeometry(8, 16);
const estuary = new THREE.Mesh(estuaryGeo,
  new THREE.MeshToonMaterial({ color: 0x60BFEA, transparent: true, opacity: 0.88, gradientMap: gm3, depthWrite: false }));
estuary.rotation.x = -Math.PI / 2;
estuary.position.set(1.5, -0.06, 16);
scene.add(estuary);

// ── Outline helper ────────────────────────────────────────────────────────────
function outline(mesh, t = 0.04, col = 0x2a1a08) {
  const m = new THREE.Mesh(mesh.geometry, new THREE.MeshBasicMaterial({ color: col, side: THREE.BackSide }));
  m.scale.setScalar(1 + t);
  mesh.add(m);
}

// ── Trees ─────────────────────────────────────────────────────────────────────
const TRUNK_MAT  = toon(0x7A4E28);
const LEAF_MATS  = [0x55A84E, 0x68BE60, 0x47984A, 0x76CC6E].map(c => toon(c));

function makeTree(x, z, sc = 1) {
  const g = new THREE.Group();
  const y = th(x, z);
  g.position.set(x, y, z);

  // Trunk
  const trk = new THREE.Mesh(new THREE.CylinderGeometry(0.18 * sc, 0.26 * sc, 1.8 * sc, 8), TRUNK_MAT);
  trk.position.y = 0.9 * sc;
  trk.castShadow = true;
  outline(trk, 0.06);
  g.add(trk);

  // Three stacked foliage blobs (AC signature look)
  const lmat = LEAF_MATS[Math.floor(Math.random() * LEAF_MATS.length)];
  [[0, 2.6, 1.2], [-0.3, 3.5, 0.95], [0.2, 4.3, 0.72]].forEach(([ox, oy, r]) => {
    const leaf = new THREE.Mesh(new THREE.SphereGeometry(r * sc, 8, 6), lmat);
    leaf.position.set(ox * sc, oy * sc, 0);
    leaf.castShadow = true;
    outline(leaf, 0.05);
    g.add(leaf);
  });

  scene.add(g);
}

// ── Bushes ────────────────────────────────────────────────────────────────────
const BUSH_MATS = [0x68B850, 0x55A040, 0x7ACC60].map(c => toon(c));
function makeBush(x, z, sc = 1) {
  const y = th(x, z);
  const mat = BUSH_MATS[Math.floor(Math.random() * BUSH_MATS.length)];
  [[0, 0, 0.55], [-0.35, 0.1, 0.42], [0.32, 0.08, 0.40]].forEach(([ox, oy, r]) => {
    const m = new THREE.Mesh(new THREE.SphereGeometry(r * sc, 7, 5), mat);
    m.position.set(x + ox * sc, y + 0.3 * sc + oy, z);
    m.castShadow = true;
    outline(m, 0.05);
    scene.add(m);
  });
}

// ── Rocks ─────────────────────────────────────────────────────────────────────
const ROCK_MATS = [toon(0x9A9888), toon(0x888878), toon(0xA8A898)];
function makeRock(x, z, sc = 1) {
  const y = th(x, z);
  const geo = new THREE.DodecahedronGeometry(sc, 0);
  geo.scale(1, 0.58 + Math.random() * 0.3, 0.85 + Math.random() * 0.2);
  const mat = ROCK_MATS[Math.floor(Math.random() * ROCK_MATS.length)];
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, y + sc * 0.35, z);
  m.rotation.y = Math.random() * Math.PI * 2;
  m.castShadow = true;
  m.receiveShadow = true;
  outline(m, 0.05);
  scene.add(m);
}

// ── Reeds ─────────────────────────────────────────────────────────────────────
const REED_MAT = toon(0x88B058);
const TUFT_MAT = toon(0xC8A040);
function makeReed(x, z) {
  const y = th(x, z);
  const h = 1.0 + Math.random() * 0.7;
  const stalk = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.09, h, 6), REED_MAT);
  stalk.position.set(x + (Math.random() - 0.5) * 0.3, y + h / 2, z + (Math.random() - 0.5) * 0.3);
  stalk.rotation.z = (Math.random() - 0.5) * 0.18;
  scene.add(stalk);
  const tuft = new THREE.Mesh(new THREE.SphereGeometry(0.16, 6, 4), TUFT_MAT);
  tuft.position.set(stalk.position.x, y + h + 0.1, stalk.position.z);
  scene.add(tuft);
}

// ── Flowers ───────────────────────────────────────────────────────────────────
const FLOWER_MATS = [toon(0xFF8888), toon(0xFFCC44), toon(0xFF88CC), toon(0xFFFFAA)];
function makeFlower(x, z) {
  const y = th(x, z);
  if (y < 0) return;
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 0.4, 5), toon(0x70A850));
  stem.position.set(x, y + 0.2, z);
  scene.add(stem);
  const mat = FLOWER_MATS[Math.floor(Math.random() * FLOWER_MATS.length)];
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.14, 6, 4), mat);
  head.position.set(x, y + 0.42, z);
  scene.add(head);
}

// ── Populate ──────────────────────────────────────────────────────────────────
// Trees: both river banks + background
[
  [-7,-22],[-9,-12],[-8,-2],[-10,6],[-6,2],
  [6,-20],[8,-9],[7,1],[9,7],[5,-5],
  [-14,-8],[-13,-28],[14,-15],[16,0],[-17,4],[15,-28],
].forEach(([x,z]) => makeTree(x, z, 0.8 + Math.random() * 0.55));

// Bushes near water edges and paths
[[-5,3],[4,6],[-3,-5],[5,-2],[-7,-4],[3,-9],[-12,-2],[11,3],[-4,8],[6,9]
].forEach(([x,z]) => makeBush(x, z, 0.7 + Math.random() * 0.4));

// Rocks along banks and beach
[
  [3,-4],[-4,-8],[5,4],[-2,2],[7,10],[-5,7],[9,-3],[-7,-14],[2,-17],[11,8],
  [-3,10],[4,12],[-8,5],[12,-5],[0,-20],
].forEach(([x,z]) => makeRock(x, z, 0.28 + Math.random() * 0.52));

// Reeds along river edge
for (let i = 0; i < 40; i++) {
  const t = Math.random();
  const p = riverCurve.getPoint(t);
  const side = Math.random() > 0.5 ? 1 : -1;
  makeReed(p.x + side * (2.6 + Math.random() * 1.8), p.z + (Math.random() - 0.5) * 3);
}
// Beach reeds
for (let i = 0; i < 14; i++) makeReed((Math.random() - 0.5) * 22, 9.5 + Math.random() * 2.5);

// Flowers scattered on grassland
for (let i = 0; i < 55; i++) {
  const x = (Math.random() - 0.5) * 50, z = (Math.random() - 0.5) * 50;
  if (Math.abs(x + z * 0.15) > 5.5) makeFlower(x, z);
}

// ── Skybox dome ───────────────────────────────────────────────────────────────
const skyGeo = new THREE.SphereGeometry(280, 32, 16);
skyGeo.scale(-1, 1, 1); // invert normals
const skyColors = new Float32Array(skyGeo.attributes.position.count * 3);
const skyPos = skyGeo.attributes.position;
for (let i = 0; i < skyPos.count; i++) {
  const y = skyPos.getY(i);
  const n = (y + 280) / 560; // 0=bottom 1=top
  const t = Math.max(0, Math.min(1, n));
  // horizon: warm peach → zenith: blue
  const r = 0.62 + t * (0.38 - 0.62);
  const g = 0.85 + t * (0.72 - 0.85);
  const b = 0.94 + t * (0.90 - 0.94);
  skyColors[i * 3] = r; skyColors[i * 3 + 1] = g; skyColors[i * 3 + 2] = b;
}
skyGeo.setAttribute('color', new THREE.BufferAttribute(skyColors, 3));
scene.add(new THREE.Mesh(skyGeo, new THREE.MeshBasicMaterial({ vertexColors: true })));

// Sun disc
const sunDisc = new THREE.Mesh(
  new THREE.CircleGeometry(9, 20),
  new THREE.MeshBasicMaterial({ color: 0xFFE870, transparent: true, opacity: 0.75, depthWrite: false })
);
sunDisc.position.copy(sun.position.clone().normalize().multiplyScalar(180));
sunDisc.lookAt(0, 0, 0);
scene.add(sunDisc);

// ── Clouds ────────────────────────────────────────────────────────────────────
const CLOUD_MAT = new THREE.MeshToonMaterial({ color: 0xFFFFFF, gradientMap: gm3 });
function makeCloud(x, y, z, sc) {
  const g = new THREE.Group();
  [[0,0,0,1],[-.7,.1,0,.7],[.7,.1,0,.75],[0,.2,-.4,.7],[0,.2,.4,.65]].forEach(([cx,cy,cz,r]) => {
    const m = new THREE.Mesh(new THREE.SphereGeometry(r * sc, 7, 5), CLOUD_MAT);
    m.position.set(cx * sc, cy * sc, cz * sc);
    g.add(m);
  });
  g.position.set(x, y, z);
  scene.add(g);
  return g;
}

const clouds = [
  makeCloud(-30, 28, -40, 4.5),
  makeCloud(20,  32, -50, 5.5),
  makeCloud(-10, 25, -70, 4.0),
  makeCloud(40,  30, -20, 3.5),
  makeCloud(-50, 26, 0,   5.0),
  makeCloud(10,  34, -35, 6.0),
];
const cloudSpeeds = clouds.map(() => 0.6 + Math.random() * 0.8);

// ── Birds (simple V-shapes) ───────────────────────────────────────────────────
const BIRD_MAT = new THREE.LineBasicMaterial({ color: 0x2a2a3a });
const birdGroups = Array.from({ length: 6 }, (_, i) => {
  const g = new THREE.Group();
  const pts = [new THREE.Vector3(-0.4, 0.1, 0), new THREE.Vector3(0, 0, 0), new THREE.Vector3(0.4, 0.1, 0)];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  g.add(new THREE.Line(geo, BIRD_MAT));
  g.position.set((Math.random() - 0.5) * 80, 22 + Math.random() * 14, (Math.random() - 0.5) * 80);
  scene.add(g);
  return g;
});
const birdPhases = birdGroups.map(() => Math.random() * Math.PI * 2);
const birdSpeeds = birdGroups.map(() => 3 + Math.random() * 4);

// ── Animated water vertices ───────────────────────────────────────────────────
const oceanPos = ocean.geometry.attributes.position;
const oceanBase = Float32Array.from(oceanPos.array);

const riverPos = river.geometry.attributes.position;
const riverBase = Float32Array.from(riverPos.array);

// ── Animate ───────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.elapsedTime;

  // Ocean wave vertices
  for (let i = 0; i < oceanPos.count; i++) {
    const bx = oceanBase[i * 3], bz = oceanBase[i * 3 + 2];
    oceanPos.setY(i, Math.sin(bx * 0.25 + t * 1.4) * 0.14 + Math.cos(bz * 0.18 + t * 1.1) * 0.09);
  }
  oceanPos.needsUpdate = true;

  // River gentle ripple
  for (let i = 0; i < riverPos.count; i++) {
    const bx = riverBase[i * 3], bz = riverBase[i * 3 + 2];
    riverPos.setY(i, riverBase[i * 3 + 1] + Math.sin(bx * 0.4 + t * 1.8) * 0.04);
  }
  riverPos.needsUpdate = true;

  // Foam pulsing
  foam.position.y = -0.05 + Math.sin(t * 1.2) * 0.04;
  foam.material.opacity = 0.4 + Math.sin(t * 0.8) * 0.18;
  estuary.position.y = -0.06 + Math.sin(t * 0.9 + 1.0) * 0.03;

  // Clouds drifting
  clouds.forEach((c, i) => {
    c.position.x += cloudSpeeds[i] * dt;
    if (c.position.x > 120) c.position.x = -120;
  });

  // Birds circling
  birdGroups.forEach((b, i) => {
    const sp = birdSpeeds[i], ph = birdPhases[i];
    b.position.x += sp * dt;
    b.position.y = 22 + Math.sin(t * 0.6 + ph) * 3;
    if (b.position.x > 100) b.position.x = -100;
    // Wing flap
    b.children[0].geometry.attributes.position.array[1] =  Math.sin(t * 6 + ph) * 0.18;
    b.children[0].geometry.attributes.position.array[7] =  Math.sin(t * 6 + ph) * 0.18;
    b.children[0].geometry.attributes.position.needsUpdate = true;
  });

  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
