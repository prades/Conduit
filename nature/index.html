<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

canvas{display:block}

  position:fixed;top:14px;left:14px;z-index:10;

</head>
<body>
<a id="home" href="../index.html">← Home</a>
<div id="hint">Drag · Scroll to zoom · Right-drag to pan</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Scene ─────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8ECFF2);
scene.fog = new THREE.FogExp2(0xC2E8F5, 0.009);

// ── Camera ────────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 400);
camera.position.set(22, 14, 28);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.maxPolarAngle = Math.PI * 0.46;
controls.minDistance = 8;
controls.maxDistance = 90;
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.update();

// ── Lighting ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xFFF8E8, 1.3));
scene.add(new THREE.HemisphereLight(0xAEDDF5, 0x90CC60, 0.65));

const sun = new THREE.DirectionalLight(0xFFEA90, 2.6);
sun.position.set(35, 55, 25);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 180;
sun.shadow.camera.left = -55;
sun.shadow.camera.right = 55;
sun.shadow.camera.top = 55;
sun.shadow.camera.bottom = -55;
sun.shadow.bias = -0.001;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xB8E0FF, 0.60);
fill.position.set(-25, 8, -20);
scene.add(fill);

// ── Toon gradient maps ────────────────────────────────────────────────────────
function gradMap(steps) {
  const d = new Uint8Array(steps);
  for (let i = 0; i < steps; i++) d[i] = Math.round((i / (steps - 1)) * 255);
  const t = new THREE.DataTexture(d, steps, 1, THREE.RedFormat);
  t.minFilter = t.magFilter = THREE.NearestFilter;
  t.needsUpdate = true;
  return t;
}
const gm3 = gradMap(3);
const gm4 = gradMap(4);

// ── Canvas textures ───────────────────────────────────────────────────────────
function makeIrisTex() {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const x = c.getContext('2d');
  const g = x.createRadialGradient(64, 52, 4, 64, 64, 60);
  g.addColorStop(0.00, '#90C8F0'); g.addColorStop(0.40, '#4A8EC0');
  g.addColorStop(0.80, '#1E5080'); g.addColorStop(1.00, '#080F18');
  x.fillStyle = g;
  x.beginPath(); x.arc(64, 64, 60, 0, Math.PI * 2); x.fill();
  // subtle fiber lines
  x.strokeStyle = 'rgba(160,210,255,0.20)'; x.lineWidth = 1.2;
  for (let i = 0; i < 14; i++) {
    const a = (i / 14) * Math.PI * 2;
    x.beginPath(); x.moveTo(64 + Math.cos(a)*12, 64 + Math.sin(a)*12);
    x.lineTo(64 + Math.cos(a)*56, 64 + Math.sin(a)*56); x.stroke();
  }
  return new THREE.CanvasTexture(c);
}
const IRIS_TEX = makeIrisTex();

function toon(color, extra) {
  return new THREE.MeshToonMaterial({ color, gradientMap: gm3, ...extra });
}

// ── Terrain height ────────────────────────────────────────────────────────────
function th(x, z) {
  let h = Math.sin(x * 0.14) * 1.0
        + Math.cos(z * 0.11) * 0.7
        + Math.sin(x * 0.31 + z * 0.22) * 0.45
        + Math.sin(x * 0.55 - z * 0.4) * 0.2;
  // Beach taper toward ocean
  if (z > 10) h -= (z - 10) * 0.45;
  // River valley (curves slightly with x offset)
  const rv = Math.abs(x + z * 0.15);
  if (rv < 5) h -= (5 - rv) * 0.32;
  return Math.max(h, -0.3);
}

// ── Ground ────────────────────────────────────────────────────────────────────
const GEO = new THREE.PlaneGeometry(130, 130, 90, 90);
GEO.rotateX(-Math.PI / 2);
const gPos = GEO.attributes.position;

// Vertex colors for zone painting
const colBuf = new Float32Array(gPos.count * 3);
for (let i = 0; i < gPos.count; i++) {
  const x = gPos.getX(i), z = gPos.getZ(i);
  gPos.setY(i, th(x, z));
  const y = th(x, z);
  const rv = Math.abs(x + z * 0.15);
  let r, g, b;
  if (z > 9 || y < -0.05) {       // sand / beach — warm golden
    r = 0.97; g = 0.91; b = 0.58;
  } else if (rv < 4.2) {           // river mud bank — earthy
    r = 0.68; g = 0.58; b = 0.38;
  } else {                         // grass — vibrant AC green
    r = 0.44; g = 0.86; b = 0.42;
  }
  colBuf[i * 3] = r; colBuf[i * 3 + 1] = g; colBuf[i * 3 + 2] = b;
}
GEO.setAttribute('color', new THREE.BufferAttribute(colBuf, 3));
GEO.computeVertexNormals();

const ground = new THREE.Mesh(GEO, new THREE.MeshToonMaterial({ vertexColors: true, gradientMap: gm3 }));
ground.receiveShadow = true;
scene.add(ground);

// ── Water helpers ─────────────────────────────────────────────────────────────
function waterPlane(w, d, segs, color, opacity) {
  const geo = new THREE.PlaneGeometry(w, d, segs, segs);
  geo.rotateX(-Math.PI / 2);
  const mat = new THREE.MeshToonMaterial({ color, transparent: true, opacity, gradientMap: gm3, depthWrite: false });
  const mesh = new THREE.Mesh(geo, mat);
  return mesh;
}

// Ocean
const ocean = waterPlane(220, 100, 30, 0x32C4E0, 0.92);
ocean.position.set(0, -0.18, 55);
scene.add(ocean);

// Foam strip at shoreline
const foam = waterPlane(220, 3, 1, 0xEEF8FF, 0.60);
foam.position.set(0, -0.05, 11.5);
scene.add(foam);

// River — curved strip
const RIVER_PTS = [
  new THREE.Vector3(-3, -0.08, -38),
  new THREE.Vector3(-2, -0.06, -22),
  new THREE.Vector3(-1, -0.04, -10),
  new THREE.Vector3( 0, -0.03,  0),
  new THREE.Vector3( 1, -0.02,  8),
  new THREE.Vector3( 2, -0.02, 14),
];
const riverCurve = new THREE.CatmullRomCurve3(RIVER_PTS);

function buildStrip(curve, width, segments, widen) {
  const pts = curve.getPoints(segments);
  const verts = [], uvs = [], idx = [];
  for (let i = 0; i < pts.length; i++) {
    const t = i / (pts.length - 1);
    const p = pts[i];
    const next = pts[Math.min(i + 1, pts.length - 1)];
    const prev = pts[Math.max(i - 1, 0)];
    const tang = new THREE.Vector3().subVectors(next, prev).normalize();
    const right = new THREE.Vector3().crossVectors(tang, new THREE.Vector3(0, 1, 0)).normalize();
    const w = width * (widen ? (0.7 + t * 0.9) : 1.0);
    verts.push(p.x - right.x * w / 2, p.y, p.z - right.z * w / 2,
               p.x + right.x * w / 2, p.y, p.z + right.z * w / 2);
    uvs.push(0, t, 1, t);
    if (i < pts.length - 1) {
      const b = i * 2;
      idx.push(b, b + 1, b + 2, b + 1, b + 3, b + 2);
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  return geo;
}

const river = new THREE.Mesh(
  buildStrip(riverCurve, 5.5, 50, true),
  new THREE.MeshToonMaterial({ color: 0x48C0E0, transparent: true, opacity: 0.90, gradientMap: gm3, depthWrite: false })
);
scene.add(river);

// Estuary pool where river fans into ocean
const estuaryGeo = new THREE.CircleGeometry(8, 16);
const estuary = new THREE.Mesh(estuaryGeo,
  new THREE.MeshToonMaterial({ color: 0x3ABCD8, transparent: true, opacity: 0.90, gradientMap: gm3, depthWrite: false }));
estuary.rotation.x = -Math.PI / 2;
estuary.position.set(1.5, -0.06, 16);
scene.add(estuary);

// ── Outline helper ────────────────────────────────────────────────────────────
function outline(mesh, t = 0.04, col = 0x2a1a08) {
  const m = new THREE.Mesh(mesh.geometry, new THREE.MeshBasicMaterial({ color: col, side: THREE.BackSide }));
  m.scale.setScalar(1 + t);
  mesh.add(m);
}

// ── Trunk materials ───────────────────────────────────────────────────────────
const TRUNK_WARM = toon(0x8A5828);
const TRUNK_DARK = toon(0x624018);
const TRUNK_PALM = toon(0x9A7830);

// ── Apple tree (image 1 — round green blob mass + red fruit dots) ─────────────
function makeAppleTree(x, z, sc = 1) {
  const g = new THREE.Group();
  g.position.set(x, th(x, z), z);

  const trk = new THREE.Mesh(new THREE.CylinderGeometry(0.24*sc, 0.30*sc, 2.0*sc, 9), TRUNK_WARM);
  trk.position.y = 1.0*sc; trk.castShadow = true;
  outline(trk, 0.05); g.add(trk);

  const lA = toon(0x3A8A2A), lB = toon(0x4A9A34);
  [
    [ 0.00, 2.90,  0.00, 1.10],
    [-0.50, 2.60,  0.20, 0.78],
    [ 0.50, 2.60, -0.20, 0.74],
    [ 0.00, 2.30, -0.30, 0.68],
    [ 0.20, 3.60,  0.10, 0.60],
    [-0.20, 3.50, -0.20, 0.55],
  ].forEach(([ox, oy, oz, r], i) => {
    const leaf = new THREE.Mesh(new THREE.SphereGeometry(r*sc, 9, 7), i < 3 ? lA : lB);
    leaf.position.set(ox*sc, oy*sc, oz*sc);
    leaf.castShadow = true; outline(leaf, 0.04, 0x1A4814); g.add(leaf);
  });

  // Red apples with tiny stems
  const APPLE = toon(0xCC2828);
  const STEM  = toon(0x4A2A10);
  for (let i = 0; i < 5; i++) {
    const a = (i/5)*Math.PI*2, r = 0.72*sc;
    const ap = new THREE.Mesh(new THREE.SphereGeometry(0.11*sc, 6, 4), APPLE);
    const ay  = 2.62*sc + Math.sin(i*1.3)*0.28*sc;
    ap.position.set(Math.cos(a)*r, ay, Math.sin(a)*r*0.75); g.add(ap);
    const st = new THREE.Mesh(new THREE.CylinderGeometry(0.013*sc, 0.013*sc, 0.12*sc, 4), STEM);
    st.position.set(Math.cos(a)*r, ay + 0.12*sc, Math.sin(a)*r*0.75); g.add(st);
  }
  scene.add(g);
}

// ── Layered pine / fir (image 2 — stacked flat cone tiers) ───────────────────
function makePineTree(x, z, sc = 1) {
  const g = new THREE.Group();
  g.position.set(x, th(x, z), z);

  const trk = new THREE.Mesh(new THREE.CylinderGeometry(0.10*sc, 0.18*sc, 1.8*sc, 8), TRUNK_DARK);
  trk.position.y = 0.9*sc; trk.castShadow = true; g.add(trk);

  const DARK = toon(0x266022), MID = toon(0x347830);
  [
    { r:1.52, h:0.58, y:1.52 },
    { r:1.28, h:0.52, y:2.22 },
    { r:1.04, h:0.48, y:2.86 },
    { r:0.80, h:0.44, y:3.44 },
    { r:0.56, h:0.40, y:3.96 },
    { r:0.28, h:0.36, y:4.44 },
  ].forEach((t, i) => {
    const cone = new THREE.Mesh(new THREE.ConeGeometry(t.r*sc, t.h*sc, 11), i < 3 ? DARK : MID);
    cone.position.y = t.y*sc; cone.castShadow = true;
    outline(cone, 0.035, 0x102810); g.add(cone);
  });
  scene.add(g);
}

// ── Palm tree (image 1 — curved trunk, radiating fronds, coconuts) ─────────────
function makePalmTree(x, z, sc = 1) {
  const g = new THREE.Group();
  g.position.set(x, th(x, z), z);

  // Segmented trunk with slight curve
  for (let i = 0; i < 7; i++) {
    const f = i / 7;
    const seg = new THREE.Mesh(
      new THREE.CylinderGeometry(0.10*sc*(1-f*0.3), 0.13*sc*(1-f*0.25), 0.68*sc, 8), TRUNK_PALM);
    seg.position.set(Math.sin(f*0.5)*0.20*sc, (0.34 + i*0.68)*sc, 0);
    seg.rotation.z = -f * 0.16;
    seg.castShadow = true; g.add(seg);
  }

  const TX = Math.sin(0.5)*0.20*sc*2.1, TY = 4.3*sc;
  const FROND = toon(0x3CBB28), BLADE = toon(0x50C830);

  // Fronds — 8 radiating out and drooping
  for (let i = 0; i < 8; i++) {
    const a = (i/8)*Math.PI*2;
    const fg = new THREE.Group();
    fg.position.set(TX, TY, 0);
    fg.rotation.y = a;

    // Stem
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.035*sc, 0.055*sc, 1.1*sc, 5), FROND);
    stem.rotation.z = Math.PI/2; stem.position.x = 0.55*sc; fg.add(stem);

    // Leaf blade (flat elongated sphere)
    const blade = new THREE.Mesh(new THREE.SphereGeometry(0.40*sc, 8, 5), BLADE);
    blade.scale.set(1.35, 0.20, 0.52);
    blade.position.set(1.22*sc, -0.12*sc, 0); fg.add(blade);

    fg.rotation.x = 0.30; // droop
    g.add(fg);
  }

  // Coconuts
  const COCO = toon(0x7A5020);
  for (let i = 0; i < 3; i++) {
    const a = (i/3)*Math.PI*2;
    const c = new THREE.Mesh(new THREE.SphereGeometry(0.16*sc, 7, 5), COCO);
    c.position.set(TX + Math.cos(a)*0.22*sc, TY - 0.52*sc, Math.sin(a)*0.22*sc);
    g.add(c);
  }
  scene.add(g);
}

// ── Round deciduous tree (river bank style, improved clustering) ──────────────
const LEAF_MATS = [0x4AAA38, 0x5ABB44, 0x44A030, 0x62C048].map(c => toon(c));
function makeRoundTree(x, z, sc = 1) {
  const g = new THREE.Group();
  g.position.set(x, th(x, z), z);
  const trk = new THREE.Mesh(new THREE.CylinderGeometry(0.17*sc, 0.25*sc, 1.8*sc, 9), TRUNK_WARM);
  trk.position.y = 0.9*sc; trk.castShadow = true; outline(trk, 0.06); g.add(trk);
  const lmat = LEAF_MATS[Math.floor(Math.random()*LEAF_MATS.length)];
  [[0, 2.65, 1.15], [-0.32, 3.42, 0.90], [0.28, 3.40, 0.88], [0, 4.08, 0.64]]
    .forEach(([ox, oy, r]) => {
      const leaf = new THREE.Mesh(new THREE.SphereGeometry(r*sc, 9, 7), lmat);
      leaf.position.set(ox*sc, oy*sc, 0);
      leaf.castShadow = true; outline(leaf, 0.05); g.add(leaf);
    });
  scene.add(g);
}

// ── Flowering bush (image 2 — green base + colored flower clusters on top) ────
const FBUSH_COLORS = [0xFFDD28, 0xFF6888, 0xFFAA28, 0xFFF080, 0xFF88AA];
function makeFlowerBush(x, z, sc = 1, col) {
  const y = th(x, z);
  if (y < -0.1) return;
  const fc  = col || FBUSH_COLORS[Math.floor(Math.random()*FBUSH_COLORS.length)];
  const bmat = toon(0x389828), fmat = toon(fc);

  [[ 0.00, 0.30,  0.00, 0.44],
   [-0.32, 0.25,  0.12, 0.34],
   [ 0.30, 0.24, -0.10, 0.32],
   [ 0.08, 0.22, -0.30, 0.28],
   [-0.12, 0.22,  0.28, 0.26]].forEach(([bx, by, bz, r]) => {
    const b = new THREE.Mesh(new THREE.SphereGeometry(r*sc, 8, 6), bmat);
    b.position.set(x + bx*sc, y + by*sc, z + bz*sc);
    b.castShadow = true; outline(b, 0.04, 0x184818); scene.add(b);
  });

  // Flower dots on top surface
  for (let i = 0; i < 7; i++) {
    const a = (i/7)*Math.PI*2, r = 0.26*sc;
    const f = new THREE.Mesh(new THREE.SphereGeometry(0.085*sc, 6, 4), fmat);
    f.position.set(x + Math.cos(a)*r, y + 0.60*sc + (i%2)*0.05*sc, z + Math.sin(a)*r*0.85);
    scene.add(f);
  }
  const ctr = new THREE.Mesh(new THREE.SphereGeometry(0.090*sc, 6, 4), fmat);
  ctr.position.set(x, y + 0.68*sc, z);
  scene.add(ctr);
}

// ── Round bush (plain green, water-edge style) ────────────────────────────────
const RBUSH_A = toon(0x3A9828), RBUSH_B = toon(0x50A838);
function makeRoundBush(x, z, sc = 1) {
  const y = th(x, z);
  const mat = Math.random() < 0.5 ? RBUSH_A : RBUSH_B;
  [[0, 0.28, 0.44], [-0.30, 0.22, 0.34], [0.28, 0.22, 0.32], [0, 0.18, 0.26]]
    .forEach(([ox, oy, r]) => {
      const m = new THREE.Mesh(new THREE.SphereGeometry(r*sc, 8, 6), mat);
      m.position.set(x + ox*sc, y + oy*sc, z);
      m.castShadow = true; outline(m, 0.04, 0x184818); scene.add(m);
    });
}

// ── Tall tropical leaf plant (image 2 foreground) ─────────────────────────────
function makeTallPlant(x, z, sc = 1) {
  const y = th(x, z);
  if (y < -0.1) return;
  const lmat = toon(0x2A7420), lmat2 = toon(0x347A28);
  for (let i = 0; i < 6; i++) {
    const a = (i/6)*Math.PI*2;
    const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.38*sc, 7, 5), i % 2 === 0 ? lmat : lmat2);
    leaf.scale.set(0.44, 0.20, 1.32);
    leaf.position.set(x + Math.cos(a)*0.35*sc, y + 0.52*sc, z + Math.sin(a)*0.35*sc);
    leaf.rotation.y = a; leaf.rotation.z = 0.32;
    leaf.castShadow = true; outline(leaf, 0.05, 0x102810); scene.add(leaf);
  }
  // Center upright shoot
  const shoot = new THREE.Mesh(new THREE.CylinderGeometry(0.035*sc, 0.055*sc, 0.85*sc, 6), lmat);
  shoot.position.set(x, y + 0.42*sc, z);
  scene.add(shoot);
}

// ── Rocks ─────────────────────────────────────────────────────────────────────
const ROCK_MATS = [toon(0x9A9888), toon(0x888878), toon(0xA8A898)];
function makeRock(x, z, sc = 1) {
  const y = th(x, z);
  const geo = new THREE.DodecahedronGeometry(sc, 0);
  geo.scale(1, 0.58 + Math.random() * 0.3, 0.85 + Math.random() * 0.2);
  const m = new THREE.Mesh(geo, ROCK_MATS[Math.floor(Math.random()*ROCK_MATS.length)]);
  m.position.set(x, y + sc * 0.35, z);
  m.rotation.y = Math.random() * Math.PI * 2;
  m.castShadow = true; m.receiveShadow = true;
  outline(m, 0.05); scene.add(m);
}

// ── Reeds ─────────────────────────────────────────────────────────────────────
const REED_MAT = toon(0x88B058);
const TUFT_MAT = toon(0xC8A040);
function makeReed(x, z) {
  const y = th(x, z);
  const h = 1.0 + Math.random() * 0.7;
  const stalk = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.09, h, 6), REED_MAT);
  stalk.position.set(x + (Math.random()-0.5)*0.3, y + h/2, z + (Math.random()-0.5)*0.3);
  stalk.rotation.z = (Math.random()-0.5)*0.18; scene.add(stalk);
  const tuft = new THREE.Mesh(new THREE.SphereGeometry(0.16, 6, 4), TUFT_MAT);
  tuft.position.set(stalk.position.x, y + h + 0.1, stalk.position.z); scene.add(tuft);
}

// ── Small flowers ─────────────────────────────────────────────────────────────
const FLOWER_MATS = [toon(0xFF8888), toon(0xFFCC44), toon(0xFF88CC), toon(0xFFFFAA)];
function makeFlower(x, z) {
  const y = th(x, z);
  if (y < 0) return;
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 0.4, 5), toon(0x70A850));
  stem.position.set(x, y + 0.2, z); scene.add(stem);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.14, 6, 4), FLOWER_MATS[Math.floor(Math.random()*FLOWER_MATS.length)]);
  head.position.set(x, y + 0.42, z); scene.add(head);
}

// ── Populate ──────────────────────────────────────────────────────────────────
// Pine trees — far inland, hillier background
[[-13,-28],[-12,-18],[14,-26],[15,-16],[-17,-10],[16,-8],[-14,2],[13,-2]]
  .forEach(([x,z]) => makePineTree(x, z, 0.85 + Math.random()*0.45));

// Apple trees — feature trees near river bends

// Tall tropical leaf plants — river banks + estuary edges
[[-3,7],[3,7],[5,5],[-5,5],[-2,10],[2,10],[-6,-7],[4,-6],[-3,-3],[2,-2],[-8,0],[7,-2]]

// Rocks along banks and beach
[
  [3,-4],[-4,-8],[5,4],[-2,2],[7,10],[-5,7],[9,-3],[-7,-14],[2,-17],[11,8],

].forEach(([x,z]) => makeRock(x, z, 0.28 + Math.random() * 0.52));

// Flowers scattered on grassland
for (let i = 0; i < 55; i++) {

// ── Skybox dome ───────────────────────────────────────────────────────────────
const skyGeo = new THREE.SphereGeometry(280, 32, 16);
skyGeo.scale(-1, 1, 1); // invert normals
const skyColors = new Float32Array(skyGeo.attributes.position.count * 3);
const skyPos = skyGeo.attributes.position;
for (let i = 0; i < skyPos.count; i++) {
  const y = skyPos.getY(i);
  const n = (y + 280) / 560; // 0=bottom 1=top
  const t = Math.max(0, Math.min(1, n));
  // horizon: warm peach-cream → zenith: rich AC blue
  const r = 0.92 + t * (0.28 - 0.92);
  const g = 0.88 + t * (0.62 - 0.88);
  const b = 0.88 + t * (0.96 - 0.88);
  skyColors[i * 3] = r; skyColors[i * 3 + 1] = g; skyColors[i * 3 + 2] = b;
}
skyGeo.setAttribute('color', new THREE.BufferAttribute(skyColors, 3));
scene.add(new THREE.Mesh(skyGeo, new THREE.MeshBasicMaterial({ vertexColors: true })));

// Sun disc + halo
const sunDir = sun.position.clone().normalize();
const sunPos = sunDir.clone().multiplyScalar(180);
const sunDisc = new THREE.Mesh(
  new THREE.CircleGeometry(7, 24),
  new THREE.MeshBasicMaterial({ color: 0xFFF5A0, transparent: true, opacity: 0.95, depthWrite: false })

sunDisc.position.copy(sunPos); sunDisc.lookAt(0, 0, 0);
scene.add(sunDisc);
const sunHalo = new THREE.Mesh(
  new THREE.CircleGeometry(16, 24),

);
sunHalo.position.copy(sunPos.clone().multiplyScalar(0.998)); sunHalo.lookAt(0, 0, 0);
scene.add(sunHalo);

// ── Clouds ────────────────────────────────────────────────────────────────────
const CLOUD_MAT = new THREE.MeshToonMaterial({ color: 0xFFFFFF, gradientMap: gm3 });
function makeCloud(x, y, z, sc) {
  const g = new THREE.Group();
  [[0,0,0,1],[-.7,.1,0,.7],[.7,.1,0,.75],[0,.2,-.4,.7],[0,.2,.4,.65]].forEach(([cx,cy,cz,r]) => {
    const m = new THREE.Mesh(new THREE.SphereGeometry(r * sc, 7, 5), CLOUD_MAT);
    m.position.set(cx * sc, cy * sc, cz * sc);
    g.add(m);
  });
  g.position.set(x, y, z);
  scene.add(g);
  return g;
}

const clouds = [
  makeCloud(-30, 28, -40, 4.5),
  makeCloud(20,  32, -50, 5.5),
  makeCloud(-10, 25, -70, 4.0),
  makeCloud(40,  30, -20, 3.5),
  makeCloud(-50, 26, 0,   5.0),
  makeCloud(10,  34, -35, 6.0),
];
const cloudSpeeds = clouds.map(() => 0.6 + Math.random() * 0.8);

// ── Birds (simple V-shapes) ───────────────────────────────────────────────────
const BIRD_MAT = new THREE.LineBasicMaterial({ color: 0x2a2a3a });
const birdGroups = Array.from({ length: 6 }, (_, i) => {
  const g = new THREE.Group();
  const pts = [new THREE.Vector3(-0.4, 0.1, 0), new THREE.Vector3(0, 0, 0), new THREE.Vector3(0.4, 0.1, 0)];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  g.add(new THREE.Line(geo, BIRD_MAT));
  g.position.set((Math.random() - 0.5) * 80, 22 + Math.random() * 14, (Math.random() - 0.5) * 80);
  scene.add(g);
  return g;
});
const birdPhases = birdGroups.map(() => Math.random() * Math.PI * 2);
const birdSpeeds = birdGroups.map(() => 3 + Math.random() * 4);

// ── Animated water vertices ───────────────────────────────────────────────────
const oceanPos = ocean.geometry.attributes.position;
const oceanBase = Float32Array.from(oceanPos.array);

const riverPos = river.geometry.attributes.position;
const riverBase = Float32Array.from(riverPos.array);

// ── Player character ──────────────────────────────────────────────────────────
const char = new THREE.Group();

// Ground shadow disc
const charShadow = new THREE.Mesh(
  new THREE.CircleGeometry(0.36, 14),
  new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.18, depthWrite: false })
);
charShadow.rotation.x = -Math.PI / 2;
charShadow.position.y = 0.02;
char.add(charShadow);

// Legs
const legMat = toon(0x3A5090);
const legGeo = new THREE.CylinderGeometry(0.085, 0.095, 0.44, 7);
const legL = new THREE.Mesh(legGeo, legMat);
legL.position.set(-0.14, 0.27, 0); legL.castShadow = true;
const legR = new THREE.Mesh(legGeo, legMat);
legR.position.set( 0.14, 0.27, 0); legR.castShadow = true;
char.add(legL, legR);

// Body
const bodyMesh = new THREE.Mesh(new THREE.SphereGeometry(0.30, 9, 7), toon(0x7AB8E8));
bodyMesh.scale.set(1, 0.86, 0.90);
bodyMesh.position.y = 0.60;
bodyMesh.castShadow = true;
outline(bodyMesh, 0.04);
char.add(bodyMesh);

// Arms
const armMat = toon(0x7AB8E8);
const armGeo = new THREE.CylinderGeometry(0.065, 0.07, 0.36, 6);
const armL = new THREE.Mesh(armGeo, armMat); armL.position.set(-0.38, 0.58, 0); armL.rotation.z =  0.35; armL.castShadow = true;
const armR = new THREE.Mesh(armGeo, armMat); armR.position.set( 0.38, 0.58, 0); armR.rotation.z = -0.35; armR.castShadow = true;
char.add(armL, armR);

// Head pivot — the "bobble" parent
const headPivot = new THREE.Group();
headPivot.position.y = 1.12;
char.add(headPivot);

// Big round head — warmer skin, softer 4-step shading
const headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.48, 14, 11),
  new THREE.MeshToonMaterial({ color: 0xF5CA7A, gradientMap: gm4 }));
headMesh.castShadow = true;
outline(headMesh, 0.04);
headPivot.add(headMesh);

// Eyes with iris texture, eyelid arc, and blink
const charBlinkMeshes = [];

function addEye(px, py, pz) {
  const EG = new THREE.Group();
  EG.position.set(px, py, pz);

  // Sclera
  const sclera = new THREE.Mesh(new THREE.SphereGeometry(0.095, 12, 9),
    new THREE.MeshToonMaterial({ color: 0xFFFDF8, gradientMap: gm4 }));
  sclera.scale.z = 0.54;
  EG.add(sclera);

  // Iris disc with canvas gradient texture
  const iris = new THREE.Mesh(new THREE.CircleGeometry(0.066, 18),
    new THREE.MeshBasicMaterial({ map: IRIS_TEX }));
  iris.position.z = 0.051;
  EG.add(iris);

  // Pupil
  const pupil = new THREE.Mesh(new THREE.CircleGeometry(0.032, 14),
    new THREE.MeshBasicMaterial({ color: 0x060810 }));
  pupil.position.z = 0.054;
  EG.add(pupil);

  // Highlight — large upper gleam + tiny secondary
  const hl = new THREE.Mesh(new THREE.CircleGeometry(0.017, 8),
    new THREE.MeshBasicMaterial({ color: 0xFFFFFF }));
  hl.position.set(px > 0 ? -0.019 : 0.019, 0.024, 0.056);
  EG.add(hl);
  const hl2 = new THREE.Mesh(new THREE.CircleGeometry(0.008, 6),
    new THREE.MeshBasicMaterial({ color: 0xEEF4FF, transparent: true, opacity: 0.80 }));
  hl2.position.set(px > 0 ? 0.018 : -0.018, -0.018, 0.056);
  EG.add(hl2);

  // Upper eyelid arc (dark curved tube gives warmth + depth)
  const arc = new THREE.QuadraticBezierCurve3(
    new THREE.Vector3(-0.090, 0.004, 0),
    new THREE.Vector3(0,      0.036, 0),
    new THREE.Vector3( 0.090, 0.004, 0)
  );
  const eyelid = new THREE.Mesh(new THREE.TubeGeometry(arc, 10, 0.015, 5),
    toon(0x2A1008, { gradientMap: gm3 }));
  eyelid.position.z = 0.046;
  EG.add(eyelid);

  // Blink disc — skin-toned, scales up to cover eye on blink
  const blink = new THREE.Mesh(new THREE.CircleGeometry(0.098, 16),
    new THREE.MeshBasicMaterial({ color: 0xF2C870, depthWrite: false }));
  blink.position.z = 0.058;
  blink.scale.y = 0.001;
  EG.add(blink);
  charBlinkMeshes.push(blink);

  headPivot.add(EG);
}
addEye(-0.18, 0.07, 0.40);
addEye( 0.18, 0.07, 0.40);

// Blush — double layer (inner dense + outer soft halo)
[-0.28, 0.28].forEach(bx => {
  const inner = new THREE.Mesh(new THREE.CircleGeometry(0.088, 14),
    new THREE.MeshBasicMaterial({ color: 0xFF6868, transparent: true, opacity: 0.32, depthWrite: false }));
  inner.scale.set(1.5, 1.0, 1.0);
  inner.position.set(bx, -0.015, 0.425);
  headPivot.add(inner);
  const outer = new THREE.Mesh(new THREE.CircleGeometry(0.130, 14),
    new THREE.MeshBasicMaterial({ color: 0xFF9090, transparent: true, opacity: 0.12, depthWrite: false }));
  outer.scale.set(1.5, 1.0, 1.0);
  outer.position.set(bx, -0.015, 0.422);
  headPivot.add(outer);
});

// Hat brim + crown
const hatMat = toon(0xE86820);
const hatBrim = new THREE.Mesh(new THREE.CylinderGeometry(0.56, 0.56, 0.07, 14), hatMat);
hatBrim.position.y = 0.43;
const hatCrown = new THREE.Mesh(new THREE.CylinderGeometry(0.30, 0.40, 0.38, 14), hatMat);
hatCrown.position.y = 0.66;
outline(hatCrown, 0.05);
headPivot.add(hatBrim, hatCrown);

// Start position (open grass area)
const SPAWN_X = 5, SPAWN_Z = -3;
char.position.set(SPAWN_X, th(SPAWN_X, SPAWN_Z), SPAWN_Z);
scene.add(char);

// ── Walk target ring ──────────────────────────────────────────────────────────
const walkRing = new THREE.Mesh(
  new THREE.RingGeometry(0.22, 0.38, 18),
  new THREE.MeshBasicMaterial({ color: 0xFFDD44, transparent: true, opacity: 0, depthWrite: false, side: THREE.DoubleSide })
);
walkRing.rotation.x = -Math.PI / 2;
scene.add(walkRing);

// ── Movement state ────────────────────────────────────────────────────────────
const charPos = new THREE.Vector3(SPAWN_X, th(SPAWN_X, SPAWN_Z), SPAWN_Z);
let charTarget = null;
let charMoving = false;
let walkPhase = 0;

function isWalkable(x, z) {
  if (z > 13.5) return false;          // ocean
  if (th(x, z) < -0.22) return false;  // deep water / river channel
  return true;
}

// ── Click / tap → walk ────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const ndcMouse  = new THREE.Vector2();
let pDownX = 0, pDownY = 0;
let activePtId = -1;

renderer.domElement.addEventListener('pointerdown', e => {
  if (activePtId !== -1) return;
  activePtId = e.pointerId;
  pDownX = e.clientX; pDownY = e.clientY;
});

renderer.domElement.addEventListener('pointerup', e => {
  if (e.pointerId !== activePtId) return;
  activePtId = -1;
  const dx = e.clientX - pDownX, dy = e.clientY - pDownY;
  if (dx * dx + dy * dy > 64) return; // was a drag → orbit, ignore

  const rect = renderer.domElement.getBoundingClientRect();
  ndcMouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
  ndcMouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;
  raycaster.setFromCamera(ndcMouse, camera);

  const hits = raycaster.intersectObject(ground);
  if (!hits.length) return;
  const pt = hits[0].point;
  if (!isWalkable(pt.x, pt.z)) return;

  charTarget = new THREE.Vector3(pt.x, th(pt.x, pt.z), pt.z);
  charMoving = true;
  walkRing.position.set(pt.x, th(pt.x, pt.z) + 0.05, pt.z);
  walkRing.material.opacity = 0.9;
  walkRing.scale.setScalar(1.0);
});

renderer.domElement.addEventListener('pointercancel', e => {
  if (e.pointerId === activePtId) activePtId = -1;
});

// ── Character blink state ─────────────────────────────────────────────────────
let charBlinkTimer = 2.5 + Math.random() * 2.5;
let charBlinking = false, charBlinkPhase = 0;

// ── Animate ───────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.elapsedTime;

  // Ocean wave vertices
  for (let i = 0; i < oceanPos.count; i++) {
    const bx = oceanBase[i * 3], bz = oceanBase[i * 3 + 2];
    oceanPos.setY(i, Math.sin(bx * 0.25 + t * 1.4) * 0.14 + Math.cos(bz * 0.18 + t * 1.1) * 0.09);
  }
  oceanPos.needsUpdate = true;

  // River gentle ripple
  for (let i = 0; i < riverPos.count; i++) {
    const bx = riverBase[i * 3], bz = riverBase[i * 3 + 2];
    riverPos.setY(i, riverBase[i * 3 + 1] + Math.sin(bx * 0.4 + t * 1.8) * 0.04);
  }
  riverPos.needsUpdate = true;

  // Foam pulsing
  foam.position.y = -0.05 + Math.sin(t * 1.2) * 0.04;
  foam.material.opacity = 0.4 + Math.sin(t * 0.8) * 0.18;
  estuary.position.y = -0.06 + Math.sin(t * 0.9 + 1.0) * 0.03;

  // Clouds drifting
  clouds.forEach((c, i) => {
    c.position.x += cloudSpeeds[i] * dt;
    if (c.position.x > 120) c.position.x = -120;
  });

  // Birds circling
  birdGroups.forEach((b, i) => {
    const sp = birdSpeeds[i], ph = birdPhases[i];
    b.position.x += sp * dt;
    b.position.y = 22 + Math.sin(t * 0.6 + ph) * 3;
    if (b.position.x > 100) b.position.x = -100;
    // Wing flap
    b.children[0].geometry.attributes.position.array[1] =  Math.sin(t * 6 + ph) * 0.18;
    b.children[0].geometry.attributes.position.array[7] =  Math.sin(t * 6 + ph) * 0.18;
    b.children[0].geometry.attributes.position.needsUpdate = true;
  });

  // ── Character update ─────────────────────────────────────────────────────────
  if (charMoving && charTarget) {
    const toTarget = new THREE.Vector3().subVectors(charTarget, charPos);
    const dist = toTarget.length();
    if (dist > 0.07) {
      const SPEED = 4.2;
      charPos.addScaledVector(toTarget.clone().normalize(), Math.min(SPEED * dt, dist));
      charPos.y = th(charPos.x, charPos.z);
      char.position.copy(charPos);

      // Face movement direction
      char.rotation.y = Math.atan2(toTarget.x, toTarget.z);

      // Walk cycle: legs swing, arms counter-swing, body slight lean
      walkPhase += dt * 10;
      legL.rotation.x  =  Math.sin(walkPhase) * 0.55;
      legR.rotation.x  = -Math.sin(walkPhase) * 0.55;
      armL.rotation.x  = -Math.sin(walkPhase) * 0.40;
      armR.rotation.x  =  Math.sin(walkPhase) * 0.40;
      bodyMesh.rotation.z = Math.sin(walkPhase * 0.5) * 0.04;

      // Head bobble — oversized head bounces more dramatically
      headPivot.position.y = 1.12 + Math.abs(Math.sin(walkPhase * 0.5)) * 0.10;
      headPivot.rotation.z = Math.sin(walkPhase * 0.5) * 0.06;
    } else {
      charMoving = false;
      legL.rotation.x = legR.rotation.x = armL.rotation.x = armR.rotation.x = 0;
      bodyMesh.rotation.z = 0;
    }

    // Walk ring: spin + fade
    walkRing.rotation.y += dt * 2.5;
    walkRing.material.opacity = Math.max(0, walkRing.material.opacity - dt * 1.2);
  }

  // Idle: gentle breathing bob
  if (!charMoving) {
    headPivot.position.y = 1.12 + Math.sin(t * 1.7) * 0.022;
    headPivot.rotation.z = Math.sin(t * 0.9) * 0.015;
    bodyMesh.scale.y = 0.86 + Math.sin(t * 1.7) * 0.012;
  }

  // Character blink
  charBlinkTimer -= dt;
  if (charBlinkTimer <= 0 && !charBlinking) { charBlinking = true; charBlinkPhase = 0; }
  if (charBlinking) {
    charBlinkPhase += dt / 0.10;
    const b = charBlinkPhase < 1 ? charBlinkPhase : Math.max(0, 2 - charBlinkPhase);
    charBlinkMeshes.forEach(bm => { bm.scale.y = Math.max(0.001, b); });
    if (charBlinkPhase >= 2.0) {
      charBlinking = false;
      charBlinkTimer = 3.0 + Math.random() * 4.5;
      charBlinkMeshes.forEach(bm => { bm.scale.y = 0.001; });
    }
  }

  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
