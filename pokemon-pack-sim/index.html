<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Pack Simulator — WotC Era</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0e1a;
      color: #c8d8f0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      padding: 20px;
    }

    a.home { color: #4a7a9e; font-size: 12px; letter-spacing: 2px; text-decoration: none; }
    a.home:hover { color: #ffcc00; }

    h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      letter-spacing: 4px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff4444, #ffcc00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 16px 0 4px;
    }

    .subtitle { color: #4a7a9e; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 32px; }

    /* Set selector */
    #setBar {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
    }

    .set-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      color: #7a99bc;
      padding: 7px 14px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .set-btn:hover { border-color: #ffcc00; color: #ffcc00; }
    .set-btn.active { background: rgba(255,200,0,0.12); border-color: #ffcc00; color: #ffcc00; }

    /* Controls */
    #controls {
      display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
    }

    #openBtn {
      background: linear-gradient(135deg, #ff6600, #ffcc00);
      border: none; color: #000;
      padding: 11px 28px;
      border-radius: 8px;
      font-family: inherit; font-size: 13px; font-weight: bold;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    #openBtn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    #openBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #status { font-size: 11px; color: #4a7a9e; letter-spacing: 1px; }

    /* Set info strip */
    #setInfo {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 20px;
      font-size: 12px;
      display: none;
    }
    #setInfo.visible { display: block; }
    #setInfo .row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 8px; }
    #setInfo .stat { color: #4a7a9e; }
    #setInfo .stat span { color: #ffcc00; }
    #setInfo a { color: #7cb8ff; font-size: 11px; text-decoration: none; margin-right: 16px; }
    #setInfo a:hover { color: #ffcc00; }

    /* Pack result */
    #result { margin-top: 8px; }

    .pack-header {
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: #4a7a9e; margin-bottom: 14px; padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }

    .card-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card-item:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }

    .card-item.rarity-holo {
      border-color: rgba(255,215,0,0.45);
      box-shadow: 0 0 12px rgba(255,200,0,0.15);
    }
    .card-item.rarity-rare { border-color: rgba(192,192,192,0.35); }
    .card-item.rarity-uncommon { border-color: rgba(60,179,113,0.25); }

    .card-img { width: 100%; display: block; aspect-ratio: 245/342; object-fit: cover; background: #111; }
    .card-img.placeholder {
      display: flex; align-items: center; justify-content: center;
      color: #2a4060; font-size: 28px;
    }

    .card-meta {
      padding: 8px 10px;
    }
    .card-name { font-size: 11px; font-weight: bold; color: #e0e8f8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-rarity {
      font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
      margin-top: 3px;
    }
    .card-rarity.holo    { color: #ffdd00; }
    .card-rarity.rare    { color: #aaaaaa; }
    .card-rarity.uncommon{ color: #3cb371; }
    .card-rarity.common  { color: #4a7a9e; }

    /* Log panel */
    #logPanel {
      margin-top: 28px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 14px;
      display: none;
    }
    #logPanel.visible { display: block; }
    #logPanel h4 { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #4a7a9e; margin-bottom: 10px; }
    #logOutput {
      font-size: 11px; color: #5a8aaa; line-height: 1.7;
      max-height: 200px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
    }
    #logOutput .ok  { color: #3cb371; }
    #logOutput .warn{ color: #ffcc00; }
    #logOutput .err { color: #ff5555; }

    .toggle-log {
      background: none; border: 1px solid rgba(255,255,255,0.08);
      color: #4a7a9e; font-family: inherit; font-size: 10px;
      letter-spacing: 1px; padding: 4px 10px; border-radius: 4px;
      cursor: pointer; margin-top: 16px;
      transition: color 0.15s, border-color 0.15s;
    }
    .toggle-log:hover { color: #ffcc00; border-color: #ffcc00; }
  </style>
</head>
<body>

<a href="../index.html" class="home">← Home</a>
<h1>Pack Simulator</h1>
<p class="subtitle">WotC Era · 1999–2002 · pokemontcg.io</p>

<div id="setBar"></div>

<div id="setInfo">
  <div class="row" id="setInfoStats"></div>
  <div id="setInfoLinks"></div>
</div>

<div id="controls">
  <button id="openBtn" disabled>Open Pack</button>
  <span id="status">Select a set to begin</span>
</div>

<div id="result"></div>

<button class="toggle-log" id="toggleLog" style="display:none">Show Debug Log</button>
<div id="logPanel">
  <h4>Debug Log</h4>
  <pre id="logOutput"></pre>
</div>

<script>
// ─── Config ────────────────────────────────────────────────────────────────
const API_BASE   = 'https://api.pokemontcg.io/v2';
const MAX_RETRY  = 4;
const TIMEOUT_MS = 8000;
const PACK_SIZE  = 11; // 7 commons, 3 uncommons, 1 rare slot
const HOLO_RATE  = 1 / 3;

const WOTC_SETS = [
  { id: 'base1',      name: 'Base Set',            year: 1999, bulb: 'https://bulbapedia.bulbagarden.net/wiki/Base_Set_(TCG)',       tcg: 'https://www.tcgplayer.com/search/pokemon/base-set' },
  { id: 'jungle',     name: 'Jungle',               year: 1999, bulb: 'https://bulbapedia.bulbagarden.net/wiki/Jungle_(TCG)',         tcg: 'https://www.tcgplayer.com/search/pokemon/jungle' },
  { id: 'fossil',     name: 'Fossil',               year: 1999, bulb: 'https://bulbapedia.bulbagarden.net/wiki/Fossil_(TCG)',         tcg: 'https://www.tcgplayer.com/search/pokemon/fossil' },
  { id: 'base2',      name: 'Base Set 2',           year: 2000, bulb: 'https://bulbapedia.bulbagarden.net/wiki/Base_Set_2_(TCG)',     tcg: 'https://www.tcgplayer.com/search/pokemon/base-set-2' },
  { id: 'teamrocket', name: 'Team Rocket',          year: 2000, bulb: 'https://bulbapedia.bulbagarden.net/wiki/Team_Rocket_(TCG)',    tcg: 'https://www.tcgplayer.com/search/pokemon/team-rocket' },
  { id: 'gym1',       name: 'Gym Heroes',           year: 2000, bulb: 'https://bulbapedia.bulbagarden.net/wiki/Gym_Heroes_(TCG)',     tcg: 'https://www.tcgplayer.com/search/pokemon/gym-heroes' },
  { id: 'gym2',       name: 'Gym Challenge',        year: 2000, bulb: 'https://bulbapedia.bulbagarden.net/wiki/Gym_Challenge_(TCG)',  tcg: 'https://www.tcgplayer.com/search/pokemon/gym-challenge' },
  { id: 'neo1',       name: 'Neo Genesis',          year: 2000, bulb: 'https://bulbapedia.bulbagarden.net/wiki/Neo_Genesis_(TCG)',    tcg: 'https://www.tcgplayer.com/search/pokemon/neo-genesis' },
  { id: 'neo2',       name: 'Neo Discovery',        year: 2001, bulb: 'https://bulbapedia.bulbagarden.net/wiki/Neo_Discovery_(TCG)', tcg: 'https://www.tcgplayer.com/search/pokemon/neo-discovery' },
  { id: 'neo3',       name: 'Neo Revelation',       year: 2001, bulb: 'https://bulbapedia.bulbagarden.net/wiki/Neo_Revelation_(TCG)',tcg: 'https://www.tcgplayer.com/search/pokemon/neo-revelation' },
  { id: 'neo4',       name: 'Neo Destiny',          year: 2002, bulb: 'https://bulbapedia.bulbagarden.net/wiki/Neo_Destiny_(TCG)',   tcg: 'https://www.tcgplayer.com/search/pokemon/neo-destiny' },
  { id: 'base6',      name: 'Legendary Collection', year: 2002, bulb: 'https://bulbapedia.bulbagarden.net/wiki/Legendary_Collection_(TCG)', tcg: 'https://www.tcgplayer.com/search/pokemon/legendary-collection' },
];

// ─── State ─────────────────────────────────────────────────────────────────
const cardCache = new Map();   // setId → card[]
let   activeSet = null;
let   logVisible = false;

// ─── Logging ───────────────────────────────────────────────────────────────
function log(msg, level = 'info') {
  const el = document.getElementById('logOutput');
  const ts  = new Date().toISOString().slice(11, 23);
  const cls = level === 'ok' ? 'ok' : level === 'warn' ? 'warn' : level === 'err' ? 'err' : '';
  el.innerHTML += `<span class="${cls}">[${ts}] ${msg}\n</span>`;
  el.scrollTop  = el.scrollHeight;
  document.getElementById('toggleLog').style.display = '';
}

// ─── Fetch with retry + partial-response logging ───────────────────────────
async function apiFetch(url) {
  let lastPartial = '';
  let rawText     = '';

  for (let attempt = 1; attempt <= MAX_RETRY; attempt++) {
    const timeoutMs = TIMEOUT_MS + (attempt - 1) * 2000; // grow timeout each retry
    log(`Attempt ${attempt}/${MAX_RETRY} — GET ${url} (timeout ${timeoutMs}ms)`);

    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);

    try {
      const res = await fetch(url, { signal: controller.signal });
      clearTimeout(timer);

      if (!res.ok) {
        log(`HTTP ${res.status} ${res.statusText}`, 'err');
        if (attempt === MAX_RETRY) throw new Error(`HTTP ${res.status}`);
        await sleep(attempt * 2000);
        continue;
      }

      // Stream the body so we can log partial data on interruption
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      rawText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        rawText += chunk;
        lastPartial = rawText; // keep last known good partial
      }

      log(`Response complete — ${rawText.length} bytes`, 'ok');

      try {
        return JSON.parse(rawText);
      } catch (parseErr) {
        log(`JSON parse failed at byte ~${rawText.length}. Last 200 chars: …${rawText.slice(-200)}`, 'warn');
        if (attempt === MAX_RETRY) throw parseErr;
        await sleep(attempt * 2000);
      }

    } catch (err) {
      clearTimeout(timer);
      const isAbort = err.name === 'AbortError';
      log(`${isAbort ? 'Timeout' : 'Network error'} on attempt ${attempt}: ${err.message}`, 'warn');
      if (lastPartial) {
        log(`Partial data ends at byte ${lastPartial.length}: …${lastPartial.slice(-120)}`, 'warn');
      }
      if (attempt === MAX_RETRY) throw err;
      await sleep(attempt * 2000);
    }
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── Card fetching ─────────────────────────────────────────────────────────
async function loadCards(setId) {
  if (cardCache.has(setId)) {
    log(`Cache hit for ${setId}`, 'ok');
    return cardCache.get(setId);
  }

  setStatus('Loading cards…');
  const fields = 'id,name,rarity,types,hp,images,number';
  const url = `${API_BASE}/cards?q=set.id:${setId}&pageSize=250&select=${fields}`;
  const data = await apiFetch(url);
  const cards = data.data || [];
  cardCache.set(setId, cards);
  log(`Cached ${cards.length} cards for ${setId}`, 'ok');
  return cards;
}

// ─── Pack generation ───────────────────────────────────────────────────────
function pickRandom(arr)   { return arr[Math.floor(Math.random() * arr.length)]; }
function pickUnique(arr, n) {
  return [...arr].sort(() => Math.random() - 0.5).slice(0, Math.min(n, arr.length));
}

function generatePack(cards) {
  const holoRares    = cards.filter(c => c.rarity === 'Rare Holo');
  const nonHoloRares = cards.filter(c => c.rarity === 'Rare');
  const uncommons    = cards.filter(c => c.rarity === 'Uncommon');
  const commons      = cards.filter(c => c.rarity === 'Common');

  const pack = [];

  // 7 commons
  const cPool = commons.length >= 7 ? commons : [...commons, ...uncommons];
  pickUnique(cPool, 7).forEach(c => pack.push({ ...c, slot: 'common' }));

  // 3 uncommons
  const uPool = uncommons.length >= 3 ? uncommons : [...uncommons, ...commons];
  pickUnique(uPool, 3).forEach(c => pack.push({ ...c, slot: 'uncommon' }));

  // 1 rare slot
  const isHolo   = Math.random() < HOLO_RATE;
  const rarePool = isHolo
    ? (holoRares.length    ? holoRares    : nonHoloRares)
    : (nonHoloRares.length ? nonHoloRares : holoRares);
  const rare = pickRandom(rarePool);
  pack.push({ ...rare, slot: isHolo ? 'holo' : 'rare' });

  log(`Pack: ${pack.filter(c=>c.slot==='common').length} commons, ${pack.filter(c=>c.slot==='uncommon').length} uncommons, 1 ${isHolo ? '✦ HOLO' : 'rare'} (${rare?.name})`, 'ok');
  return pack;
}

// ─── Rendering ─────────────────────────────────────────────────────────────
function slotLabel(slot) {
  if (slot === 'holo')     return '✦ Holo Rare';
  if (slot === 'rare')     return '★ Rare';
  if (slot === 'uncommon') return '◆ Uncommon';
  return '● Common';
}

function renderPack(pack) {
  const result = document.getElementById('result');
  const holoCard = pack.find(c => c.slot === 'holo');
  const rareCard = pack.find(c => c.slot === 'rare');

  const headline = holoCard
    ? `✦ Holo pulled — ${holoCard.name}`
    : `Rare — ${rareCard?.name ?? '?'}`;

  result.innerHTML = `
    <p class="pack-header">${activeSet.name} ${activeSet.year} · ${headline}</p>
    <div class="cards-grid">
      ${pack.map(card => {
        const imgSrc = card.images?.small || '';
        const imgEl  = imgSrc
          ? `<img class="card-img" src="${imgSrc}" alt="${card.name}" loading="lazy">`
          : `<div class="card-img placeholder">🃏</div>`;
        return `
          <div class="card-item rarity-${card.slot}">
            ${imgEl}
            <div class="card-meta">
              <div class="card-name">${card.name}</div>
              <div class="card-rarity ${card.slot}">${slotLabel(card.slot)}</div>
            </div>
          </div>`;
      }).join('')}
    </div>`;
}

// ─── Set info panel ────────────────────────────────────────────────────────
function showSetInfo(set, cards) {
  const holos    = cards.filter(c => c.rarity === 'Rare Holo').length;
  const rares    = cards.filter(c => c.rarity === 'Rare').length;
  const uncommon = cards.filter(c => c.rarity === 'Uncommon').length;
  const common   = cards.filter(c => c.rarity === 'Common').length;
  const holoOdds = ((HOLO_RATE / (holos || 1)) * 100).toFixed(2);

  document.getElementById('setInfoStats').innerHTML = `
    <span class="stat">Total: <span>${cards.length}</span></span>
    <span class="stat">Holo Rares: <span>${holos}</span></span>
    <span class="stat">Rares: <span>${rares}</span></span>
    <span class="stat">Uncommons: <span>${uncommon}</span></span>
    <span class="stat">Commons: <span>${common}</span></span>
    <span class="stat">Holo rate: <span>~${Math.round(HOLO_RATE * 100)}%</span></span>
    <span class="stat">Specific holo odds: <span>~${holoOdds}%</span></span>`;

  document.getElementById('setInfoLinks').innerHTML =
    `<a href="${set.bulb}" target="_blank" rel="noopener">📖 Bulbapedia</a>` +
    `<a href="${set.tcg}"  target="_blank" rel="noopener">💰 TCGPlayer</a>`;

  document.getElementById('setInfo').classList.add('visible');
}

// ─── UI helpers ────────────────────────────────────────────────────────────
function setStatus(msg) { document.getElementById('status').textContent = msg; }

// ─── Set selection ─────────────────────────────────────────────────────────
async function selectSet(set) {
  activeSet = set;

  document.querySelectorAll('.set-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.id === set.id));

  document.getElementById('openBtn').disabled = true;
  document.getElementById('result').innerHTML = '';
  document.getElementById('setInfo').classList.remove('visible');
  setStatus(`Loading ${set.name}…`);

  try {
    const cards = await loadCards(set.id);
    showSetInfo(set, cards);
    document.getElementById('openBtn').disabled = false;
    setStatus(`${cards.length} cards loaded — ready to open`);
  } catch (err) {
    setStatus(`Failed to load: ${err.message}`);
    log(`Fatal: ${err.message}`, 'err');
  }
}

async function openPack() {
  if (!activeSet) return;
  document.getElementById('openBtn').disabled = true;
  setStatus('Opening…');
  try {
    const cards = await loadCards(activeSet.id);
    const pack  = generatePack(cards);
    renderPack(pack);
    setStatus(`Pack opened — ${pack.length} cards revealed`);
  } catch (err) {
    setStatus(`Error: ${err.message}`);
    log(`Open pack error: ${err.message}`, 'err');
  } finally {
    document.getElementById('openBtn').disabled = false;
  }
}

// ─── Log toggle ────────────────────────────────────────────────────────────
document.getElementById('toggleLog').addEventListener('click', () => {
  logVisible = !logVisible;
  document.getElementById('logPanel').classList.toggle('visible', logVisible);
  document.getElementById('toggleLog').textContent = logVisible ? 'Hide Debug Log' : 'Show Debug Log';
});

// ─── Init ──────────────────────────────────────────────────────────────────
(function init() {
  const bar = document.getElementById('setBar');
  WOTC_SETS.forEach(set => {
    const btn = document.createElement('button');
    btn.className   = 'set-btn';
    btn.dataset.id  = set.id;
    btn.textContent = `${set.name} '${String(set.year).slice(2)}`;
    btn.addEventListener('click', () => selectSet(set));
    bar.appendChild(btn);
  });

  document.getElementById('openBtn').addEventListener('click', openPack);
})();
</script>
</body>
</html>
